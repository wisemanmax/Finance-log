<!-- ── Auth Logic (vanilla JS, no deps) ── -->
<script>

// ─── Config ───────────────────────────────────────────────────────────────────
const API_URL = "https://api.ironlog.space";

// ─── Utils ────────────────────────────────────────────────────────────────────
const LS = {
  get: (k) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : null; } catch { return null; } },
  set: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} },
};
const Cookie = {
  get: (name) => { const m = document.cookie.match(new RegExp("(^| )" + name + "=([^;]+)")); return m ? decodeURIComponent(m[2]) : null; },
  set: (name, value, days = 30) => { const exp = new Date(Date.now() + days * 864e5).toUTCString(); const isIronlog = window.location.hostname.endsWith('ironlog.space'); document.cookie = `${name}=${encodeURIComponent(value)};expires=${exp};${isIronlog ? 'domain=.ironlog.space;' : ''}path=/;${isIronlog ? 'secure;' : ''}samesite=lax`; },
  clear: (name) => { const isIL = window.location.hostname.endsWith('ironlog.space'); document.cookie = `${name}=;expires=Thu, 01 Jan 1970 00:00:00 GMT;${isIL ? 'domain=.ironlog.space;' : ''}path=/;${isIL ? 'secure' : ''}`; },
};
const uid = () => Math.random().toString(36).slice(2) + Date.now().toString(36);
const today = () => new Date().toISOString().split("T")[0];
const isValidEmail = (e) => /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(e);

// ─── SSO Detection ────────────────────────────────────────────────────────────
const detectSSO = () => {
  const cookie = Cookie.get("ironlog_session");
  const storedToken = LS.get("ft-session-token");
  const storedEmail = LS.get("ft-session-email");
  const financeToken = LS.get("fl-session-token");
  const financeEmail = LS.get("fl-session-email");
  // Already have a FinanceLog session
  if (financeToken && financeEmail) return { type: "fl_session", email: financeEmail, token: financeToken };
  // IronLog cookie (cross-subdomain SSO)
  if (cookie) return { type: "ironlog_cookie", token: cookie };
  // IronLog localStorage
  if (storedToken && storedEmail) return { type: "ironlog_local", email: storedEmail, token: storedToken };
  return null;
};

// ─── Session Manager ──────────────────────────────────────────────────────────
const SessionManager = {
  create: async (email, pin, deviceId) => {
    try {
      const res = await fetch(`${API_URL}/api/auth/session`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ action: "create", email: email.toLowerCase(), pin, deviceId }),
      });
      if (!res.ok) return false;
      const json = await res.json();
      LS.set("fl-session-token", json.token);
      LS.set("fl-session-email", email.toLowerCase());
      LS.set("fl-session-expires", json.expires_at);
      Cookie.set("ironlog_session", json.token, 30);
      return true;
    } catch { return false; }
  },
  validateSSO: async (token) => {
    try {
      const res = await fetch(`${API_URL}/api/auth/session`, {
        method: "POST",
        headers: { "Content-Type": "application/json", "X-Session-Token": token },
        body: JSON.stringify({ action: "validate" }),
      });
      if (!res.ok) return null;
      return await res.json();
    } catch { return null; }
  },
};

// ─── API ──────────────────────────────────────────────────────────────────────
const registerUser = async (payload) => {
  const res = await fetch(`${API_URL}/api/users`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload),
  });
  const json = await res.json().catch(() => ({}));
  return { ok: res.ok, status: res.status, data: json };
};

const sendVerifyCode = async (email) => {
  try {
    await fetch(`${API_URL}/api/auth/session`, {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ action: "send_verify_code", email }),
    });
  } catch {}
};

const confirmVerifyCode = async (email, code) => {
  const res = await fetch(`${API_URL}/api/auth/session`, {
    method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ action: "confirm_verify_code", email, code }),
  });
  return await res.json().catch(() => ({}));
};

const signInPull = async (email, deviceId, pin) => {
  const res = await fetch(`${API_URL}/api/sync/pull`, {
    method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email, deviceId, pin }),
  });
  return await res.json().catch(() => ({}));
};

const sendForgotCode = async (email) => {
  await fetch(`${API_URL}/api/auth/session`, {
    method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ action: "send_reset_code", email }),
  });
};

const verifyForgotCode = async (email, code) => {
  const res = await fetch(`${API_URL}/api/auth/session`, {
    method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ action: "verify_reset_code", email, code }),
  });
  return await res.json().catch(() => ({}));
};

const setNewPin = async (email, resetToken, newPin) => {
  const res = await fetch(`${API_URL}/api/auth/session`, {
    method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ action: "set_new_pin", email, resetToken, newPin }),
  });
  return await res.json().catch(() => ({}));
};

// ─── Render Engine ────────────────────────────────────────────────────────────
let _state = {};
let _currentView = null;

function setState(updates) {
  _state = { ..._state, ...updates };
  render();
}

function render() {
  const root = document.getElementById("auth-root");
  root.innerHTML = "";
  if (_currentView) _currentView(root, _state);
}

// ─── Views ────────────────────────────────────────────────────────────────────

// WELCOME VIEW
function viewWelcome(root, state) {
  const sso = state.detectedSSO;
  root.innerHTML = `
    <div class="fu" style="margin-bottom:auto;padding-top:20px">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:40px">
        <div style="width:42px;height:42px;border-radius:14px;background:rgba(0,212,160,.15);border:1px solid rgba(0,212,160,.3);display:flex;align-items:center;justify-content:center;font-size:22px">💎</div>
        <div>
          <div style="font-size:17px;font-weight:800;color:#dff0ea;line-height:1">FinanceLog</div>
          <div style="font-size:10px;color:#3a5a4a;letter-spacing:.1em;font-weight:600">BY IRONLOG</div>
        </div>
      </div>
      <h1 style="font-size:30px;font-weight:800;color:#dff0ea;margin:0 0 10px;line-height:1.2">Take control of<br/><span style="color:#00d4a0">your money.</span></h1>
      <p style="color:#7faa9a;font-size:14px;line-height:1.65;margin:0 0 32px">Track spending, set budgets, monitor net worth — and earn IRON XP while building real financial habits.</p>
    </div>
    ${sso ? `
    <div class="sso-card fu s1" style="margin-bottom:16px">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">
        <div style="width:36px;height:36px;border-radius:11px;background:rgba(77,158,245,.18);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">🔗</div>
        <div>
          <div style="font-size:13px;font-weight:700;color:#4d9ef5">IronLog Account Detected</div>
          <div style="font-size:11px;color:#7faa9a;margin-top:1px">${sso.email ? sso.email : "Session active"}</div>
        </div>

// SSO LOGIN
async function handleSSOLogin(sso) {
  const root = document.getElementById("auth-root");
  root.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;flex:1;flex-direction:column;gap:16px;color:#4d9ef5"><div class="spinner" style="width:32px;height:32px;border-color:rgba(77,158,245,.3);border-top-color:#4d9ef5"></div><div style="font-size:13px;font-weight:600">Connecting to IronLog…</div></div>`;
  const result = await SessionManager.validateSSO(sso.token);
  if (result && result.valid) {
    // Store FL session using existing IronLog session
    LS.set("fl-session-token", sso.token);
    LS.set("fl-session-email", result.email || sso.email || "");
    LS.set("fl-onboarded", true);
    // Mark in FinanceLog that this is an SSO user
    LS.set("fl-sso-linked", true);
    LS.set("fl-sso-source", "ironlog");
    showSuccess("IronLog account linked!", () => { showApp(); });
  } else {
    // Token invalid/expired — fall back to manual sign in
    _currentView = viewSignIn;
    setState({ siStep: "email", siEmail: sso.email || "", siPin: "", siError: "Session expired. Please sign in again.", siLoading: false });
  }
}

function bindStepListeners(step, state) {
  if (step === 0) {
    document.getElementById("chk-agree")?.addEventListener("click", () => {
      setState({ agreed: !state.agreed, signupError: "" });
    });
    document.getElementById("btn-next")?.addEventListener("click", () => {
      const firstName = document.getElementById("p-first")?.value.trim() || "";
      const lastName = document.getElementById("p-last")?.value.trim() || "";
      const email = document.getElementById("p-email")?.value.trim() || "";
      const dob = document.getElementById("p-dob")?.value || "";
      const stateVal = document.getElementById("p-state")?.value || "";
      const zipCode = document.getElementById("p-zip")?.value || "";
      if (!firstName || !lastName || !email || !dob) return setState({ signupError: "Please fill in all required fields (*)." });
      if (!isValidEmail(email)) return setState({ signupError: "Please enter a valid email address." });
      const age = Math.floor((Date.now() - new Date(dob + "T00:00:00")) / (365.25 * 864e5));
      if (age < 13) return setState({ signupError: "You must be at least 13 years old." });
      if (!state.agreed) return setState({ signupError: "Please agree to the Terms of Service." });
      setState({ profile: { firstName, lastName, email, dob, state: stateVal, zipCode }, step: 1, signupError: "" });
    });
  }
  if (step === 1) {
    document.querySelectorAll("[data-goal]").forEach(btn => {
      btn.addEventListener("click", () => {
        const g = state.finGoals || {};
        setState({ finGoals: { ...g, primaryGoal: btn.dataset.goal }, signupError: "" });
      });
    });
    document.querySelectorAll("[data-income]").forEach(btn => {
      btn.addEventListener("click", () => {
        const g = state.finGoals || {};
        setState({ finGoals: { ...g, incomeRange: btn.dataset.income }, signupError: "" });
      });
    });
    document.getElementById("btn-next")?.addEventListener("click", () => {
      const g = state.finGoals || {};
      if (!g.primaryGoal) return setState({ signupError: "Please select a primary goal." });
      const target = document.getElementById("savings-target")?.value || "";
      setState({ finGoals: { ...g, monthlySavingsTarget: target ? parseFloat(target) : null }, step: 2, signupError: "", newPin: "", confirmPin: "", pinPhase: "enter" });
    });
  }
  if (step === 2) {
    document.querySelectorAll("[data-key]").forEach(btn => {
      btn.addEventListener("click", () => {
        const key = btn.dataset.key;
        const phase = state.pinPhase || "enter";
        let pin = phase === "enter" ? (state.newPin || "") : (state.confirmPin || "");
        if (key === "⌫") { pin = pin.slice(0, -1); }
        else if (pin.length < 6) { pin += key; }
        if (phase === "enter") {
          if (pin.length === 6) { setState({ newPin: pin, pinPhase: "confirm", confirmPin: "", signupError: "" }); return; }
          setState({ newPin: pin, signupError: "" });
        } else {
          if (pin.length === 6) {
            if (pin === state.newPin) {
              setState({ confirmPin: pin, signupError: "" });
              setTimeout(() => submitSignup(state, pin), 200);
            } else {
              setState({ confirmPin: "", signupError: "PINs don't match. Try again.", pinPhase: "confirm" });
              setTimeout(() => setState({ signupError: "", pinPhase: "enter", newPin: "", confirmPin: "" }), 1500);
            }
            return;
          }
          setState({ confirmPin: pin, signupError: "" });
        }
      });
    });
  }
  if (step === 3) {
    document.getElementById("verify-code")?.addEventListener("input", (e) => {
      setState({ verifyCode: e.target.value.slice(0, 6), signupError: "" });
    });
    document.getElementById("btn-next")?.addEventListener("click", () => {
      handleVerify(state);
    });
    document.getElementById("btn-resend")?.addEventListener("click", () => {
      if (state.verifyCooldown > 0) return;
      sendVerifyCode((state.profile || {}).email || "");
      startVerifyCooldown();
    });
    document.getElementById("btn-skip")?.addEventListener("click", () => {
      LS.set("fl-onboarded", true);
      showApp();
    });
  }
}

async function submitSignup(state, pin) {
  setState({ step: 3, signupError: "", verifyStatus: "pending", verifyCode: "", verifyLoading: false, verifyCooldown: 0 });
  const profile = state.profile || {};
  const g = state.finGoals || {};
  const deviceId = uid();
  LS.set("fl-device-id", deviceId);

  const payload = {
    // Identity
    firstName: profile.firstName,
    lastName: profile.lastName,
    email: profile.email.toLowerCase(),
    dob: profile.dob,
    state: profile.state || null,
    zipCode: profile.zipCode || null,
    // Finance-specific
    primaryGoal: g.primaryGoal || null,
    incomeRange: g.incomeRange || null,
    monthlySavingsTarget: g.monthlySavingsTarget || null,
    appSource: "financelog",
    // Required by IronLog API
    accountPin: pin,
    units: "usd",
    split: null,
    // Consent
    consentedAt: new Date().toISOString(),
    consentVersion: "1.0",
    deviceId,
    createdAt: new Date().toISOString(),
  };

  // Non-blocking — app works regardless of API success
  registerUser(payload).then(async result => {
    if (result.ok) {
      await SessionManager.create(profile.email.toLowerCase(), pin, deviceId);
      await sendVerifyCode(profile.email.toLowerCase());
    } else if (result.status === 409) {
      // Account exists — prompt sign in
      _currentView = viewSignIn;
      setState({ siStep: "email", siEmail: profile.email, siPin: "", siError: "An account with this email already exists. Sign in instead.", siLoading: false });
    }
    // 500/network errors: silently continue, data is local
  }).catch(() => {});

  // Store profile locally immediately
  LS.set("fl-profile", { email: profile.email.toLowerCase(), firstName: profile.firstName, lastName: profile.lastName });
  LS.set("fl-goals", g);
  // Start verify cooldown
  startVerifyCooldown();
}

async function handleVerify(state) {
  const code = (state.verifyCode || "").trim();
  if (code.length !== 6) return setState({ signupError: "Enter the 6-digit code from your email." });
  setState({ verifyLoading: true, signupError: "" });
  const email = (state.profile || {}).email || LS.get("fl-profile")?.email || "";
  const result = await confirmVerifyCode(email, code);
  if (result.verified || result.already_verified) {
    LS.set("fl-email-verified", "true");
    LS.set("fl-onboarded", true);
    setState({ verifyStatus: "done", verifyLoading: false });
    setTimeout(() => { showApp(); }, 1400);
  } else {
    setState({ signupError: result.error || "Incorrect code. Try again.", verifyLoading: false });
  }
}

let _cooldownInterval = null;
function startVerifyCooldown() {
  if (_cooldownInterval) clearInterval(_cooldownInterval);
  setState({ verifyCooldown: 60 });
  _cooldownInterval = setInterval(() => {
    _state.verifyCooldown = (_state.verifyCooldown || 1) - 1;
    if (_state.verifyCooldown <= 0) { clearInterval(_cooldownInterval); _cooldownInterval = null; }
    render();
  }, 1000);
}

function renderSignInPin(state) {

function renderForgot(state) {
  const { forgotStep = "email", forgotEmail = "", forgotCode = "", forgotNewPin = "", forgotConfirmPin = "", forgotError = "", forgotSuccess = "", forgotLoading = false } = state;
  if (forgotStep === "email") return `

    const dots = [0,1,2,3,4,5].map(i => `<div class="pin-dot ${display.length > i ? "filled" : ""}">${display.length > i ? "•" : ""}</div>`).join("");
    return `
      <h2 class="fu" style="font-size:22px;font-weight:800;color:#dff0ea;margin:0 0 6px">${phase === "new" ? "New PIN" : "Confirm New PIN"}</h2>

          return `<button class="num-key ${k === "⌫" ? "del" : ""} pr" data-forgot-key="${k}">${k}</button>`;

function bindSignInListeners(state) {
  const { siStep, forgotStep } = state;
  if (forgotStep === "email") {
    document.getElementById("btn-forgot-send")?.addEventListener("click", async () => {
      const email = document.getElementById("forgot-email")?.value.trim() || "";
      if (!email || !isValidEmail(email)) { setState({ forgotError: "Enter a valid email." }); return; }
      setState({ forgotLoading: true, forgotError: "", forgotEmail: email });
      await sendForgotCode(email.toLowerCase());
      setState({ forgotLoading: false, forgotSuccess: "If that email exists, a code was sent. Check your inbox.", forgotStep: "code", forgotCode: "" });
    });
  }
  if (forgotStep === "code") {
    document.getElementById("forgot-code")?.addEventListener("input", e => setState({ forgotCode: e.target.value, forgotError: "" }));
    document.getElementById("btn-forgot-verify")?.addEventListener("click", async () => {
      const code = (state.forgotCode || "").trim();
      if (code.length !== 6) { setState({ forgotError: "Enter the 6-digit code." }); return; }
      setState({ forgotLoading: true, forgotError: "" });
      const result = await verifyForgotCode((state.forgotEmail || "").toLowerCase(), code);
      if (result.reset_token) {
        setState({ forgotLoading: false, forgotResetToken: result.reset_token, forgotStep: "newpin", forgotPinPhase: "new", forgotNewPin: "", forgotConfirmPin: "", forgotError: "" });
      } else {
        setState({ forgotLoading: false, forgotError: result.error || `Wrong code. ${result.attempts_remaining !== undefined ? result.attempts_remaining + " attempts left" : ""}` });
      }
    });
  }
  if (forgotStep === "newpin") {
    document.querySelectorAll("[data-forgot-key]").forEach(btn => {
      btn.addEventListener("click", async () => {
        const key = btn.dataset.forgotKey;
        const phase = state.forgotPinPhase || "new";
        let pin = phase === "new" ? (state.forgotNewPin || "") : (state.forgotConfirmPin || "");
        if (key === "⌫") pin = pin.slice(0, -1);
        else if (pin.length < 6) pin += key;
        if (phase === "new") {
          if (pin.length === 6) { setState({ forgotNewPin: pin, forgotPinPhase: "confirm", forgotConfirmPin: "", forgotError: "" }); return; }
          setState({ forgotNewPin: pin });
        } else {
          if (pin.length === 6) {
            if (pin === state.forgotNewPin) {
              setState({ forgotLoading: true, forgotConfirmPin: pin });
              const result = await setNewPin((state.forgotEmail || "").toLowerCase(), state.forgotResetToken, pin);
              if (result.success) {
                setState({ forgotLoading: false, forgotStep: null, siStep: "pin", siEmail: state.forgotEmail, siPin: "", siError: "", forgotError: "" });
              } else {
                setState({ forgotLoading: false, forgotError: result.error || "Failed to update PIN." });
              }
            } else {
              setState({ forgotError: "PINs don't match.", forgotPinPhase: "new", forgotNewPin: "", forgotConfirmPin: "" });
            }
            return;
          }
          setState({ forgotConfirmPin: pin });
        }
      });
    });
  }
  if (!forgotStep) {
    if (siStep === "email") {
      document.getElementById("btn-continue")?.addEventListener("click", async () => {
        const email = document.getElementById("si-email")?.value.trim() || "";
        if (!email || !isValidEmail(email)) { setState({ siError: "Enter a valid email address." }); return; }
        setState({ siLoading: true, siError: "", siEmail: email });
        try {
          const deviceId = uid(); LS.set("fl-device-id", deviceId);
          const result = await signInPull(email.toLowerCase(), deviceId, null);
          if (result?.pin_required) { setState({ siStep: "pin", siLoading: false, siError: "" }); }
          else if (result?.data) { applyRestore(result.data, email); }
          else { setState({ siLoading: false, siError: result?.error || "No account found with this email." }); }
        } catch { setState({ siLoading: false, siError: "Connection failed. Check your internet." }); }
      });
    }
    if (siStep === "pin") {
      document.querySelectorAll("[data-key]").forEach(btn => {
        btn.addEventListener("click", async () => {
          const key = btn.dataset.key;
          let pin = state.siPin || "";
          if (key === "⌫") pin = pin.slice(0, -1);
          else if (pin.length < 6) pin += key;
          if (pin.length === 6) {
            setState({ siPin: pin, siLoading: true, siError: "" });
            try {
              const deviceId = LS.get("fl-device-id") || uid();
              const result = await signInPull(state.siEmail.toLowerCase(), deviceId, pin);
              if (result?.wrong_pin) {
                setState({ siLoading: false, siPin: "", siError: `Wrong PIN. ${result.attempts_remaining} attempt${result.attempts_remaining !== 1 ? "s" : ""} remaining.` });
                if (result.locked) setState({ siError: `Account locked. Try again in ${result.retry_minutes} minutes.` });
              } else if (result?.data) { applyRestore(result.data, state.siEmail); }
              else { setState({ siLoading: false, siPin: "", siError: "Could not restore. Try again." }); }
            } catch { setState({ siLoading: false, siPin: "", siError: "Connection failed." }); }
            return;
          }
          setState({ siPin: pin, siError: "" });
        });
      });
      document.getElementById("btn-forgot")?.addEventListener("click", () => {
        setState({ forgotStep: "email", forgotEmail: state.siEmail || "", forgotError: "", forgotSuccess: "" });
      });
    }
  }
}

function applyRestore(data, email) {
  // Restore synced data to FinanceLog localStorage keys
  if (data?.transactions) LS.set("fl-tx", data.transactions);
  if (data?.accounts) LS.set("fl-accounts", data.accounts);
  if (data?.budgets) LS.set("fl-budgets", data.budgets);
  if (data?.profile) LS.set("fl-profile", data.profile);
  LS.set("fl-session-email", (email || "").toLowerCase());
  LS.set("fl-onboarded", true);
  showSuccess("Account restored!", () => { showApp(); });
}

function showSuccess(msg, cb) {
  const root = document.getElementById("auth-root");
  root.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;flex:1;flex-direction:column;gap:16px;text-align:center"><div style="font-size:52px">✅</div><div style="font-size:18px;font-weight:800;color:#00d4a0">${msg}</div><div class="muted">One moment…</div></div>`;
  setTimeout(cb, 1200);
}


// ─── Switch to App ────────────────────────────────────────────────────────────
function showApp() {
  document.getElementById("auth-root").style.display = "none";
  document.getElementById("app-shell").style.display = "flex";
  // If React is already compiled and ready, boot now
  if (window.__bootApp) { window.__bootApp(); }
  // Otherwise set flag — CDN loader will boot when it finishes
  else { window.__shouldBoot = true; }
}

// ─── Boot ─────────────────────────────────────────────────────────────────────
(async function boot() {
  // If already onboarded, go straight to the app
  if (LS.get("fl-onboarded") && LS.get("fl-session-token")) {
    showApp();
    return;
  }

  // Detect any existing SSO session
  const sso = detectSSO();
  let resolvedSSO = sso;

  // If we have an IronLog cookie/token, validate it quietly
  if (sso && sso.type !== "fl_session") {
    const result = await SessionManager.validateSSO(sso.token).catch(() => null);
    if (result && result.valid) {
      resolvedSSO = { ...sso, email: result.email || sso.email, valid: true };
    } else {
      resolvedSSO = null; // Expired, don't show SSO option
    }
  }

  _state = { detectedSSO: resolvedSSO };
  _currentView = viewWelcome;
  render();
})();

</script>

  txs.forEach(tx=>{const m=tx.date.slice(0,7);if(!mm[m])mm[m]={i:0,e:0};if(tx.type==="income")mm[m].i+=tx.amount;else mm[m].e+=tx.amount;});
  Object.values(mm).forEach(m=>{if(m.i-m.e>0)xp+=50;if(m.i>0&&(m.i-m.e)/m.i>=0.2)xp+=75;});
  const rank=[...IRON_RANKS].reverse().find(r=>xp>=r.xpNeeded)||IRON_RANKS[0];
  const next=IRON_RANKS.find(r=>r.level===rank.level+1);
  const into=xp-rank.xpNeeded,forNext=next?(next.xpNeeded-rank.xpNeeded):null;
  const pct=forNext?Math.min(100,Math.round(into/forNext*100)):100;
  return{xp,rank,nextRank:next,xpIntoRank:into,xpForNext:forNext,pct};
}

function getMissions(s){
  const td=today(),m=td.slice(0,7);
  const todayTx=(s.transactions||[]).some(tx=>tx.date===td);
  const hasInc=(s.transactions||[]).some(tx=>tx.date.startsWith(m)&&tx.type==="income");
  const hasAcc=(s.accounts||[]).length>0;
  const budCount=Object.keys(s.budgets||{}).filter(k=>parseFloat(s.budgets[k])>0).length;
  const mTx=(s.transactions||[]).filter(tx=>tx.date.startsWith(m));
  const inc=mTx.filter(t=>t.type==="income").reduce((a,t)=>a+t.amount,0);
  const exp=mTx.filter(t=>t.type==="expense").reduce((a,t)=>a+t.amount,0);
  const nw=(s.accounts||[]).reduce((a,ac)=>ac.type==="debt"?a-parseFloat(ac.balance||0):a+parseFloat(ac.balance||0),0);
  return[
    {icon:"💳",title:"Log a Transaction",desc:"Add income or expense today",xp:15,done:todayTx},
    {icon:"💼",title:"Log Income",desc:"Record income this month",xp:20,done:hasInc},
    {icon:"🏦",title:"Track Accounts",desc:"Add at least one account",xp:25,done:hasAcc},
    {icon:"🎯",title:"Set 3 Budgets",desc:"Define budgets for 3+ categories",xp:30,done:budCount>=3},
    {icon:"📈",title:"Positive Month",desc:"Income exceeds expenses",xp:40,done:inc-exp>0},
    {icon:"💰",title:"Positive Net Worth",desc:"Assets exceed liabilities",xp:30,done:nw>0},
  ];
}

function getInsights(s){
  const m=thisMonth(),pm=monthAgo(1);
  const mTx=s.transactions.filter(tx=>tx.date.startsWith(m));
  const pmTx=s.transactions.filter(tx=>tx.date.startsWith(pm));
  const mInc=mTx.filter(t=>t.type==="income").reduce((a,t)=>a+t.amount,0);
  const mExp=mTx.filter(t=>t.type==="expense").reduce((a,t)=>a+t.amount,0);
  const pmExp=pmTx.filter(t=>t.type==="expense").reduce((a,t)=>a+t.amount,0);
  const ins=[];
  if(mInc>0){const r=Math.round((mInc-mExp)/mInc*100);
    if(r>=30)ins.push({icon:"🔥",label:"Great savings",text:`${r}% savings rate`,color:T.acc});
    else if(r>0)ins.push({icon:"📊",label:"Savings rate",text:`Saving ${r}% of income`,color:T.gold});
    else ins.push({icon:"⚠️",label:"Overspending",text:"Expenses exceed income",color:T.red});
  }
  if(pmExp>0&&mExp>0){const diff=Math.round((mExp-pmExp)/pmExp*100);
    if(diff>15)ins.push({icon:"📈",label:"Spending up",text:`${diff}% more than last month`,color:T.red});
    else if(diff<-10)ins.push({icon:"📉",label:"Spending down",text:`${Math.abs(diff)}% less`,color:T.acc});
  }
  const cm={};mTx.filter(t=>t.type==="expense").forEach(t=>{cm[t.catId]=(cm[t.catId]||0)+t.amount;});
  const top=Object.entries(cm).sort((a,b)=>b[1]-a[1])[0];
  if(top){const c=getCat(top[0]);ins.push({icon:c.icon,label:"Top spend",text:`${c.label}: $${fmtMoney(top[1],0)}`,color:c.color});}
  return ins.slice(0,3);
}

function DonutChart({data,size=158,sw=20}){
  const r=(size-sw)/2,circ=2*Math.PI*r,cx=size/2,cy=size/2;
  const total=data.reduce((a,d)=>a+d.v,0);
  if(!total)return<svg width={size} height={size}><circle cx={cx} cy={cy} r={r} fill="none" stroke="rgba(255,255,255,.05)" strokeWidth={sw}/></svg>;
  let cum=0;
  return(
    <svg width={size} height={size} style={{transform:"rotate(-90deg)"}}>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="rgba(255,255,255,.05)" strokeWidth={sw}/>
      {data.map((d,i)=>{const pct=d.v/total,gap=0.012,da=`${Math.max(0,pct-gap)*circ} ${circ}`,off=-(cum*circ);cum+=pct;return<circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke={d.color} strokeWidth={sw} strokeDasharray={da} strokeDashoffset={off} strokeLinecap="round"/>;})}
    </svg>);
}

function Sparkline({data,w=240,h=52,color=T.acc}){
  if(!data||data.length<2)return<div style={{width:w,height:h}}/>;
  const mx=Math.max(...data),mn=Math.min(...data),rng=mx-mn||1;
  const pts=data.map((v,i)=>[i/(data.length-1)*w,h-((v-mn)/rng)*(h-8)-4]);
  const d="M "+pts.map(p=>p.join(",")).join(" L ");
  const gid="sg"+Math.round(w);
  return(
    <svg width={w} height={h} style={{overflow:"visible"}}>
      <defs><linearGradient id={gid} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={color} stopOpacity="0.22"/><stop offset="100%" stopColor={color} stopOpacity="0"/></linearGradient></defs>
      <path d={d+` L ${w},${h} L 0,${h} Z`} fill={`url(#${gid})`}/>
      <path d={d} fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
      <circle cx={pts[pts.length-1][0]} cy={pts[pts.length-1][1]} r={4} fill={color}/>
    </svg>);
}

}

function AnimCount({value,dec=2}){
  const[disp,setDisp]=useState(value);
  const prev=useRef(value);
  useEffect(()=>{
    const from=prev.current,to=value;prev.current=to;if(from===to)return;
    const dur=550,start=performance.now();
    const tick=(now)=>{const p=Math.min(1,(now-start)/dur),e=1-Math.pow(1-p,3);setDisp(from+(to-from)*e);if(p<1)requestAnimationFrame(tick);};
    requestAnimationFrame(tick);
  },[value]);
  return<span>{fmtMoney(disp,dec)}</span>;
}

  const missions=useMemo(()=>getMissions(s),[s.transactions.length,s.accounts.length,JSON.stringify(s.budgets)]);

            const active=s.tab===tab.id;
            return(
              <button key={tab.id} onClick={()=>{Haptic.light();d({type:"TAB",tab:tab.id});}}
                style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:3,background:active?T.accDim:"transparent",borderRadius:20,border:`1px solid ${active?"rgba(0,212,160,.22)":"transparent"}`,padding:"8px 4px",cursor:"pointer",WebkitTapHighlightColor:"transparent",transition:"all .2s",minHeight:52}}>
                <div style={{color:active?T.acc:T.t3,transition:"color .2s"}}>{tab.icon(active)}</div>
                <span style={{fontSize:9,fontWeight:active?700:500,color:active?T.acc:T.t3,letterSpacing:".02em"}}>{tab.label}</span>
              </button>);
          })}
        </div>
      </div>
      <ToastBar/>
      <ConfirmDlg/>
      {celebrating&&celebRank&&<LevelUp rank={celebRank} onDismiss={dismiss}/>}
    </div>);
}

// Called by auth layer after sign-in
window.__bootApp = function() {
  ReactDOM.createRoot(document.getElementById("react-root")).render(<App/>);
};
// Flag is set — showApp() was already called, boot now
if (window.__shouldBoot) { window.__bootApp(); }

</script>

</body>
</html>
