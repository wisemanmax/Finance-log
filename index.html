function showErr(msg){document.getElementById('root').innerHTML='<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;padding:24px;text-align:center;gap:12px;background:#070e18"><div style="font-size:28px">⚠️</div><div style="color:#ff5757;font-family:monospace;font-size:12px;line-height:1.7;max-width:300px">'+msg+'</div></div>';}
(function(){
ld('https://cdn.jsdelivr.net/npm/react@18.3.1/umd/react.production.min.js','React')
.catch(function(){return ld('https://unpkg.com/react@18/umd/react.production.min.js','React');})
.then(function(){return ld('https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.production.min.js','ReactDOM').catch(function(){return ld('https://unpkg.com/react-dom@18/umd/react-dom.production.min.js','ReactDOM');});})
.then(function(){return ld('https://cdn.jsdelivr.net/npm/@babel/standalone@7.26.0/babel.min.js','Babel').catch(function(){return ld('https://unpkg.com/@babel/standalone@7.24.0/babel.min.js','Babel');});})
.then(function(){
  if(typeof React==='undefined')throw new Error('React unavailable');
  if(typeof Babel==='undefined')throw new Error('Babel unavailable');
  var src=document.getElementById('app-src');
  var code;
  try{code=Babel.transform(src.textContent,{presets:[['react',{runtime:'classic'}]],filename:'app.jsx'}).code;}
  catch(e){throw new Error('Compile: '+e.message.slice(0,100));}
  try{new Function(code)();}
  catch(e){throw new Error('Runtime: '+e.message.slice(0,100));}
}).catch(function(e){showErr(e.message);});
})();

const monthAgo=(n)=>{const d=new Date();d.setMonth(d.getMonth()-n);return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;};
const fmtDate=(d)=>{try{const dt=new Date(d+"T12:00:00"),now=new Date(),diff=Math.round((now-dt)/86400000);if(diff===0)return"Today";if(diff===1)return"Yesterday";return dt.toLocaleDateString("en-US",{month:"short",day:"numeric"});}catch{return d;}};

function calcScore(s){
  let xp=0;const txs=s.transactions||[];
  xp+=txs.length*5;xp+=(s.accounts||[]).length*20;
  xp+=Object.keys(s.budgets||{}).filter(k=>parseFloat(s.budgets[k])>0).length*8;
  const mm={};
  txs.forEach(tx=>{const m=tx.date.slice(0,7);if(!mm[m])mm[m]={i:0,e:0};if(tx.type==="income")mm[m].i+=tx.amount;else mm[m].e+=tx.amount;});
  Object.values(mm).forEach(m=>{if(m.i-m.e>0)xp+=50;if(m.i>0&&(m.i-m.e)/m.i>=0.2)xp+=75;});
  const rank=[...IRON_RANKS].reverse().find(r=>xp>=r.xpNeeded)||IRON_RANKS[0];
  const next=IRON_RANKS.find(r=>r.level===rank.level+1);
  const into=xp-rank.xpNeeded,forNext=next?(next.xpNeeded-rank.xpNeeded):null;
  const pct=forNext?Math.min(100,Math.round(into/forNext*100)):100;
  return{xp,rank,nextRank:next,xpIntoRank:into,xpForNext:forNext,pct};
}

function getMissions(s){
  const td=today(),m=td.slice(0,7);
  const todayTx=(s.transactions||[]).some(tx=>tx.date===td);
  const hasInc=(s.transactions||[]).some(tx=>tx.date.startsWith(m)&&tx.type==="income");
  const hasAcc=(s.accounts||[]).length>0;
  const budCount=Object.keys(s.budgets||{}).filter(k=>parseFloat(s.budgets[k])>0).length;
  const mTx=(s.transactions||[]).filter(tx=>tx.date.startsWith(m));
  const inc=mTx.filter(t=>t.type==="income").reduce((a,t)=>a+t.amount,0);
  const exp=mTx.filter(t=>t.type==="expense").reduce((a,t)=>a+t.amount,0);
  const nw=(s.accounts||[]).reduce((a,ac)=>ac.type==="debt"?a-parseFloat(ac.balance||0):a+parseFloat(ac.balance||0),0);
  return[
    {icon:"💳",title:"Log a Transaction",desc:"Add income or expense today",xp:15,done:todayTx},
    {icon:"💼",title:"Log Income",desc:"Record income this month",xp:20,done:hasInc},
    {icon:"🏦",title:"Track Accounts",desc:"Add at least one account",xp:25,done:hasAcc},
    {icon:"🎯",title:"Set 3 Budgets",desc:"Define budgets for 3+ categories",xp:30,done:budCount>=3},
    {icon:"📈",title:"Positive Month",desc:"Income exceeds expenses",xp:40,done:inc-exp>0},
    {icon:"💰",title:"Positive Net Worth",desc:"Assets exceed liabilities",xp:30,done:nw>0},
  ];
}

function getInsights(s){
  const m=thisMonth(),pm=monthAgo(1);
  const mTx=s.transactions.filter(tx=>tx.date.startsWith(m));
  const pmTx=s.transactions.filter(tx=>tx.date.startsWith(pm));
  const mInc=mTx.filter(t=>t.type==="income").reduce((a,t)=>a+t.amount,0);
  const mExp=mTx.filter(t=>t.type==="expense").reduce((a,t)=>a+t.amount,0);
  const pmExp=pmTx.filter(t=>t.type==="expense").reduce((a,t)=>a+t.amount,0);
  const ins=[];
  if(mInc>0){const r=Math.round((mInc-mExp)/mInc*100);
    if(r>=30)ins.push({icon:"🔥",label:"Great savings",text:`${r}% savings rate`,color:T.acc});
    else if(r>0)ins.push({icon:"📊",label:"Savings rate",text:`Saving ${r}% of income`,color:T.gold});
    else ins.push({icon:"⚠️",label:"Overspending",text:"Expenses exceed income",color:T.red});
  }
  if(pmExp>0&&mExp>0){const diff=Math.round((mExp-pmExp)/pmExp*100);
    if(diff>15)ins.push({icon:"📈",label:"Spending up",text:`${diff}% more than last month`,color:T.red});
    else if(diff<-10)ins.push({icon:"📉",label:"Spending down",text:`${Math.abs(diff)}% less`,color:T.acc});
  }
  const cm={};mTx.filter(t=>t.type==="expense").forEach(t=>{cm[t.catId]=(cm[t.catId]||0)+t.amount;});
  const top=Object.entries(cm).sort((a,b)=>b[1]-a[1])[0];
  if(top){const c=getCat(top[0]);ins.push({icon:c.icon,label:"Top spend",text:`${c.label}: $${fmtMoney(top[1],0)}`,color:c.color});}
  return ins.slice(0,3);
}

function useLevelUp(score,lsKey){
  const[celebrating,setCelebrating]=useState(false);
  const[celebRank,setCelebRank]=useState(null);
  useEffect(()=>{
    const saved=parseInt(LS.get(lsKey)||"1");
    if(score.rank.level>saved){LS.set(lsKey,score.rank.level);setCelebRank(score.rank);setTimeout(()=>setCelebrating(true),400);}
    else if(!LS.get(lsKey)){LS.set(lsKey,score.rank.level);}
  },[score.rank.level]);
  return{celebrating,celebRank,dismiss:()=>setCelebrating(false)};
}

const INIT={tab:"home",transactions:[],accounts:[],budgets:{},loaded:false};
function reducer(s,a){
  switch(a.type){
    case"INIT":return{...s,...a.p,loaded:true};
    case"TAB":return{...s,tab:a.tab};
    case"ADD_TX":return{...s,transactions:[a.tx,...s.transactions]};
    case"DEL_TX":return{...s,transactions:s.transactions.filter(t=>t.id!==a.id)};
    case"ADD_ACC":return{...s,accounts:[...s.accounts,a.acc]};
    case"DEL_ACC":return{...s,accounts:s.accounts.filter(x=>x.id!==a.id)};
    case"UPD_ACC":return{...s,accounts:s.accounts.map(x=>x.id===a.acc.id?a.acc:x)};
    case"SET_BUD":return{...s,budgets:{...s.budgets,...a.b}};
    default:return s;
  }
}

const Btn=({children,v="primary",full,disabled,onClick,style:ex={}})=>{
  const B={display:"flex",alignItems:"center",justifyContent:"center",gap:7,borderRadius:14,border:"none",fontSize:14,fontWeight:600,fontFamily:T.font,cursor:disabled?"not-allowed":"pointer",opacity:disabled?.38:1,WebkitTapHighlightColor:"transparent",minHeight:48,transition:"opacity .15s",...(full?{width:"100%"}:{}),...ex};
  const V2={
    primary:{...B,background:`linear-gradient(135deg,${T.acc},${T.acc2})`,color:"#070e18",padding:"0 22px",boxShadow:`0 4px 20px ${T.acc}28`},
    ghost:{...B,background:"rgba(255,255,255,.05)",color:T.t2,padding:"0 22px",border:`1px solid ${T.brd}`},
    danger:{...B,background:T.redDim,color:T.red,padding:"0 22px",border:"1px solid rgba(255,87,87,.2)"},
    sm:{...B,background:T.accDim,color:T.acc,padding:"0 14px",minHeight:36,fontSize:12,borderRadius:10},
  };
  return<button className="pr" onClick={disabled?undefined:onClick} style={V2[v]||V2.primary}>{children}</button>;
};

function DonutChart({data,size=158,sw=20}){
  const r=(size-sw)/2,circ=2*Math.PI*r,cx=size/2,cy=size/2;
  const total=data.reduce((a,d)=>a+d.v,0);
  if(!total)return<svg width={size} height={size}><circle cx={cx} cy={cy} r={r} fill="none" stroke="rgba(255,255,255,.05)" strokeWidth={sw}/></svg>;
  let cum=0;
  return(
    <svg width={size} height={size} style={{transform:"rotate(-90deg)"}}>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="rgba(255,255,255,.05)" strokeWidth={sw}/>
      {data.map((d,i)=>{const pct=d.v/total,gap=0.012,da=`${Math.max(0,pct-gap)*circ} ${circ}`,off=-(cum*circ);cum+=pct;return<circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke={d.color} strokeWidth={sw} strokeDasharray={da} strokeDashoffset={off} strokeLinecap="round"/>;})}
    </svg>);
}

function Sparkline({data,w=240,h=52,color=T.acc}){
  if(!data||data.length<2)return<div style={{width:w,height:h}}/>;
  const mx=Math.max(...data),mn=Math.min(...data),rng=mx-mn||1;
  const pts=data.map((v,i)=>[i/(data.length-1)*w,h-((v-mn)/rng)*(h-8)-4]);
  const d="M "+pts.map(p=>p.join(",")).join(" L ");
  const gid="sg"+Math.round(w);
  return(
    <svg width={w} height={h} style={{overflow:"visible"}}>
      <defs><linearGradient id={gid} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={color} stopOpacity="0.22"/><stop offset="100%" stopColor={color} stopOpacity="0"/></linearGradient></defs>
      <path d={d+` L ${w},${h} L 0,${h} Z`} fill={`url(#${gid})`}/>
      <path d={d} fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
      <circle cx={pts[pts.length-1][0]} cy={pts[pts.length-1][1]} r={4} fill={color}/>
    </svg>);
}

function Ring({value,max,size=52,sw=6,color=T.acc}){
  const r=(size-sw)/2,circ=2*Math.PI*r,pct=max>0?Math.min(1,value/max):0;
  return(
    <svg width={size} height={size} style={{transform:"rotate(-90deg)",flexShrink:0}}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,.06)" strokeWidth={sw}/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={value>max&&max>0?T.red:color} strokeWidth={sw} strokeDasharray={`${pct*circ} ${circ}`} strokeLinecap="round" style={{transition:"stroke-dasharray .55s cubic-bezier(.22,.68,0,1)"}}/>
    </svg>);
}

function AnimCount({value,dec=2}){
  const[disp,setDisp]=useState(value);
  const prev=useRef(value);
  useEffect(()=>{
    const from=prev.current,to=value;prev.current=to;if(from===to)return;
    const dur=550,start=performance.now();
    const tick=(now)=>{const p=Math.min(1,(now-start)/dur),e=1-Math.pow(1-p,3);setDisp(from+(to-from)*e);if(p<1)requestAnimationFrame(tick);};
    requestAnimationFrame(tick);
  },[value]);
  return<span>{fmtMoney(disp,dec)}</span>;
}

function WealthTab({s,d}){

    {id:"crypto",label:"Crypto",icon:"🪙",color:"#f7931a"},
    {id:"property",label:"Property",icon:"🏠",color:"#fb923c"},

  const assets=s.accounts.filter(a=>a.type!=="debt").reduce((a,ac)=>a+parseFloat(ac.balance||0),0);
  const debts=s.accounts.filter(a=>a.type==="debt").reduce((a,ac)=>a+parseFloat(ac.balance||0),0);
  const nw=assets-debts,nwC=nw>=0?T.acc:T.red,ar=assets>0?assets/(assets+debts):0;

        </div>)}
      {ACC.filter(at=>at.id!=="debt").map(at=>s.accounts.filter(a=>a.type===at.id).map(ac=>(
        <button key={ac.id} onClick={()=>open(ac)} className="pr" style={{display:"flex",alignItems:"center",gap:14,padding:"14px 16px",borderRadius:18,background:T.card,border:`1px solid ${T.brd}`,cursor:"pointer",width:"100%",textAlign:"left",WebkitTapHighlightColor:"transparent"}}>
          <div style={{width:44,height:44,borderRadius:14,background:`${at.color}18`,border:`1px solid ${at.color}22`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>{at.icon}</div>
          <div style={{flex:1,minWidth:0}}><div style={{fontSize:14,fontWeight:700,color:T.t1}}>{ac.name}</div><div style={{fontSize:11,color:T.t3,marginTop:2}}>{at.label}</div></div>
          <div style={{display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
            <div style={{fontSize:17,fontWeight:800,fontFamily:T.mono,color:T.acc}}>${fmtMoney(parseFloat(ac.balance))}</div>
            <button onClick={e=>{e.stopPropagation();Confirm.show(`Delete ${ac.name}?`,"",()=>d({type:"DEL_ACC",id:ac.id}));}} className="pr" style={{background:"none",border:"none",padding:6,cursor:"pointer",opacity:.36,borderRadius:8}}>
              <svg width={13} height={13} viewBox="0 0 24 24" fill="none" stroke={T.t3} strokeWidth="2" strokeLinecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg>
            </button>
          </div>
        </button>)))}
      {s.accounts.filter(a=>a.type==="debt").map(ac=>(
        <button key={ac.id} onClick={()=>open(ac)} className="pr" style={{display:"flex",alignItems:"center",gap:14,padding:"14px 16px",borderRadius:18,background:"rgba(255,87,87,.05)",border:"1px solid rgba(255,87,87,.14)",cursor:"pointer",width:"100%",textAlign:"left",WebkitTapHighlightColor:"transparent"}}>
          <div style={{width:44,height:44,borderRadius:14,background:T.redDim,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>💳</div>
          <div style={{flex:1,minWidth:0}}><div style={{fontSize:14,fontWeight:700,color:T.t1}}>{ac.name}</div><div style={{fontSize:11,color:T.red,marginTop:2}}>Liability</div></div>
          <div style={{display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
            <div style={{fontSize:17,fontWeight:800,fontFamily:T.mono,color:T.red}}>-${fmtMoney(parseFloat(ac.balance))}</div>
            <button onClick={e=>{e.stopPropagation();Confirm.show(`Delete ${ac.name}?`,"",()=>d({type:"DEL_ACC",id:ac.id}));}} className="pr" style={{background:"none",border:"none",padding:6,cursor:"pointer",opacity:.36,borderRadius:8}}>
              <svg width={13} height={13} viewBox="0 0 24 24" fill="none" stroke={T.t3} strokeWidth="2" strokeLinecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg>
            </button>
          </div>
        </button>))}
      {showAdd&&(
        <Sheet title={editId?"Edit Account":"New Account"} onClose={()=>{setShowAdd(false);setEditId(null);}} footer={<Btn full onClick={save}>Save Account</Btn>}>
          <Field label="Account Name" value={form.name} onChange={v=>setForm(f=>({...f,name:v}))} placeholder="e.g. Chase Checking" autoFocus/>
          <Field label="Current Balance" type="number" value={form.balance} onChange={v=>setForm(f=>({...f,balance:v}))} unit="$" step="0.01" placeholder="0.00"/>
          <div style={{marginBottom:14}}>
            <div style={{fontSize:11,color:T.t3,fontWeight:600,textTransform:"uppercase",letterSpacing:".08em",marginBottom:10}}>Account Type</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              {ACC.map(t=>(
                <button key={t.id} onClick={()=>setForm(f=>({...f,type:t.id}))} className="pr"
                  style={{padding:"12px",borderRadius:14,border:`1px solid ${form.type===t.id?t.color+"50":T.brd}`,background:form.type===t.id?`${t.color}12`:"transparent",
                    color:form.type===t.id?t.color:T.t3,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:T.font,display:"flex",alignItems:"center",gap:8}}>
                  <span style={{fontSize:18}}>{t.icon}</span><span>{t.label}</span>
                </button>))}
            </div>
          </div>
        </Sheet>)}
    </div>);
}
function SettingsTab({s,d,score,missions}){
  const[open,setOpen]=useState(null);
  const tog=id=>setOpen(o=>o===id?null:id);
  const Acc=({id,icon,label,children})=>(
    <div style={{borderRadius:18,background:T.card,border:`1px solid ${T.brd}`,overflow:"hidden",marginBottom:10}}>
      <button onClick={()=>tog(id)} className="pr" style={{display:"flex",alignItems:"center",gap:12,padding:"16px",width:"100%",background:"none",border:"none",cursor:"pointer",textAlign:"left",WebkitTapHighlightColor:"transparent"}}>
        <div style={{width:38,height:38,borderRadius:12,background:T.accDim,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>{icon}</div>
        <span style={{fontSize:14,fontWeight:600,color:T.t1,flex:1}}>{label}</span>
        <svg width={16} height={16} viewBox="0 0 24 24" fill="none" stroke={T.t3} strokeWidth="2" strokeLinecap="round" style={{transform:open===id?"rotate(90deg)":"none",transition:"transform .2s",flexShrink:0}}><polyline points="9 18 15 12 9 6"/></svg>
      </button>
      {open===id&&<div style={{padding:"0 16px 16px",borderTop:`1px solid ${T.brd}`}}><div style={{paddingTop:14}}>{children}</div></div>}
    </div>);
  return(
    <div style={{display:"flex",flexDirection:"column"}}>
      <div style={{fontSize:23,fontWeight:800,color:T.t1,marginBottom:16}}>Settings</div>
      <Acc id="rank" icon="🏆" label="IRON Rank">
        <IronCard score={score} compact={false}/>
        <div style={{fontSize:11,color:T.t3,lineHeight:1.6,marginTop:12,marginBottom:12}}>Rank up by logging consistently, hitting savings goals, and completing daily missions.</div>
        <a href="https://ironlog.space" target="_blank" rel="noopener" style={{display:"block",padding:"12px",borderRadius:12,border:`1px solid ${T.acc}25`,background:T.accDim,color:T.acc,fontSize:13,fontWeight:600,textAlign:"center",textDecoration:"none"}}>Open IRONLOG ↗</a>
      </Acc>
      <Acc id="missions" icon="⚡" label="Daily Missions">
        <Missions missions={missions}/>
      </Acc>
      <Acc id="export" icon="💾" label="Export Data">
        <div style={{fontSize:12,color:T.t3,marginBottom:14,lineHeight:1.6}}>{s.transactions.length} transactions · {s.accounts.length} accounts</div>
        <Btn v="ghost" full onClick={()=>{
          const rows=["Date,Type,Category,Amount,Note",...s.transactions.map(tx=>`${tx.date},${tx.type},${getCat(tx.catId||tx.cat).label},${tx.amount},"${(tx.note||"").replace(/"/g,'""')}"`)] .join("\n");
          const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([rows],{type:"text/csv"}));a.download=`financelog-${today()}.csv`;a.click();
          Toast.show("CSV exported ✓",T.acc);}}>
          <svg width={15} height={15} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Export as CSV
        </Btn>
      </Acc>
      <Acc id="privacy" icon="🔒" label="Privacy & Data">
        <div style={{fontSize:12,color:T.t2,marginBottom:16,lineHeight:1.7,padding:"12px 14px",borderRadius:12,background:"rgba(0,212,160,.06)",border:"1px solid rgba(0,212,160,.14)"}}>
          🔐 All data is stored <strong style={{color:T.t1}}>only on this device</strong> using localStorage. Nothing is sent to any server.
        </div>
        <Btn v="danger" full onClick={()=>Confirm.show("Delete all data?","All transactions, budgets, and accounts will be permanently deleted.",()=>{["fl-tx","fl-accounts","fl-budgets","fl-last-level"].forEach(k=>localStorage.removeItem(k));window.location.reload();})}>
          <svg width={15} height={15} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg>
          Clear All Data
        </Btn>
      </Acc>
      <div style={{marginTop:16,textAlign:"center"}}>
        <div style={{fontSize:12,color:T.t3,fontWeight:600,letterSpacing:".04em"}}>FinanceLog</div>
        <div style={{fontSize:10,color:T.t3,opacity:.4,marginTop:2}}>by IRONLOG · v2.0 · Local storage only</div>
      </div>
    </div>);
}

function App(){
  const[s,d]=useReducer(reducer,INIT);
  const score=useMemo(()=>calcScore(s),[s.transactions,s.accounts,s.budgets]);
  const missions=useMemo(()=>getMissions(s),[s.transactions,s.accounts,s.budgets]);
  const{celebrating,celebRank,dismiss}=useLevelUp(score,"fl-last-level");

  useEffect(()=>{
    d({type:"INIT",p:{transactions:LS.get("fl-tx")||[],accounts:LS.get("fl-accounts")||[],budgets:LS.get("fl-budgets")||{}}});
  },[]);

  useEffect(()=>{
    if(!s.loaded)return;
    LS.set("fl-tx",s.transactions);
    LS.set("fl-accounts",s.accounts);
    LS.set("fl-budgets",s.budgets);
  },[s.transactions,s.accounts,s.budgets,s.loaded]);

  if(!s.loaded)return(
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:T.bg,flexDirection:"column",gap:14}}>
      <div style={{fontSize:40}}>💎</div>
      <div style={{fontSize:10,color:T.t3,fontFamily:T.mono,letterSpacing:".12em",animation:"pulse 1.5s infinite"}}>LOADING</div>
    </div>);

  const TABS=[
    {id:"home",label:"Home",icon:(a)=>(
      <svg width={22} height={22} viewBox="0 0 24 24" fill={a?"currentColor":"none"} stroke="currentColor" strokeWidth={a?"0":"1.8"} strokeLinecap="round">
        <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V9.5z"/><polyline points="9 21 9 12 15 12 15 21" stroke={a?"rgba(7,14,24,0.5)":"currentColor"} strokeWidth="1.8"/>
      </svg>)},
    {id:"transactions",label:"Activity",icon:(a)=>(
      <svg width={22} height={22} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round">
        <rect x="2" y="5" width="20" height="14" rx="2" fill={a?"currentColor":"none"} strokeWidth={a?"0":"1.8"}/>
        <line x1="2" y1="10" x2="22" y2="10" stroke={a?"rgba(7,14,24,0.5)":"currentColor"}/>
        <line x1="7" y1="15" x2="9" y2="15" stroke={a?"rgba(7,14,24,0.55)":"currentColor"}/>
        <line x1="12" y1="15" x2="17" y2="15" stroke={a?"rgba(7,14,24,0.55)":"currentColor"}/>
      </svg>)},
    {id:"budget",label:"Budget",icon:(a)=>(
      <svg width={22} height={22} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round">
        <circle cx="12" cy="12" r="10" fill={a?"currentColor":"none"} strokeWidth={a?"0":"1.8"}/>
        <path d="M12 6v2M12 16v2M8 12h8" stroke={a?"rgba(7,14,24,0.5)":"currentColor"} strokeWidth="2"/>
      </svg>)},
    {id:"wealth",label:"Wealth",icon:(a)=>(
      <svg width={22} height={22} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round">
        <polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/>
        <polyline points="16 7 22 7 22 13"/>
      </svg>)},
    {id:"settings",label:"More",icon:(a)=>(
      <svg width={22} height={22} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>)},
  ];

  return(
    <div style={{height:"100%",display:"flex",flexDirection:"column",background:T.bg,position:"relative"}}>
      <div style={{paddingTop:"env(safe-area-inset-top,0px)",background:T.bg,flexShrink:0}}/>
      <div style={{flex:1,minHeight:0,position:"relative"}}>
        <div className="ms" style={{paddingTop:20}}>
          {s.tab==="home"&&<HomeTab s={s} d={d} score={score} missions={missions}/>}
          {s.tab==="transactions"&&<TxTab s={s} d={d}/>}
          {s.tab==="budget"&&<BudgetTab s={s} d={d}/>}
          {s.tab==="wealth"&&<WealthTab s={s} d={d}/>}
          {s.tab==="settings"&&<SettingsTab s={s} d={d} score={score} missions={missions}/>}
        </div>
      </div>
      <div style={{position:"absolute",bottom:0,left:0,right:0,display:"flex",justifyContent:"center",padding:`8px 16px max(20px,env(safe-area-inset-bottom,20px)) 16px`,pointerEvents:"none"}}>
        <div style={{display:"flex",gap:2,padding:"8px",borderRadius:28,background:"rgba(7,14,24,0.92)",border:"1px solid rgba(255,255,255,0.1)",backdropFilter:"blur(24px)",boxShadow:"0 8px 40px rgba(0,0,0,0.6),0 0 0 1px rgba(255,255,255,0.04)",pointerEvents:"all",maxWidth:380,width:"100%"}}>
          {TABS.map(tab=>{
            const active=s.tab===tab.id;
            return(
              <button key={tab.id} onClick={()=>{Haptic.light();d({type:"TAB",tab:tab.id});}}
                style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:3,background:active?T.accDim:"transparent",borderRadius:20,border:`1px solid ${active?"rgba(0,212,160,.22)":"transparent"}`,padding:"8px 4px",cursor:"pointer",WebkitTapHighlightColor:"transparent",transition:"all .2s",minHeight:52}}>
                <div style={{color:active?T.acc:T.t3,transition:"color .2s"}}>{tab.icon(active)}</div>
                <span style={{fontSize:9,fontWeight:active?700:500,color:active?T.acc:T.t3,letterSpacing:".02em"}}>{tab.label}</span>
              </button>);
          })}
        </div>
      </div>
      <ToastBar/>
      <ConfirmDlg/>
      {celebrating&&celebRank&&<LevelUp rank={celebRank} onDismiss={dismiss}/>}
    </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
</body>
</html>
