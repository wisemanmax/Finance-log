<style>

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;width:100%;background:#08080d;margin:0;padding:0;overflow:hidden;position:fixed;top:0;left:0;right:0;bottom:0}

#splash-root{position:fixed;inset:0;background:#08080d;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;transition:opacity .5s ease,transform .5s ease}

/* ── PWA install modal ── */
@keyframes installIn{from{opacity:0;transform:translateY(30px)}
@keyframes slideInRight{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}to{opacity:1;transform:translateY(0)}}

  height:100%;overflow-y:auto;-webkit-overflow-scrolling:touch;

}

.field-wrap{margin-bottom:12px}

<!-- Auth Logic (runs immediately) -->

<script>

// ─── Config ───────────────────────────────────────────────────────────────────
const API_URL = "https://api.ironlog.space";

// ─── Utils ────────────────────────────────────────────────────────────────────
const LS = {
  get: (k) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : null; } catch { return null; } },
  set: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} },
};
const Cookie = {
  get: (name) => { const m = document.cookie.match(new RegExp("(^| )" + name + "=([^;]+)")); return m ? decodeURIComponent(m[2]) : null; },
  set: (name, value, days = 30) => {
    const exp = new Date(Date.now() + days * 864e5).toUTCString();
    const isIronlog = window.location.hostname.endsWith('ironlog.space');
    document.cookie = `${name}=${encodeURIComponent(value)};expires=${exp};${isIronlog ? 'domain=.ironlog.space;' : ''}path=/;${isIronlog ? 'secure;' : ''}samesite=lax`;
  },
  clear: (name) => {
    const isIL = window.location.hostname.endsWith('ironlog.space');
    document.cookie = `${name}=;expires=Thu, 01 Jan 1970 00:00:00 GMT;${isIL ? 'domain=.ironlog.space;' : ''}path=/;${isIL ? 'secure' : ''}`;
  },
};
const uid = () => Math.random().toString(36).slice(2) + Date.now().toString(36);
const today = () => { const _d = new Date(); return `${_d.getFullYear()}-${String(_d.getMonth()+1).padStart(2,"0")}-${String(_d.getDate()).padStart(2,"0")}`; };
const isValidEmail = (e) => /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(e);

// ─── Design Tokens (matches IronLog) ─────────────────────────────────────────
const V = {
  bg: "#08080d",
  card: "rgba(255,255,255,0.035)",
  cardBorder: "rgba(255,255,255,0.06)",
  accent: "#00f5a0",
  accent2: "#00d9f5",
  danger: "#ff6b6b",
  warn: "#ff9f43",
  text: "#e8e8ec",
  text2: "#8b8b9e",
  text3: "#4a4a5c",
  font: "'Outfit', sans-serif",
  mono: "'JetBrains Mono', monospace",
};

// ─── SSO Detection ────────────────────────────────────────────────────────────
const detectSSO = () => {
  const cookie = Cookie.get("ironlog_session");
  const storedToken = LS.get("ft-session-token");
  const storedEmail = LS.get("ft-session-email");
  const financeToken = LS.get("fl-session-token");
  const financeEmail = LS.get("fl-session-email");
  if (financeToken && financeEmail) return { type: "fl_session", email: financeEmail, token: financeToken };
  if (cookie) return { type: "ironlog_cookie", token: cookie };
  if (storedToken && storedEmail) return { type: "ironlog_local", email: storedEmail, token: storedToken };
  return null;
};

// ─── Session Manager ──────────────────────────────────────────────────────────
const SessionManager = {
  create: async (email, pin, deviceId) => {
    try {
      const res = await fetch(`${API_URL}/api/auth/session`, {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ action: "create", email: email.toLowerCase(), pin, deviceId }),
      });
      if (!res.ok) return false;
      const json = await res.json();
      LS.set("fl-session-token", json.token);
      LS.set("fl-session-email", email.toLowerCase());
      LS.set("fl-session-expires", json.expires_at);
      Cookie.set("ironlog_session", json.token, 30);
      return true;
    } catch { return false; }
  },
  validateSSO: async (token) => {
    try {
      const res = await fetch(`${API_URL}/api/auth/session`, {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ action: "validate", token }),
      });
      if (!res.ok) return null;
      return await res.json();
    } catch { return null; }
  },
  sendVerifyCode: async (email) => {
    try {
      await fetch(`${API_URL}/api/auth/session`, {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ action: "send_verify_code", email: email.toLowerCase() }),
      });
    } catch {}
  },
  confirmVerify: async (email, code) => {
    try {
      const res = await fetch(`${API_URL}/api/auth/session`, {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ action: "confirm_verify_code", email: email.toLowerCase(), code }),
      });
      return res.ok;
    } catch { return false; }
  },
  sendResetCode: async (email) => {
    try {
      const res = await fetch(`${API_URL}/api/auth/session`, {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ action: "send_reset_code", email: email.toLowerCase() }),
      });
      return res.ok;
    } catch { return false; }
  },
  verifyResetCode: async (email, code) => {
    try {
      const res = await fetch(`${API_URL}/api/auth/session`, {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ action: "verify_reset_code", email: email.toLowerCase(), code }),
      });
      return res.ok;
    } catch { return false; }
  },
  setNewPin: async (email, code, newPin) => {
    try {
      const res = await fetch(`${API_URL}/api/auth/session`, {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ action: "set_new_pin", email: email.toLowerCase(), code, newPin }),
      });
      return res.ok;
    } catch { return false; }
  },
};

// ─── Registration ─────────────────────────────────────────────────────────────
async function registerUser(profile, goals, pin) {
  if (window._offlineMode) return true; // offline bypass
  const deviceId = LS.get("fl-device-id") || uid();
  LS.set("fl-device-id", deviceId);
  try {
    const res = await fetch(`${API_URL}/api/users`, {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        ...profile, ...goals,
        appSource: "financelog",
        accountPin: pin,
        units: "usd", split: null,
        consentedAt: new Date().toISOString(),
        consentVersion: "1.0",
        deviceId, createdAt: new Date().toISOString(),
      }),
    });
    return res.ok;
  } catch { return false; }
}

// ─── Sign-in / Restore ────────────────────────────────────────────────────────
async function signInPull(email, pin) {
  if (window._offlineMode) return null; // offline bypass
  const deviceId = LS.get("fl-device-id") || uid();
  LS.set("fl-device-id", deviceId);
  try {
    const res = await fetch(`${API_URL}/api/sync/pull`, {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email: email.toLowerCase(), deviceId, pin }),
    });
    if (!res.ok) return null;
    return await res.json();
  } catch { return null; }
}

function applyRestore(data, email) {
  if (data?.transactions) LS.set("fl-tx", data.transactions);
  if (data?.accounts) LS.set("fl-accounts", data.accounts);
  if (data?.budgets) LS.set("fl-budgets", data.budgets);
  if (data?.goals) LS.set("fl-goals-v2", data.goals);
  if (data?.recurring) LS.set("fl-recurring", data.recurring);
  LS.set("fl-session-email", email.toLowerCase());
  LS.set("fl-session-token", data?.token || uid());
  LS.set("fl-onboarded", true);
}

// ─── Vanilla UI Helpers ───────────────────────────────────────────────────────
let _state = {};
let _currentView = null;

function setState(updates) { _state = { ..._state, ...updates }; render(); }
function render() {
  const root = document.getElementById("auth-root");
  if (root && _currentView) {
    // Clear and re-render into the inner .auth-inner if present, else root itself
    const inner = root.querySelector(".auth-inner") || root;
    inner.innerHTML = "";
    _currentView(inner, _state);
  }
}

function Ipt(container, { label, type = "text", value, placeholder, inputMode, maxLength, unit, mono } = {}) {
  const wrap = document.createElement("div");
  wrap.style.cssText = "margin-bottom:12px";
  if (label) {
    const lbl = document.createElement("div");
    lbl.style.cssText = `font-size:11px;color:${V.text3};text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;font-weight:600`;
    lbl.textContent = label;
    wrap.appendChild(lbl);
  }
  const rel = document.createElement("div");
  rel.style.cssText = "position:relative";
  const inp = document.createElement("input");
  inp.type = type; inp.value = value || ""; inp.placeholder = placeholder || "";
  if (inputMode) inp.setAttribute("inputmode", inputMode);
  if (maxLength) inp.maxLength = maxLength;
  inp.style.cssText = `width:100%;padding:12px 14px;padding-right:${unit ? 44 : 14}px;background:rgba(255,255,255,0.04);border:1px solid ${V.cardBorder};border-radius:12px;color:${V.text};font-size:${mono ? 24 : 16}px;font-family:${mono ? V.mono : V.font};outline:none;box-sizing:border-box;-webkit-appearance:none;min-height:44px${mono ? ";text-align:center;letter-spacing:12px" : ""}`;
  rel.appendChild(inp);
  if (unit) {
    const u = document.createElement("span");
    u.style.cssText = `position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:11px;color:${V.text3}`;
    u.textContent = unit;
    rel.appendChild(u);
  }
  wrap.appendChild(rel);
  container.appendChild(wrap);
  return inp;
}

function Btn(container, { label, variant = "primary", full, onClick } = {}) {
  const btn = document.createElement("button");
  const base = `display:flex;align-items:center;justify-content:center;gap:6px;border-radius:12px;border:none;font-size:14px;font-weight:600;font-family:${V.font};cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all .15s;min-height:44px;${full ? "width:100%;" : ""}`;
  const variants = {
    primary: `${base}background:linear-gradient(135deg,${V.accent},${V.accent2});color:${V.bg};padding:12px 20px`,
    secondary: `${base}background:rgba(255,255,255,0.06);color:${V.text2};padding:12px 20px;border:1px solid ${V.cardBorder}`,
    danger: `${base}background:rgba(255,107,107,0.12);color:${V.danger};padding:12px 20px`,
    ghost: `${base}background:transparent;color:${V.text3};padding:8px 12px;font-size:13px`,
  };
  btn.style.cssText = variants[variant] || variants.primary;
  btn.textContent = label;
  if (onClick) btn.addEventListener("click", onClick);
  container.appendChild(btn);
  return btn;
}

function Card(container, styles = "") {
  const div = document.createElement("div");
  div.style.cssText = `padding:16px;border-radius:14px;background:${V.card};border:1px solid ${V.cardBorder};margin-bottom:12px;${styles}`;
  container.appendChild(div);
  return div;
}

function PinDots(container, pin) {
  const row = document.createElement("div");
  row.style.cssText = "display:flex;justify-content:center;gap:6px;margin-top:8px";
  for (let i = 0; i < 6; i++) {
    const dot = document.createElement("div");
    dot.style.cssText = `width:10px;height:10px;border-radius:5px;background:${i < pin.length ? V.accent : "rgba(255,255,255,0.1)"};transition:all .15s`;
    row.appendChild(dot);
  }
  container.appendChild(row);
  return row;
}

    const ds = container.querySelectorAll("div");
    ds.forEach((d, i) => { d.style.background = i < len ? V.accent : "rgba(255,255,255,0.1)"; });

    _currentView = viewSignup; render();
  });
}

      if (ok) { setState({ signInStep: "new_pin", forgotCode: code, signInError: "" }); _currentView = viewSignIn; render(); }
      else { setState({ signInError: "Invalid or expired code" }); _currentView = viewSignIn; render(); }

      ${err ? `<div style="font-size:12px;color:${V.danger};margin-bottom:8px">${err}</div>` : ""}

function mountApp() {
  document.getElementById("auth-root").style.display = "none";
  document.getElementById("app-shell").style.display = "flex";

  function doMount() {
    if (window.__reactMounted) return;
    if (window.__reactReady && window.__mountApp) {
      window.__mountApp();
    } else {
      window.__pendingMount = function() { window.__mountApp(); };
    }
  }

  if (_isNewUser) {
    _isNewUser = false;
    _tourSlide = 0;
    viewTour();
    doMount(); // pre-mount React in background while tour plays
  } else {
    doMount();
  }
}

// ─── Boot ─────────────────────────────────────────────────────────────────────
(function() {
  // ── Splash messages ──
  const MSGS = [
    "Loading FinanceLog…",
    "Preparing your dashboard…",
    "Setting up charts…",
    "Almost ready…",
  ];
  let msgIdx = 0;
  const msgEl = document.getElementById("splash-msg");

  function cycleSplashMsg() {
    if (!msgEl) return;
    msgEl.style.opacity = "0";
    setTimeout(() => {
      msgIdx = (msgIdx + 1) % MSGS.length;
      msgEl.textContent = MSGS[msgIdx];
      msgEl.style.opacity = "1";
    }, 200);
  }
  const msgTimer = setInterval(cycleSplashMsg, 900);

  function hideSplash(then) {
    clearInterval(msgTimer);
    const splash = document.getElementById("splash-root");
    if (splash) {
      splash.classList.add("fade-out");
      setTimeout(() => {
        splash.style.display = "none";
        then();
      }, 500);
    } else {
      then();
    }
  }

  function showAuth(sso) {
    const authRoot = document.getElementById("auth-root");
    if (authRoot) authRoot.style.display = "flex";
    _state = { detectedSSO: sso || null };
    _currentView = viewWelcome;
    render();
  }

  function startAuth(sso) {
    hideSplash(() => showAuth(sso));
  }

  // Restore offline mode flag if session was an offline one
  const _offlineEmail = LS.get("fl-session-email");
  if (_offlineEmail === "offline-tester@demo.local") window._offlineMode = true;
  const onboarded = LS.get("fl-onboarded");
  const sessionToken = LS.get("fl-session-token");

  if (onboarded && sessionToken) {
    // Returning user — short splash then go straight to app
    setTimeout(() => hideSplash(() => mountApp()), 800);
    return;
  }

  // Mark as new user so tour fires after signup
  _isNewUser = true;

  // Minimum splash duration: 1.4s, then auth
  const minDelay = new Promise(r => setTimeout(r, 1400));

  const sso = detectSSO();
  if (sso && sso.type !== "fl_session") {
    const ssoCheck = new Promise(resolve => {
      const t = setTimeout(() => resolve(null), 3000);
      SessionManager.validateSSO(sso.token)
        .then(r => { clearTimeout(t); resolve(r?.valid ? { ...sso, email: r.email || sso.email, valid: true } : null); })
        .catch(() => { clearTimeout(t); resolve(null); });
    });
    Promise.all([minDelay, ssoCheck]).then(([, ssoResult]) => startAuth(ssoResult));
    return;
  }

  minDelay.then(() => startAuth(sso));
})();

<script>


function ld(url,name){return new Promise(function(res,rej){var s=document.createElement('script');s.src=url;s.crossOrigin='anonymous';s.onload=res;s.onerror=function(){rej(new Error(name+' failed'));};document.head.appendChild(s);})}
function showReactError(msg){
  var el = document.getElementById('react-root');
  if(el) el.innerHTML='<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:24px;text-align:center;gap:12px"><div style="font-size:28px">⚠️</div><div style="color:#ff5757;font-family:monospace;font-size:12px;line-height:1.7;max-width:300px">'+msg+'</div></div>';
}
window.__reactReady = false;

(function(){
  ld('https://cdn.jsdelivr.net/npm/react@18.3.1/umd/react.production.min.js','React')
  .catch(function(){return ld('https://unpkg.com/react@18/umd/react.production.min.js','React');})
  .then(function(){return ld('https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.production.min.js','ReactDOM').catch(function(){return ld('https://unpkg.com/react-dom@18/umd/react-dom.production.min.js','ReactDOM');});})
  .then(function(){return ld('https://cdn.jsdelivr.net/npm/@babel/standalone@7.26.0/babel.min.js','Babel').catch(function(){return ld('https://unpkg.com/@babel/standalone@7.24.0/babel.min.js','Babel');});})
  .then(function(){
    if(typeof React==='undefined') throw new Error('React failed to load');
    if(typeof Babel==='undefined') throw new Error('Babel failed to load');
    var src = document.getElementById('app-src');
    var code;
    try{ code = Babel.transform(src.textContent,{presets:[['react',{runtime:'classic'}]],filename:'app.jsx'}).code; }
    catch(e){ throw new Error('Compile error: '+e.message.slice(0,120)); }
    try{ new Function(code)(); }
    catch(e){ throw new Error('Runtime error: '+e.message.slice(0,120)); }
    // React app compiled and __mountApp is now defined
    window.__reactReady = true;
    // If auth already completed and is waiting for React, mount now
    if(window.__pendingMount){ window.__pendingMount(); window.__pendingMount = null; }
  })
  .catch(function(e){ showReactError(e.message); });
})();


</script>

function calcScore(s){
  let xp=0;const txs=s.transactions||[];
  xp+=txs.length*5;xp+=(s.accounts||[]).length*20;
  xp+=Object.keys(s.budgets||{}).filter(k=>parseFloat(s.budgets[k])>0).length*8;
  const mm={};
  txs.forEach(tx=>{const m=tx.date.slice(0,7);if(!mm[m])mm[m]={i:0,e:0};if(tx.type==="income")mm[m].i+=tx.amount;else mm[m].e+=tx.amount;});
  Object.values(mm).forEach(m=>{if(m.i-m.e>0)xp+=50;if(m.i>0&&(m.i-m.e)/m.i>=0.2)xp+=75;});
  (s.goals||[]).forEach(g=>{if(g.current>=g.target)xp+=100;else if(g.current>0&&g.current/g.target>=0.5)xp+=30;});
  const rank=[...IRON_RANKS].reverse().find(r=>xp>=r.xpNeeded)||IRON_RANKS[0];
  const next=IRON_RANKS.find(r=>r.level===rank.level+1);
  const into=xp-rank.xpNeeded,forNext=next?(next.xpNeeded-rank.xpNeeded):null;
  const pct=forNext?Math.min(100,Math.round(into/forNext*100)):100;
  return{xp,rank,nextRank:next,xpIntoRank:into,xpForNext:forNext,pct};
}

function getMissions(s){
  const td=today(),m=td.slice(0,7);
  const todayTx=(s.transactions||[]).some(tx=>tx.date===td);
  const hasInc=(s.transactions||[]).some(tx=>tx.date.startsWith(m)&&tx.type==="income");
  const hasAcc=(s.accounts||[]).length>0;
  const budCount=Object.keys(s.budgets||{}).filter(k=>parseFloat(s.budgets[k])>0).length;
  const mTx=(s.transactions||[]).filter(tx=>tx.date.startsWith(m));
  const inc=mTx.filter(t=>t.type==="income").reduce((a,t)=>a+t.amount,0);
  const exp=mTx.filter(t=>t.type==="expense").reduce((a,t)=>a+t.amount,0);
  const nw=(s.accounts||[]).reduce((a,ac)=>ac.type==="debt"?a-parseFloat(ac.balance||0):a+parseFloat(ac.balance||0),0);
  return[
    {icon:"💳",title:"Log a Transaction",desc:"Add income or expense today",xp:15,done:todayTx},
    {icon:"💼",title:"Log Income",desc:"Record income this month",xp:20,done:hasInc},
    {icon:"🏦",title:"Track Accounts",desc:"Add at least one account",xp:25,done:hasAcc},
    {icon:"🎯",title:"Set 3 Budgets",desc:"Define budgets for 3+ categories",xp:30,done:budCount>=3},
    {icon:"📈",title:"Positive Month",desc:"Income exceeds expenses",xp:40,done:inc-exp>0},
    {icon:"💰",title:"Positive Net Worth",desc:"Assets exceed liabilities",xp:30,done:nw>0},
  ];
}

function getInsights(s){
  const m=thisMonth(),pm=monthAgo(1);
  const mTx=s.transactions.filter(tx=>tx.date.startsWith(m));
  const pmTx=s.transactions.filter(tx=>tx.date.startsWith(pm));
  const mInc=mTx.filter(t=>t.type==="income").reduce((a,t)=>a+t.amount,0);
  const mExp=mTx.filter(t=>t.type==="expense").reduce((a,t)=>a+t.amount,0);
  const pmExp=pmTx.filter(t=>t.type==="expense").reduce((a,t)=>a+t.amount,0);
  const ins=[];
  if(mInc>0){const r=Math.round((mInc-mExp)/mInc*100);
    if(r>=30)ins.push({icon:"🔥",label:"Great savings",text:`${r}% savings rate`,color:T.acc});
    else if(r>0)ins.push({icon:"📊",label:"Savings rate",text:`Saving ${r}% of income`,color:T.warn});
    else ins.push({icon:"⚠️",label:"Overspending",text:"Expenses exceed income",color:T.danger});
  }
  if(pmExp>0&&mExp>0){const diff=Math.round((mExp-pmExp)/pmExp*100);
    if(diff>15)ins.push({icon:"📈",label:"Spending up",text:`${diff}% more than last month`,color:T.danger});
    else if(diff<-10)ins.push({icon:"📉",label:"Spending down",text:`${Math.abs(diff)}% less`,color:T.acc});
  }
  const cm={};mTx.filter(t=>t.type==="expense").forEach(t=>{cm[t.catId]=(cm[t.catId]||0)+t.amount;});
  const top=Object.entries(cm).sort((a,b)=>b[1]-a[1])[0];
  if(top){const c=getCat(top[0]);const pct=mExp>0?Math.round(top[1]/mExp*100):0;ins.push({icon:c.icon,label:"Top spend",text:`${c.label}: $${fmtMoney(top[1],0)} (${pct}%)`,color:c.color});}
  return ins.slice(0,3);
}

function useLevelUp(score,lsKey){

}

// ── AnimCount ─────────────────────────────────────────────────────────────────
function AnimCount({value,dec=0}){
  const[disp,setDisp]=useState(value);
  const ref=useRef(value);
  useEffect(()=>{
    const start=ref.current,end=value,dur=600,s=performance.now();
    ref.current=value;
    let rafId;
    function tick(now){
      const p=Math.min((now-s)/dur,1);
      const e=p<.5?2*p*p:1-Math.pow(-2*p+2,2)/2;
      setDisp(start+(end-start)*e);
      if(p<1)rafId=requestAnimationFrame(tick);
    }
    rafId=requestAnimationFrame(tick);
    return()=>cancelAnimationFrame(rafId);
  },[value]);
  return<span>{fmtMoney(disp,dec)}</span>;
}

// ── Sparkline ─────────────────────────────────────────────────────────────────
function Sparkline({data,w=280,h=44,color=T.acc,gId="spg"}){
  const{dark}=useTheme();
  if(!data||data.length<2)return null;
  const max=Math.max(...data.map(Math.abs),1);
  const mid=h/2;
  const pts=data.map((v,i)=>[i/(data.length-1)*w, mid-v/max*mid*0.85]);
  const path=pts.map((p,i)=>(i===0?`M${p[0]},${p[1]}`:`L${p[0]},${p[1]}`)).join(" ");
  const area=`${path} L${pts[pts.length-1][0]},${h} L${pts[0][0]},${h} Z`;
  const months=Array.from({length:data.length},(_,i)=>mShort(monthAgo(data.length-1-i)));
  return(
    <svg width="100%" viewBox={`0 0 ${w} ${h+18}`} style={{overflow:"visible"}}>
      <defs>
        <linearGradient id={gId} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.2"/>
          <stop offset="100%" stopColor={color} stopOpacity="0"/>
        </linearGradient>
      </defs>
      <path d={area} fill={`url(#${gId})`}/>
      <line x1="0" y1={mid} x2={w} y2={mid} stroke={dark?"rgba(255,255,255,.06)":"rgba(0,0,0,.07)"} strokeWidth="1" strokeDasharray="3,3"/>
      <path d={path} fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
      {pts.map((p,i)=><circle key={i} cx={p[0]} cy={p[1]} r="2.5" fill={data[i]>=0?T.acc:T.danger}/>)}

// ── DonutChart ────────────────────────────────────────────────────────────────
function DonutChart({data,size=140,sw=18,onSegClick}){
  const{dark}=useTheme();
  const[hov,setHov]=useState(null);
  const hole=dark?"rgba(0,0,0,0.35)":"rgba(240,240,245,0.92)";
  if(!data||!data.length)return null;
  const total=data.reduce((a,d)=>a+d.v,0);
  const r=(size-sw)/2,cx=size/2,cy=size/2,circ=2*Math.PI*r;
  let offset=0;
  return(
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{cursor:onSegClick?"pointer":"default"}}>
      {data.map((d,i)=>{
        const pct=d.v/total,dash=circ*pct,gap=circ-dash;
        const isHov=hov===i;
        const slice=<circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke={d.color}
          strokeWidth={isHov?sw+3:sw} strokeDasharray={`${dash} ${gap}`}
          strokeDashoffset={-offset*circ} strokeLinecap="butt"
          style={{transform:"rotate(-90deg)",transformOrigin:"center",transition:"stroke-width .15s",opacity:hov!==null&&!isHov?.6:1}}
          onClick={onSegClick?()=>{Haptic.light();onSegClick(d);}:undefined}
          onMouseEnter={()=>setHov(i)} onMouseLeave={()=>setHov(null)}/>;
        offset+=pct;return slice;
      })}
      <circle cx={cx} cy={cy} r={r-sw/2-1} fill={hole}/>
    </svg>);
}

// ── Ring ──────────────────────────────────────────────────────────────────────
function Ring({value,max,size=52,sw=6,color=T.acc}){
  const{dark}=useTheme();
  const track=dark?"rgba(255,255,255,.07)":"rgba(0,0,0,.08)";
  const r=(size-sw)/2,circ=2*Math.PI*r,pct=Math.min(value/max,1),dash=circ*pct;
  return(
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={track} strokeWidth={sw}/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={sw}
        strokeDasharray={`${dash} ${circ-dash}`} strokeLinecap="round"
        style={{transform:"rotate(-90deg)",transformOrigin:"center",transition:"stroke-dasharray .5s ease"}}/>
    </svg>);
}

// ── MoM Bar Chart ─────────────────────────────────────────────────────────────
function MoMChart({transactions}){
  const{dark:dark_}=useTheme();
  const months=Array.from({length:4},(_,i)=>monthAgo(3-i));
  const data=months.map(mo=>{
    const tx=transactions.filter(t=>t.date.startsWith(mo));
    return{mo,inc:tx.filter(t=>t.type==="income").reduce((a,t)=>a+t.amount,0),exp:tx.filter(t=>t.type==="expense").reduce((a,t)=>a+t.amount,0)};
  });
  const maxVal=Math.max(...data.flatMap(bar=>[bar.inc,bar.exp]),1);
  const bw=28,gap=20,pad=8,chartW=(bw*2+gap)*4+pad*3,chartH=80;
  return(
    <svg width="100%" viewBox={`0 0 ${chartW} ${chartH+20}`} style={{overflow:"visible"}}>
      {data.map((bar,i)=>{
        const x=i*(bw*2+gap+pad);
        const ih=Math.max(bar.inc/maxVal*chartH,2),eh=Math.max(bar.exp/maxVal*chartH,2);
        return(
          <g key={bar.mo}>
            <rect x={x} y={chartH-ih} width={bw} height={ih} rx="4" fill={`${T.acc}55`}/>
            <rect x={x+bw+2} y={chartH-eh} width={bw} height={eh} rx="4" fill={`${T.danger}55`}/>
            <text x={x+bw+1} y={chartH+14} textAnchor="middle" fontSize="9" fill={dark_?"#4a4a5c":"#9a9ab0"} fontFamily={T.font}>{mShort(bar.mo)}</text>
          </g>);
      })}
      <line x1="0" y1={chartH} x2={chartW} y2={chartH} stroke={dark_?"rgba(255,255,255,.07)":"rgba(0,0,0,.1)"} strokeWidth="1"/>
    </svg>);
}

const INIT={tab:"home",transactions:[],accounts:[],budgets:{},goals:[],recurring:[],catFilter:"",loaded:false};
function reducer(s,a){
  switch(a.type){
    case"INIT":return{...s,...a.p,loaded:true};
    case"TAB":return{...s,tab:a.tab};
    case"ADD_TX":return{...s,transactions:[a.tx,...s.transactions]};
    case"DEL_TX":return{...s,transactions:s.transactions.filter(t=>t.id!==a.id)};
    case"UPD_TX":return{...s,transactions:s.transactions.map(t=>t.id===a.tx.id?a.tx:t)};
    case"ADD_ACC":return{...s,accounts:[...s.accounts,a.acc]};
    case"DEL_ACC":return{...s,accounts:s.accounts.filter(x=>x.id!==a.id)};
    case"UPD_ACC":return{...s,accounts:s.accounts.map(x=>x.id===a.acc.id?a.acc:x)};
    case"SET_BUD":return{...s,budgets:{...s.budgets,...a.b}};
    case"ADD_GOAL":return{...s,goals:[...s.goals,a.goal]};
    case"UPD_GOAL":return{...s,goals:s.goals.map(g=>g.id===a.goal.id?a.goal:g)};
    case"DEL_GOAL":return{...s,goals:s.goals.filter(g=>g.id!==a.id)};
    case"ADD_RECUR":return{...s,recurring:[...s.recurring,a.r]};
    case"DEL_RECUR":return{...s,recurring:s.recurring.filter(r=>r.id!==a.id)};
    case"UPD_RECUR":return{...s,recurring:s.recurring.map(r=>r.id===a.r.id?a.r:r)};
    case"RESTORE_BACKUP":return{...s,...a.p,loaded:true};
    case"SET_CAT_FILTER":return{...s,tab:"transactions",catFilter:a.catId};
    default:return s;
  }
}

function Highlight({text,query}){
  if(!query||!text)return<span>{text}</span>;
  const q=query.toLowerCase(),parts=[];let i=0,s=text.toLowerCase();
  while(i<text.length){const f=s.indexOf(q,i);if(f<0)break;if(f>i)parts.push(<span key={i}>{text.slice(i,f)}</span>);parts.push(<mark key={f} style={{background:`${T.acc}35`,color:T.acc,borderRadius:2,padding:"0 1px"}}>{text.slice(f,f+q.length)}</mark>);i=f+q.length;}
  if(i<text.length)parts.push(<span key={i}>{text.slice(i)}</span>);
  return parts.length?<span>{parts}</span>:<span>{text}</span>;
}

function BudgetTab({s,d}){
  const T=useT();

function WealthTab({s,d}){
  const T=useT();
  const[showAdd,setShowAdd]=useState(false);
  const[form,setForm]=useState({name:"",balance:"",type:"checking"});
  const[editId,setEditId]=useState(null);
  const ACC=[
    {id:"checking",label:"Checking",icon:"🏦",color:"#00d9f5"},
    {id:"savings",label:"Savings",icon:"💰",color:T.acc},
    {id:"investment",label:"Investment",icon:"📈",color:T.warn},
    {id:"crypto",label:"Crypto",icon:"🪙",color:"#f7931a"},
    {id:"property",label:"Property",icon:"🏠",color:"#fb923c"},
    {id:"debt",label:"Debt / Loan",icon:"💳",color:T.danger},
  ];
  const assets=s.accounts.filter(a=>a.type!=="debt").reduce((a,ac)=>a+parseFloat(ac.balance||0),0);
  const debts=s.accounts.filter(a=>a.type==="debt").reduce((a,ac)=>a+parseFloat(ac.balance||0),0);
  const nw=assets-debts,nwC=nw>=0?T.acc:T.danger,ar=assets>0?assets/(assets+debts):0;
  const pm=monthAgo(1);
  const pmInc=s.transactions.filter(t=>t.date.startsWith(pm)&&t.type==="income").reduce((a,t)=>a+t.amount,0);
  const pmExp=s.transactions.filter(t=>t.date.startsWith(pm)&&t.type==="expense").reduce((a,t)=>a+t.amount,0);
  const pmNet=pmInc-pmExp;
  // Net worth trend: current NW minus rolling cumulative flow per month (approx)

function AdminTab({dark}){
  const Tdyn2={bg:dark?"#08080d":"#f0f0f5",card:dark?"rgba(255,255,255,0.04)":"rgba(0,0,0,0.04)",brd:dark?"rgba(255,255,255,0.07)":"rgba(0,0,0,0.08)",t1:dark?"#e8e8ec":"#0f0f18",t2:dark?"#8b8b9e":"#5a5a72",t3:dark?"#4a4a5c":"#9a9ab0"};
  const API="https://api.ironlog.space";
  const token=LS.get("fl-session-token");
  const authH={"Content-Type":"application/json","Authorization":`Bearer ${token}`};
  const af=async(p,o={})=>{try{return await fetch(`${API}${p}`,{...o,headers:{...(o.headers||{}),...authH}});}catch{return{ok:false,status:0,json:async()=>({})};};};
  const fmtM=n=>{const a=Math.abs(Number(n)||0);if(a>=1e6)return(a/1e6).toFixed(2)+"M";if(a>=1e3)return(a/1e3).toFixed(1)+"k";return a.toFixed(0);};
  const rel=d=>{if(!d)return"—";const diff=Math.round((Date.now()-new Date(d).getTime())/864e5);if(diff===0)return"Today";if(diff===1)return"Yesterday";if(diff<7)return diff+"d ago";if(diff<30)return Math.round(diff/7)+"w ago";return Math.round(diff/30)+"mo ago";};
  const mo6=()=>Array.from({length:6},(_,i)=>{const d=new Date();d.setMonth(d.getMonth()-(5-i));return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;});
  const mShort=m=>{try{return new Date(m+"-15").toLocaleDateString("en-US",{month:"short"});}catch{return m;}};
  const CATS_AD={housing:{l:"Housing",i:"🏠",c:"#00d9f5"},food:{l:"Food & Dining",i:"🍔",c:"#fb923c"},transport:{l:"Transport",i:"🚗",c:"#a07ef5"},health:{l:"Health",i:"💊",c:"#ff6b6b"},entertainment:{l:"Entertainment",i:"🎬",c:"#ff9f43"},shopping:{l:"Shopping",i:"🛍️",c:"#c084fc"},utilities:{l:"Utilities",i:"💡",c:"#38bdf8"},subscriptions:{l:"Subscriptions",i:"📱",c:"#fb7185"},fitness:{l:"Fitness",i:"💪",c:"#00f5a0"},travel:{l:"Travel",i:"✈️",c:"#f59e0b"},education:{l:"Education",i:"📚",c:"#818cf8"},savings:{l:"Savings",i:"🏦",c:"#22d3ee"},other:{l:"Other",i:"📦",c:"#7faa9a"},salary:{l:"Salary",i:"💼",c:"#00f5a0"},freelance:{l:"Freelance",i:"💻",c:"#00d9f5"},investment:{l:"Investment",i:"📈",c:"#ff9f43"},bonus:{l:"Bonus",i:"🎉",c:"#a07ef5"},other_inc:{l:"Other Income",i:"💰",c:"#7faa9a"}};
  const catA=id=>CATS_AD[id]||{l:id||"Other",i:"💰",c:"#00f5a0"};

  const[lastRefresh,setLastRefresh]=useState(null);
  const[section,setSection]=useState("overview");
  const addAudit=(a,detail)=>setAuditLog(p=>[{ts:new Date().toLocaleTimeString(),a,detail},...p].slice(0,100));

  const loadAll=useCallback(async()=>{
    setLoading(true);setErr(null);
    try{
      const[sr,ur,tr]=await Promise.all([af("/api/admin/stats"),af("/api/admin/users"),af("/api/admin/transactions?limit=5000")]);
      if(sr.ok)setStats(await sr.json());
      if(ur.ok){
        const d=await ur.json();const arr=d.users||d||[];
        arr.forEach(u=>{u.txCount=u.txCount??u.transactions?.length??0;u.accountCount=u.accountCount??u.accounts?.length??0;const ac=u.accounts||[];u.netWorth=u.netWorth??ac.reduce((a,x)=>x.type==="debt"?a-parseFloat(x.balance||0):a+parseFloat(x.balance||0),0);u.totalVolume=u.totalVolume??(u.transactions||[]).reduce((a,t)=>a+t.amount,0);});
        setUsers(arr);addAudit("FETCH",`${arr.length} users`);
      } else {setErr(`Users endpoint: HTTP ${ur.status}`);}
      if(tr.ok){const d=await tr.json();const arr=d.transactions||d||[];setTxs(arr);addAudit("FETCH",`${arr.length} transactions`);}
    }catch(e){setErr("Network error — "+e.message);}
    setLoading(false);setLastRefresh(new Date());
  },[]);

  useEffect(()=>{loadAll();},[]);

  // Ping system health
  const pingHealth=async()=>{
    const eps=[{l:"Auth",p:"/api/auth/session",m:"POST",b:{action:"ping"}},{l:"Stats",p:"/api/admin/stats"},{l:"Users",p:"/api/admin/users?limit=1"},{l:"Transactions",p:"/api/admin/transactions?limit=1"},{l:"Analytics",p:"/api/admin/analytics"},{l:"Sync",p:"/api/sync/pull",m:"POST",b:{}}];
    const res=await Promise.all(eps.map(async ep=>{const t0=performance.now();let status=0;try{const r=await af(ep.p,ep.m==="POST"?{method:"POST",body:JSON.stringify(ep.b||{})}:{});status=r.status;}catch{}return{l:ep.l,status,ms:Math.round(performance.now()-t0)};}));
    setHealth(res);addAudit("HEALTH",res.map(r=>`${r.l}:${r.status}(${r.ms}ms)`).join(" "));
  };

  const openDrawer=async(email)=>{

  // Filtered/sorted data

      const e=(u.email||"").toLowerCase();
      if(q&&!e.includes(q))return false;
      if(uFilter==="active")return u.lastActive&&(_now-new Date(u.lastActive).getTime())<30*864e5;
      if(uFilter==="new")return u.createdAt&&(_now-new Date(u.createdAt).getTime())<7*864e5;
      if(uFilter==="inactive")return!u.lastActive||(_now-new Date(u.lastActive).getTime())>=30*864e5;
      return true;
    }).sort((a,b)=>new Date(b.createdAt||0)-new Date(a.createdAt||0));
  },[users,uSearch,uFilter]);

  const filtTxs=useMemo(()=>{
    const q=txSearch.toLowerCase().trim();
    return txs.filter(tx=>{
      if(txFilter!=="all"&&tx.type!==txFilter)return false;
      if(q){const c=catA(tx.catId||tx.cat);return(tx.note||"").toLowerCase().includes(q)||c.l.toLowerCase().includes(q)||(tx.userEmail||"").toLowerCase().includes(q);}
      return true;
    }).sort((a,b)=>new Date(b.date||0)-new Date(a.date||0));
  },[txs,txSearch,txFilter]);

  // Overview derived metrics
  const mau=useMemo(()=>{const _n=Date.now();return users.filter(u=>u.lastActive&&(_n-new Date(u.lastActive).getTime())<30*864e5).length;},[users]);
  const newW=useMemo(()=>{const _n=Date.now();return users.filter(u=>u.createdAt&&(_n-new Date(u.createdAt).getTime())<7*864e5).length;},[users]);
  const txTotal=txs.length||users.reduce((a,u)=>a+u.txCount,0);
  const vol=txs.reduce((a,t)=>a+t.amount,0)||users.reduce((a,u)=>a+(u.totalVolume||0),0);
  const mauPct=users.length?Math.round(mau/users.length*100):0;
  const tInc=txs.filter(t=>t.type==="income").reduce((a,t)=>a+t.amount,0);
  const tExp=txs.filter(t=>t.type==="expense").reduce((a,t)=>a+t.amount,0);

  // SVG mini bar chart
  const MiniBar=({data,color="#00f5a0",h=48})=>{
    const max=Math.max(...data,1);
    const w=100/data.length;
    return(<svg width="100%" height={h} viewBox={`0 0 100 ${h}`} preserveAspectRatio="none" style={{display:"block"}}>
      {data.map((v,i)=>{const bh=Math.max((v/max)*h,1);return(<rect key={i} x={i*w+w*.1} y={h-bh} width={w*.8} height={bh} fill={color} opacity={.75} rx={1}/>);})}
    </svg>);
  };

  // SVG spark line
  const SparkLine=({data,color="#00f5a0",h=48})=>{
    const max=Math.max(...data,1),min=Math.min(...data,0);
    const range=max-min||1;
    const pts=data.map((v,i)=>`${(i/(data.length-1))*100},${h-((v-min)/range)*h}`).join(" ");
    return(<svg width="100%" height={h} viewBox={`0 0 100 ${h}`} preserveAspectRatio="none" style={{display:"block"}}>
      <polyline points={pts} fill="none" stroke={color} strokeWidth="2" strokeLinejoin="round" strokeLinecap="round"/>
    </svg>);
  };

  const C={bg:Tdyn2.bg,card:Tdyn2.card,brd:Tdyn2.brd,t1:Tdyn2.t1,t2:Tdyn2.t2,t3:Tdyn2.t3,acc:T.acc,acc2:T.acc2,danger:"#ff6b6b",warn:"#ff9f43",purple:"#a07ef5",font:T.font,mono:T.mono};

  const CardBox=({title,badge,action,onAction,children})=>(
    <div style={{background:C.card,border:`1px solid ${C.brd}`,borderRadius:14,padding:"14px 16px",marginBottom:12}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
        <span style={{fontSize:10,fontWeight:700,color:C.t3,textTransform:"uppercase",letterSpacing:".08em"}}>{title}</span>
        {badge&&<span style={{fontSize:10,fontFamily:C.mono,color:C.t2,fontWeight:600}}>{badge}</span>}
        {action&&<button onClick={onAction} style={{fontSize:10,fontWeight:700,color:C.acc,background:"none",border:"none",cursor:"pointer",fontFamily:C.font,padding:0,opacity:.7}}>{action}</button>}
      </div>
      {children}
    </div>);

  const KPICard=({label,value,sub,icon,color=C.acc})=>(
    <div style={{background:C.card,border:`1px solid ${C.brd}`,borderRadius:14,padding:"14px 16px",position:"relative",overflow:"hidden"}}>
      <div style={{position:"absolute",top:10,right:12,fontSize:20,opacity:.25}}>{icon}</div>
      <div style={{fontSize:9,fontWeight:700,color:C.t3,textTransform:"uppercase",letterSpacing:".09em",marginBottom:6}}>{label}</div>
      <div style={{fontSize:24,fontWeight:800,fontFamily:C.mono,color:C.t1,lineHeight:1,marginBottom:4}}>{value}</div>
      {sub&&<div style={{fontSize:10,color:C.t3,fontWeight:600}}>{sub}</div>}
    </div>);

  const FilterChip=({label,active,onClick})=>(
    <button onClick={onClick} style={{padding:"4px 10px",borderRadius:14,border:`1px solid ${active?C.acc+"50":C.brd}`,background:active?C.acc+"12":"transparent",color:active?C.acc:C.t3,fontSize:10,fontWeight:700,cursor:"pointer",fontFamily:C.font,transition:"all .14s",whiteSpace:"nowrap"}}>{label}</button>);

  const Row=({k,v,accent})=>(
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 10px",background:C.card,borderRadius:8,marginBottom:5}}>
      <span style={{fontSize:11,color:C.t3}}>{k}</span>
      <span style={{fontSize:11,color:accent?C.acc:C.t1,fontWeight:600,fontFamily:C.mono}}>{v||"—"}</span>
    </div>);

  const AdBar=({label,pct})=>(
    <div style={{marginBottom:10}}>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:10,marginBottom:3}}><span style={{color:C.t2}}>{label}</span><span style={{color:C.t1,fontFamily:C.mono,fontWeight:700}}>{pct}%</span></div>
      <div style={{height:4,borderRadius:2,background:T.brd}}>
        <div style={{height:"100%",borderRadius:2,background:`linear-gradient(90deg,${C.acc},${C.acc2})`,width:`${pct}%`,transition:"width .7s"}}/>
      </div>
    </div>);

  const mo6Data=mo6();
  const growthData=mo6Data.map(m=>users.filter(u=>(u.createdAt||"").startsWith(m)).length);
  const volData=mo6Data.map(m=>txs.filter(t=>(t.date||"").startsWith(m)).reduce((a,t)=>a+t.amount,0));
  const wBud=users.filter(u=>Object.keys(u.budgets||{}).some(k=>parseFloat((u.budgets||{})[k])>0)).length;
  const wGoal=users.filter(u=>(u.goals||[]).length>0).length;
  const wRec=users.filter(u=>(u.recurring||[]).length>0).length;
  const wAcc=users.filter(u=>u.accountCount>1).length;
  const tot=users.length||1;

  // Tabs within admin
  const sections=[
    {id:"overview",label:"Overview",icon:"📊"},
    {id:"users",label:"Users",icon:"👥"},
    {id:"transactions",label:"Txs",icon:"💳"},
    {id:"analytics",label:"Analytics",icon:"📈"},
    {id:"system",label:"System",icon:"⚡"},
  ];

  const uSlice=filtUsers.slice(uPage*PAGE_SZ,(uPage+1)*PAGE_SZ);
  const txSlice=filtTxs.slice(txPage*PAGE_SZ,(txPage+1)*PAGE_SZ);

  return(
    <div style={{padding:"0 0 80px",background:C.bg,minHeight:"100%"}}>
      {/* Admin banner */}
      <div style={{padding:"12px 16px 0"}}>
        <div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",background:"rgba(255,107,107,0.07)",border:"1px solid rgba(255,107,107,0.15)",borderRadius:10,marginBottom:14}}>
          <span style={{fontSize:13}}>🔐</span>
          <span style={{fontSize:11,fontWeight:700,color:"#ff6b6b",letterSpacing:".03em"}}>ADMIN PANEL</span>
          <span style={{fontSize:10,color:C.t3,marginLeft:"auto"}}>{lastRefresh?"Updated "+lastRefresh.toLocaleTimeString():"Loading…"}</span>
          <button onClick={loadAll} style={{background:"none",border:`1px solid ${C.brd}`,borderRadius:7,padding:"3px 8px",color:C.t2,fontSize:10,fontWeight:700,cursor:"pointer",fontFamily:C.font}}>↻</button>
        </div>

        {/* Section nav */}
        <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:12,scrollbarWidth:"none"}}>
          {sections.map(sec=>(
            <button key={sec.id} onClick={()=>setSection(sec.id)} style={{display:"flex",alignItems:"center",gap:5,padding:"6px 12px",borderRadius:10,border:`1px solid ${section===sec.id?C.acc+"40":C.brd}`,background:section===sec.id?C.acc+"10":"transparent",color:section===sec.id?C.acc:C.t3,fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:C.font,whiteSpace:"nowrap",flexShrink:0}}>
              <span style={{fontSize:13}}>{sec.icon}</span>{sec.label}
            </button>))}
        </div>
      </div>

      {loading&&<div style={{display:"flex",alignItems:"center",justifyContent:"center",padding:40,gap:10,flexDirection:"column"}}>
        <div style={{width:28,height:28,border:`2px solid rgba(0,245,160,.15)`,borderTopColor:C.acc,borderRadius:"50%",animation:"spin .65s linear infinite"}}/>
        <div style={{fontSize:12,color:C.t3}}>Loading admin data…</div>
      </div>}

      {err&&!loading&&<div style={{margin:"0 16px 12px",padding:"10px 14px",background:"rgba(255,107,107,.07)",border:"1px solid rgba(255,107,107,.14)",borderRadius:10,fontSize:11,color:"#ff6b6b"}}>⚠️ {err}</div>}

      {!loading&&<div style={{padding:"0 16px"}}>

        {/* ── OVERVIEW ── */}
        {section==="overview"&&<>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
            <KPICard label="Total Users" value={users.length.toLocaleString()} icon="👥" sub={`+${newW} this week`}/>
            <KPICard label="Active 30d" value={mau.toLocaleString()} icon="⚡" color={C.acc2} sub={`${mauPct}% MAU rate`}/>
            <KPICard label="Transactions" value={txTotal.toLocaleString()} icon="💳" color={C.purple}/>
            <KPICard label="Platform Volume" value={"$"+fmtM(vol)} icon="💵" color="#fbbf24"/>
          </div>

          <CardBox title="User Growth (6 mo)">
            <div style={{marginBottom:4}}><MiniBar data={growthData} color={C.acc}/></div>
            <div style={{display:"flex",justifyContent:"space-between"}}>
              {mo6Data.map((m,i)=><span key={i} style={{fontSize:8,color:C.t3}}>{mShort(m)}</span>)}
            </div>
          </CardBox>

          <CardBox title="Transaction Volume (6 mo)">
            <div style={{marginBottom:4}}><MiniBar data={volData} color={C.acc2}/></div>
            <div style={{display:"flex",justifyContent:"space-between"}}>
              {mo6Data.map((m,i)=><span key={i} style={{fontSize:8,color:C.t3}}>{mShort(m)}</span>)}
            </div>
          </CardBox>

          <CardBox title="Feature Adoption">
            {tot>1&&<>
              <AdBar label="Budget set" pct={Math.round(wBud/tot*100)}/>
              <AdBar label="Goals created" pct={Math.round(wGoal/tot*100)}/>
              <AdBar label="Recurring txs" pct={Math.round(wRec/tot*100)}/>
              <AdBar label="Multi-accounts" pct={Math.round(wAcc/tot*100)}/>
            </>}
          </CardBox>

          <CardBox title="Platform Averages">
            <Row k="Txs / user" v={tot>1?Math.round(txTotal/tot):0} accent/>
            <Row k="Accounts / user" v={tot>1?(users.reduce((a,u)=>a+u.accountCount,0)/tot).toFixed(1):0}/>
            <Row k="MAU rate" v={mauPct+"%"} accent/>
            <Row k="Income total" v={"$"+fmtM(tInc)} accent/>
            <Row k="Expense total" v={"$"+fmtM(tExp)}/>
            <Row k="Savings rate" v={tInc>0?Math.round((tInc-tExp)/tInc*100)+"%":"—"} accent/>
          </CardBox>

          <CardBox title="Newest Users" badge={`${users.length} total`}>
            {users.slice(0,5).map(u=>(
              <button key={u.email} onClick={()=>{openDrawer(u.email);}} style={{width:"100%",display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:`1px solid ${C.brd}`,background:"none",border:"none",cursor:"pointer",textAlign:"left"}}>
                <div style={{width:30,height:30,borderRadius:9,background:`linear-gradient(135deg,${C.acc}20,${C.acc2}12)`,border:`1px solid ${C.acc}20`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:800,fontFamily:C.mono,color:C.acc,flexShrink:0}}>{(u.email[0]||"?").toUpperCase()}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:12,fontWeight:600,color:C.t1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{u.email}</div>
                  <div style={{fontSize:10,color:C.t3}}>{rel(u.createdAt)} · {u.txCount} txs</div>
                </div>
                <div style={{fontSize:11,fontFamily:C.mono,color:(u.netWorth||0)>=0?C.acc:C.danger,fontWeight:700,flexShrink:0}}>${fmtM(u.netWorth||0)}</div>
              </button>))}
          </CardBox>
        </>}

        {/* ── USERS ── */}
        {section==="users"&&<>
          <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap"}}>
            <div style={{position:"relative",flex:1,minWidth:180}}>
              <svg style={{position:"absolute",left:9,top:"50%",transform:"translateY(-50%)",pointerEvents:"none"}} width="13" height="13" viewBox="0 0 24 24" fill="none" stroke={C.t3} strokeWidth="2.5" strokeLinecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
              <input value={uSearch} onChange={e=>{setUSearch(e.target.value);setUPage(0);}} placeholder="Search email…" style={{width:"100%",padding:"7px 10px 7px 30px",background:C.card,border:`1px solid ${C.brd}`,borderRadius:9,color:C.t1,fontSize:12,outline:"none",fontFamily:C.font}}/>
            </div>
          </div>
          <div style={{display:"flex",gap:6,marginBottom:12,overflowX:"auto",scrollbarWidth:"none",paddingBottom:2}}>
            {[["all","All"],["active","Active 30d"],["new","New 7d"],["inactive","Inactive"]].map(([f,l])=>(
              <FilterChip key={f} label={l} active={uFilter===f} onClick={()=>{setUFilter(f);setUPage(0);}}/>))}
            <span style={{fontSize:10,color:C.t3,marginLeft:"auto",alignSelf:"center",whiteSpace:"nowrap"}}>{filtUsers.length} users</span>
          </div>

          {uSlice.map(u=>{
            const isNew=u.createdAt&&(now-new Date(u.createdAt).getTime())<7*864e5;
            const isAct=u.lastActive&&(now-new Date(u.lastActive).getTime())<30*864e5;
            return(
              <button key={u.email} onClick={()=>openDrawer(u.email)} style={{width:"100%",display:"flex",alignItems:"center",gap:10,padding:"10px 12px",background:C.card,border:`1px solid ${C.brd}`,borderRadius:12,marginBottom:8,cursor:"pointer",textAlign:"left"}}>
                <div style={{width:34,height:34,borderRadius:10,background:`linear-gradient(135deg,${C.acc}18,${C.acc2}10)`,border:`1px solid ${C.acc}18`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:800,fontFamily:C.mono,color:C.acc,flexShrink:0}}>{(u.email[0]||"?").toUpperCase()}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,fontWeight:600,color:C.t1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{u.email}</div>
                  <div style={{fontSize:10,color:C.t3,marginTop:2}}>{u.txCount} txs · {u.accountCount} accts · joined {rel(u.createdAt)}</div>
                </div>
                <div style={{textAlign:"right",flexShrink:0}}>
                  <div style={{fontSize:12,fontWeight:700,fontFamily:C.mono,color:(u.netWorth||0)>=0?C.acc:C.danger}}>${fmtM(u.netWorth||0)}</div>
                  <div style={{fontSize:9,fontWeight:700,marginTop:2,color:isNew?C.acc2:isAct?C.acc:C.t3,textTransform:"uppercase",letterSpacing:".04em"}}>{isNew?"New":isAct?"Active":"Idle"}</div>
                </div>
              </button>);})}

          {filtUsers.length>PAGE_SZ&&(
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 4px"}}>
              <span style={{fontSize:10,color:C.t3}}>{uPage*PAGE_SZ+1}–{Math.min((uPage+1)*PAGE_SZ,filtUsers.length)} of {filtUsers.length}</span>
              <div style={{display:"flex",gap:6}}>
                <button onClick={()=>setUPage(p=>Math.max(0,p-1))} disabled={uPage===0} style={{padding:"5px 12px",borderRadius:7,border:`1px solid ${C.brd}`,background:"transparent",color:C.t2,fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:C.font,opacity:uPage===0?.3:1}}>← Prev</button>
                <button onClick={()=>setUPage(p=>p+1)} disabled={(uPage+1)*PAGE_SZ>=filtUsers.length} style={{padding:"5px 12px",borderRadius:7,border:`1px solid ${C.brd}`,background:"transparent",color:C.t2,fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:C.font,opacity:(uPage+1)*PAGE_SZ>=filtUsers.length?.3:1}}>Next →</button>
              </div>
            </div>)}
        </>}

        {/* ── TRANSACTIONS ── */}
        {section==="transactions"&&<>
          <div style={{display:"flex",gap:8,marginBottom:10}}>
            {[["all","All"],["income","Income"],["expense","Expense"]].map(([f,l])=>(
              <FilterChip key={f} label={l} active={txFilter===f} onClick={()=>{setTxFilter(f);setTxPage(0);}}/>))}
          </div>
          <div style={{position:"relative",marginBottom:10}}>
            <svg style={{position:"absolute",left:9,top:"50%",transform:"translateY(-50%)",pointerEvents:"none"}} width="13" height="13" viewBox="0 0 24 24" fill="none" stroke={C.t3} strokeWidth="2.5" strokeLinecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input value={txSearch} onChange={e=>{setTxSearch(e.target.value);setTxPage(0);}} placeholder="Search user, category, note…" style={{width:"100%",padding:"7px 10px 7px 30px",background:C.card,border:`1px solid ${C.brd}`,borderRadius:9,color:C.t1,fontSize:12,outline:"none",fontFamily:C.font}}/>
          </div>

          {/* Totals strip */}
          <div style={{display:"flex",gap:8,marginBottom:12}}>
            {[["Income",filtTxs.filter(t=>t.type==="income").reduce((a,t)=>a+t.amount,0),C.acc,`rgba(0,245,160,.08)`],["Expense",filtTxs.filter(t=>t.type==="expense").reduce((a,t)=>a+t.amount,0),C.danger,`rgba(255,107,107,.08)`]].map(([l,v,col,bg])=>(
              <div key={l} style={{flex:1,padding:"8px 12px",background:bg,border:`1px solid ${col}20`,borderRadius:9,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontSize:9,fontWeight:700,color:C.t3,textTransform:"uppercase",letterSpacing:".06em"}}>{l}</span>
                <span style={{fontSize:13,fontWeight:800,fontFamily:C.mono,color:col}}>${fmtM(v)}</span>
              </div>))}
          </div>

          <div style={{fontSize:10,color:C.t3,marginBottom:8,fontWeight:600}}>{filtTxs.length.toLocaleString()} transactions</div>

          {txSlice.map(tx=>{const c=catA(tx.catId||tx.cat),ii=tx.type==="income";return(
            <button key={tx.id||Math.random()} onClick={()=>tx.userEmail&&openDrawer(tx.userEmail)} style={{width:"100%",display:"flex",alignItems:"center",gap:10,padding:"10px 12px",background:C.card,border:`1px solid ${C.brd}`,borderRadius:12,marginBottom:7,cursor:tx.userEmail?"pointer":"default",textAlign:"left"}}>
              <div style={{width:34,height:34,borderRadius:10,background:`${c.c}18`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>{c.i}</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:12,fontWeight:600,color:C.t1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{tx.note||c.l}</div>
                <div style={{fontSize:10,color:C.t3,marginTop:1}}>{tx.date} · {tx.userEmail||"unknown"}</div>
              </div>
              <div style={{fontSize:13,fontWeight:700,fontFamily:C.mono,color:ii?C.acc:C.danger,flexShrink:0}}>{ii?"+":"-"}${fmtM(tx.amount)}</div>
            </button>);})}

          {filtTxs.length>PAGE_SZ&&(
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 4px"}}>
              <span style={{fontSize:10,color:C.t3}}>{txPage*PAGE_SZ+1}–{Math.min((txPage+1)*PAGE_SZ,filtTxs.length)} of {filtTxs.length}</span>
              <div style={{display:"flex",gap:6}}>
                <button onClick={()=>setTxPage(p=>Math.max(0,p-1))} disabled={txPage===0} style={{padding:"5px 12px",borderRadius:7,border:`1px solid ${C.brd}`,background:"transparent",color:C.t2,fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:C.font,opacity:txPage===0?.3:1}}>← Prev</button>
                <button onClick={()=>setTxPage(p=>p+1)} disabled={(txPage+1)*PAGE_SZ>=filtTxs.length} style={{padding:"5px 12px",borderRadius:7,border:`1px solid ${C.brd}`,background:"transparent",color:C.t2,fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:C.font,opacity:(txPage+1)*PAGE_SZ>=filtTxs.length?.3:1}}>Next →</button>
              </div>
            </div>)}
        </>}

        {/* ── ANALYTICS ── */}
        {section==="analytics"&&<>
          <CardBox title="30-Day Signups">
            {(()=>{const d30=Array.from({length:30},(_,i)=>{const d=new Date();d.setDate(d.getDate()-(29-i));return d.toISOString().slice(0,10);});const data=d30.map(date=>users.filter(u=>(u.createdAt||"").slice(0,10)===date).length);return(<><MiniBar data={data} color={C.purple}/><div style={{display:"flex",justifyContent:"space-between",marginTop:4}}>{[0,9,19,29].map(i=><span key={i} style={{fontSize:8,color:C.t3}}>{d30[i].slice(5)}</span>)}</div></>);})()}
          </CardBox>

          <CardBox title="Income vs Expense (6 mo)">
            {(()=>{const incD=mo6Data.map(m=>txs.filter(t=>t.type==="income"&&(t.date||"").startsWith(m)).reduce((a,t)=>a+t.amount,0));const expD=mo6Data.map(m=>txs.filter(t=>t.type==="expense"&&(t.date||"").startsWith(m)).reduce((a,t)=>a+t.amount,0));const max=Math.max(...incD,...expD,1);const bW=100/mo6Data.length;
            return(<><svg width="100%" height={64} viewBox={`0 0 100 64`} preserveAspectRatio="none" style={{display:"block",marginBottom:4}}>
              {mo6Data.map((_,i)=>{const ih=(incD[i]/max)*56,eh=(expD[i]/max)*56,half=bW/2-.5;return(<g key={i}><rect x={i*bW+.5} y={64-ih} width={half} height={ih} fill={C.acc} opacity={.55} rx={1}/><rect x={i*bW+half+1} y={64-eh} width={half} height={eh} fill={C.danger} opacity={.45} rx={1}/></g>);})}
            </svg>
            <div style={{display:"flex",justifyContent:"space-between"}}>{mo6Data.map((m,i)=><span key={i} style={{fontSize:8,color:C.t3}}>{mShort(m)}</span>)}</div>
            <div style={{display:"flex",gap:10,marginTop:6}}><span style={{fontSize:9,color:C.acc,fontWeight:700}}>■ Income</span><span style={{fontSize:9,color:C.danger,fontWeight:700}}>■ Expense</span></div></>);})()}
          </CardBox>

class ErrorBoundary extends React.Component {
  constructor(p){super(p);this.state={err:null};}

function useTheme(){
  const[dark,setDark]=useState(()=>(LS.get("fl-theme")||"dark")==="dark");
  const toggle=()=>{
    const next=dark?"light":"dark";
    setDark(!dark);
    LS.set("fl-theme",next);
    document.documentElement.setAttribute("data-theme",next);
  };
  return{dark,toggle};
}

// ─── Streak ───────────────────────────────────────────────────────────────────
function calcStreak(transactions){
  if(!transactions||transactions.length===0)return 0;
  const days=new Set(transactions.map(t=>t.date));
  const localDate=(d)=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
  let streak=0,d=new Date();
  while(true){
    const key=localDate(d);
    if(days.has(key)){streak++;d.setDate(d.getDate()-1);}
    else if(streak===0&&localDate(d)===today()){d.setDate(d.getDate()-1);continue;}
    else break;
  }
  return streak;
}

    const exp=mTx.filter(t=>t.type==="expense").reduce((a,t)=>a+t.amount,0);
    const cats={};
    mTx.filter(t=>t.type==="expense").forEach(t=>{cats[t.catId]=(cats[t.catId]||0)+t.amount;});

    if(loading)return;
    const newMsgs=[...msgs,{role:"user",content:userMsg}];

    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          model:"claude-sonnet-4-20250514",
          max_tokens:1000,
          system:`You are a friendly, sharp personal finance coach embedded in FinanceLog. You have access to the user's real financial data. Give concise, actionable, personalized advice. Use emojis sparingly. Keep responses under 120 words unless asked for detail. Never make up numbers beyond what's provided.\n\n${buildContext()}`,
          messages:newMsgs.map(m=>({role:m.role,content:m.content})),
        }),
      });
      const data=await res.json();
      const reply=data?.content?.[0]?.text||"Couldn't get a response. Try again.";
      setMsgs(prev=>[...prev,{role:"assistant",content:reply}]);
    }catch{
      setMsgs(prev=>[...prev,{role:"assistant",content:"Connection error. Check your internet and try again."}]);
    }
    setLoading(false);
  }

  useEffect(()=>{
    if(!greeted){
      setGreeted(true);
      sendMsg("Give me a brief personalized financial summary and one key action I should take this month.");
    }
  },[]);

  useEffect(()=>{
    if(scrollRef.current)scrollRef.current.scrollTop=scrollRef.current.scrollHeight;
  },[msgs,loading]);

  return(
    <div style={{position:"fixed",inset:0,zIndex:9997,background:"rgba(0,0,0,.7)",backdropFilter:"blur(8px)",display:"flex",flexDirection:"column"}} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} style={{position:"absolute",bottom:0,left:0,right:0,background:T.bg,borderRadius:"24px 24px 0 0",border:`1px solid ${T.brd}`,display:"flex",flexDirection:"column",maxHeight:"82vh"}}>
        {/* Header */}
        <div style={{padding:"20px 20px 14px",display:"flex",alignItems:"center",gap:12,borderBottom:`1px solid ${T.brd}`,flexShrink:0}}>
          <div style={{width:44,height:44,borderRadius:14,background:`linear-gradient(135deg,${T.acc},${T.acc2})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>🤖</div>
          <div>
            <div style={{fontSize:16,fontWeight:800,color:T.t1}}>AI Finance Coach</div>
            <div style={{fontSize:11,color:T.t3}}>Powered by Claude · Financial context sent to Anthropic</div>
          </div>
          <button onClick={onClose} style={{marginLeft:"auto",background:"none",border:"none",cursor:"pointer",padding:8}}>
            <svg width={18} height={18} viewBox="0 0 24 24" fill="none" stroke={T.t3} strokeWidth="2.5" strokeLinecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        {/* Messages */}
        <div ref={scrollRef} style={{flex:1,overflowY:"auto",padding:"16px 20px",display:"flex",flexDirection:"column",gap:8,minHeight:0}}>
          {msgs.map((m,i)=>(
            m.role==="assistant"
              ?<div key={i} className="coach-bubble"><div style={{fontSize:13,color:T.t1,lineHeight:1.65}}>{m.content}</div></div>
              :<div key={i} className="coach-bubble-user"><div style={{fontSize:12,color:T.t2,lineHeight:1.6}}>{m.content}</div></div>
          ))}
          {loading&&<div className="coach-typing">
            {[0,1,2].map(i=><div key={i} className="coach-dot" style={{animationDelay:`${i*.2}s`}}/>)}
          </div>}
        </div>
        {/* Suggestions */}
        {msgs.length<=2&&!loading&&(
          <div style={{padding:"0 16px 8px",display:"flex",gap:8,overflowX:"auto",flexShrink:0}}>
            {["Where am I overspending?","How do I save more?","Am I on track this month?"].map((q,i)=>(
              <button key={i} onClick={()=>sendMsg(q)} style={{flexShrink:0,padding:"8px 14px",borderRadius:20,border:`1px solid ${T.acc}30`,background:`${T.acc}0a`,color:T.acc,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:T.font,whiteSpace:"nowrap"}}>{q}</button>
            ))}
          </div>
        )}
        {/* Input */}
        <div style={{padding:"12px 16px",paddingBottom:"max(20px,env(safe-area-inset-bottom,16px))",borderTop:`1px solid ${T.brd}`,display:"flex",gap:10,flexShrink:0}}>
          <input value={input} onChange={e=>setInput(e.target.value)}
            onKeyDown={e=>{if(e.key==="Enter"&&input.trim())sendMsg(input.trim());}}
            placeholder="Ask your coach anything…"
            style={{flex:1,padding:"12px 14px",borderRadius:12,border:`1px solid ${T.brd}`,background:T.card,color:T.t1,fontSize:14,outline:"none",fontFamily:T.font}}/>
          <button onClick={()=>input.trim()&&sendMsg(input.trim())} disabled={!input.trim()||loading}
            style={{width:44,height:44,borderRadius:12,border:"none",background:`linear-gradient(135deg,${T.acc},${T.acc2})`,color:T.bg,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",opacity:!input.trim()||loading?.4:1,flexShrink:0}}>
            <svg width={16} height={16} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
      </div>
    </div>);
}

// ─── PWA Install Modal ────────────────────────────────────────────────────────
function InstallModal({onClose}){
  const isIOS=/iPhone|iPad|iPod/.test(navigator.userAgent);
  const isAndroid=/Android/.test(navigator.userAgent);
  const steps=isIOS?[
    ["Tap the Share button","The box-with-arrow icon in Safari's toolbar"],
    ["Scroll and tap \"Add to Home Screen\"","You may need to scroll the share sheet down"],
    ["Tap \"Add\" in the top right","FinanceLog will appear on your home screen"],
  ]:isAndroid?[
    ["Tap the 3-dot menu","In Chrome's top-right corner"],
    ["Tap \"Add to Home screen\"","Or \"Install app\" if you see it"],
    ["Tap \"Add\"","FinanceLog will appear on your home screen"],
  ]:[
    ["Look for the install icon","In your browser's address bar or menu"],
    ["Click \"Install\" or \"Add to Home Screen\"","The exact label varies by browser"],
    ["Confirm the installation","FinanceLog will open as a standalone app"],
  ];
  return(
    <div style={{position:"fixed",inset:0,zIndex:9997,background:"rgba(0,0,0,.75)",backdropFilter:"blur(8px)",display:"flex",alignItems:"flex-end",padding:"0 0"}} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} style={{width:"100%",background:T.bg,borderRadius:"24px 24px 0 0",border:`1px solid ${T.brd}`,padding:"24px 24px max(28px,env(safe-area-inset-bottom,24px))",animation:"installIn .3s ease forwards"}}>
        <div style={{textAlign:"center",marginBottom:20}}>
          <div style={{fontSize:36,marginBottom:10}}>📲</div>
          <div style={{fontSize:18,fontWeight:800,color:T.t1}}>Install FinanceLog</div>
          <div style={{fontSize:12,color:T.t3,marginTop:4}}>{isIOS?"iOS Safari":isAndroid?"Android Chrome":"Your browser"}</div>
        </div>
        <div style={{background:"rgba(255,255,255,.03)",borderRadius:16,border:`1px solid ${T.brd}`,padding:"8px 16px",marginBottom:20}}>
          {steps.map(([title,sub],i)=>(
            <div key={i} className="install-step">
              <div className="install-num">{i+1}</div>
              <div>
                <div style={{fontSize:13,fontWeight:700,color:T.t1}}>{title}</div>
                <div style={{fontSize:11,color:T.t3,marginTop:2,lineHeight:1.5}}>{sub}</div>
              </div>
            </div>))}
        </div>
        <button onClick={onClose} style={{width:"100%",minHeight:48,borderRadius:14,border:"none",background:`linear-gradient(135deg,${T.acc},${T.acc2})`,color:T.bg,fontSize:15,fontWeight:700,cursor:"pointer",fontFamily:T.font}}>Got it!</button>
      </div>
    </div>);
}

function App(){
  const[s,d]=useReducer(reducer,INIT);
  const score=useMemo(()=>calcScore(s),[s.transactions,s.accounts,s.budgets,s.goals]);
  const missions=useMemo(()=>getMissions(s),[s.transactions,s.accounts,s.budgets,s.goals]);
  const{celebrating,celebRank,dismiss}=useLevelUp(score,"fl-last-level");
  const[showAdd,setShowAdd]=useState(false);
  const[showCoach,setShowCoach]=useState(false);
  const[showInstall,setShowInstall]=useState(false);
  const{dark,toggle:toggleTheme}=useTheme();

  const streak=useMemo(()=>calcStreak(s.transactions),[s.transactions]);
  const monthTxCount=useMemo(()=>s.transactions.filter(t=>t.date.startsWith(thisMonth())).length,[s.transactions]);
  const loggedToday=useMemo(()=>(s.transactions||[]).some(t=>t.date===today()),[s.transactions]);

  // Apply theme tokens reactively
  const Tdyn={...T,
    bg:dark?"#08080d":"#f0f0f5",
    card:dark?"rgba(255,255,255,0.035)":"rgba(0,0,0,0.04)",
    brd:dark?"rgba(255,255,255,0.06)":"rgba(0,0,0,0.08)",
    t1:dark?"#e8e8ec":"#0f0f18",
    t2:dark?"#8b8b9e":"#5a5a72",
    t3:dark?"#4a4a5c":"#9a9ab0",
  };

  // Keyboard shortcut: Shift+A → add transaction
  useEffect(()=>{
    const handler=(e)=>{if(e.shiftKey&&e.key==="A"&&!e.ctrlKey&&!e.metaKey&&document.activeElement.tagName!=="INPUT"&&document.activeElement.tagName!=="TEXTAREA"){e.preventDefault();setShowAdd(true);}};
    window.addEventListener("keydown",handler);
    return()=>window.removeEventListener("keydown",handler);
  },[]);

  // PWA install prompt
  const[deferredPrompt,setDeferredPrompt]=useState(null);
  useEffect(()=>{
    const handler=e=>{e.preventDefault();setDeferredPrompt(e);};
    window.addEventListener("beforeinstallprompt",handler);
    return()=>window.removeEventListener("beforeinstallprompt",handler);
  },[]);

  // Admin role detection
  const[isAdmin,setIsAdmin]=useState(!!window._adminFlag);
  useEffect(()=>{
    if(window._adminFlag){setIsAdmin(true);return;}
    const tok=LS.get("fl-session-token");
    if(!tok)return;
    if(window._offlineMode)return; // offline — skip admin probe
    fetch("https://api.ironlog.space/api/admin/stats",{headers:{"Content-Type":"application/json","Authorization":`Bearer ${tok}`}})
      .then(r=>{if(r.ok){window._adminFlag=true;setIsAdmin(true);}})
      .catch(()=>{});
  },[]);

  useEffect(()=>{
    const txs=LS.get("fl-tx")||[];
    const accs=LS.get("fl-accounts")||[];
    const buds=LS.get("fl-budgets")||{};
    const goals=LS.get("fl-goals-v2")||[];
    const recurring=LS.get("fl-recurring")||[];
    // Auto-log overdue recurring transactions
    const td=today();
    const newTxs=[...txs];
    recurring.forEach(r=>{
      if(!r.lastLogged)return;
      const last=new Date(r.lastLogged);
      const now=new Date(td);
      const diffDays=Math.round((now-last)/86400000);
      const needed=r.freq==="weekly"?diffDays>=7:diffDays>=28;
      if(needed){
        const newTx={id:uid(),type:r.type,amount:r.amount,catId:r.catId,cat:r.cat,note:r.note,date:td,recurring:r.freq};
        newTxs.unshift(newTx);
        r.lastLogged=td;
      }
    });
    LS.set("fl-recurring",recurring); // persist updated lastLogged immediately
    d({type:"INIT",p:{transactions:newTxs,accounts:accs,budgets:buds,goals,recurring}});
  },[]);

  useEffect(()=>{
    if(!s.loaded)return;
    LS.set("fl-tx",s.transactions);
    LS.set("fl-accounts",s.accounts);
    LS.set("fl-budgets",s.budgets);
    LS.set("fl-goals-v2",s.goals||[]);
    LS.set("fl-recurring",s.recurring||[]);
  },[s.transactions,s.accounts,s.budgets,s.goals,s.recurring,s.loaded]);

  if(!s.loaded)return(
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100%",background:T.bg,flexDirection:"column",gap:16}}>
      <div style={{width:36,height:36,border:`3px solid rgba(0,245,160,0.15)`,borderTopColor:T.acc,borderRadius:"50%",animation:"spin .8s linear infinite"}}></div>
      <div style={{fontSize:13,color:T.t2,fontFamily:T.font}}>Loading FinanceLog...</div>
    </div>);

  const TABS=[
    {id:"home",label:"Home",badge:!loggedToday,icon:({size=20,color=T.t3,strokeWidth=1.6})=>(
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth={strokeWidth} strokeLinecap="round">
        <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V9.5z"/><polyline points="9 21 9 12 15 12 15 21"/>
      </svg>)},
    {id:"transactions",label:monthTxCount>0?`Activity (${monthTxCount})`:"Activity",badge:false,icon:({size=20,color=T.t3,strokeWidth=1.6})=>(
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth={strokeWidth} strokeLinecap="round">
        <rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/>
        <line x1="7" y1="15" x2="9" y2="15"/><line x1="12" y1="15" x2="17" y2="15"/>
      </svg>)},
    {id:"budget",label:"Budget",badge:false,icon:({size=20,color=T.t3,strokeWidth=1.6})=>(
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth={strokeWidth} strokeLinecap="round">
        <circle cx="12" cy="12" r="10"/><path d="M12 6v2M12 16v2M8.5 9a3.5 3.5 0 0 1 7 0c0 2-3.5 3-3.5 3s-3.5 1-3.5 3a3.5 3.5 0 0 0 7 0"/>
      </svg>)},
    {id:"wealth",label:"Wealth",badge:false,icon:({size=20,color=T.t3,strokeWidth=1.6})=>(
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth={strokeWidth} strokeLinecap="round">
        <polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/>
      </svg>)},
    {id:"settings",label:"More",badge:false,icon:({size=20,color=T.t3,strokeWidth=1.6})=>(
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth={strokeWidth} strokeLinecap="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>)},
    ...(isAdmin?[{id:"admin",label:"Admin",badge:false,icon:({size=20,color=T.t3,strokeWidth=1.6})=>(
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth={strokeWidth} strokeLinecap="round">
        <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>)}]:[]),
  ];

  return(
    <div style={{height:"100%",display:"flex",flexDirection:"column",background:Tdyn.bg,color:Tdyn.t1,fontFamily:T.font,position:"relative"}}>
      {/* safe-area top */}
      <div style={{height:"env(safe-area-inset-top,0px)",background:Tdyn.bg,flexShrink:0}}/>

      {/* Header */}
      <div style={{padding:"12px 16px 10px",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0,borderBottom:`1px solid ${Tdyn.brd}`}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{width:28,height:28,borderRadius:8,background:`linear-gradient(135deg,${T.acc},${T.acc2})`,display:"flex",alignItems:"center",justifyContent:"center"}}>
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke={T.bg} strokeWidth="2.5" strokeLinecap="round">
              <line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
            </svg>
          </div>
          <span style={{fontSize:17,fontWeight:800,letterSpacing:"-0.03em",color:Tdyn.t1}}>Finance<span style={{color:T.acc}}>Log</span></span>
          {streak>=2&&<div style={{display:"flex",alignItems:"center",gap:4,background:"rgba(251,146,60,0.12)",border:"1px solid rgba(251,146,60,0.25)",borderRadius:10,padding:"3px 8px"}}>
            <span style={{fontSize:11}}>🔥</span>
            <span style={{fontSize:11,fontWeight:700,color:"#fb923c"}}>{streak}d</span>
          </div>}
          {window._offlineMode&&<div style={{display:"flex",alignItems:"center",gap:4,background:"rgba(160,126,245,0.12)",border:"1px solid rgba(160,126,245,0.25)",borderRadius:10,padding:"3px 8px"}}>
            <span style={{fontSize:11}}>🧪</span>
            <span style={{fontSize:11,fontWeight:700,color:"#a07ef5"}}>Demo</span>
          </div>}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          {/* AI Coach */}
          <button onClick={()=>setShowCoach(true)} title="AI Finance Coach"
            style={{width:34,height:34,borderRadius:10,background:`${T.acc}12`,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",border:`1px solid ${T.acc}25`,flexShrink:0}}>
            <span style={{fontSize:15}}>🤖</span>
          </button>
          {/* Install */}
          <button onClick={()=>{if(deferredPrompt){deferredPrompt.prompt();}else{setShowInstall(true);}}} title="Install App"
            style={{width:34,height:34,borderRadius:10,background:"rgba(255,255,255,.06)",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",border:`1px solid ${Tdyn.brd}`,flexShrink:0}}>
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke={Tdyn.t3} strokeWidth="2.5" strokeLinecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          </button>
          {/* Add transaction */}
          <button onClick={()=>setShowAdd(true)}
            style={{width:34,height:34,borderRadius:10,background:`${T.acc}15`,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",border:"none"}}>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={T.acc} strokeWidth="2.5" strokeLinecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          </button>
        </div>
      </div>

      {/* Content */}
      <div style={{flex:1,overflowY:"auto",WebkitOverflowScrolling:"touch",minHeight:0}}>
        {s.tab==="home"&&<HomeTab s={s} d={d} score={score} missions={missions} showAdd={showAdd} setShowAdd={setShowAdd}/>}
        {s.tab==="transactions"&&<TxTab s={s} d={d}/>}
        {s.tab==="budget"&&<BudgetTab s={s} d={d}/>}
        {s.tab==="wealth"&&<WealthTab s={s} d={d}/>}
        {s.tab==="settings"&&<SettingsTab s={s} d={d} score={score} missions={missions} dark={dark} toggleTheme={toggleTheme}/>}
        {s.tab==="admin"&&isAdmin&&<AdminTab dark={dark}/>}
      </div>

      {/* Bottom Nav */}
      <nav style={{flexShrink:0,background:dark?"rgba(8,8,13,0.95)":"rgba(240,240,245,0.95)",backdropFilter:"blur(24px) saturate(180%)",
        borderTop:`1px solid ${Tdyn.brd}`,paddingBottom:"env(safe-area-inset-bottom,8px)",
        display:"flex",justifyContent:"space-around",alignItems:"center",paddingTop:8,position:"relative",zIndex:50}}>
        {TABS.map(tab=>{
          const active=s.tab===tab.id;
          return(
            <button key={tab.id} onClick={()=>{Haptic.light();d({type:"TAB",tab:tab.id});}}
              style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3,background:"none",border:"none",
                cursor:"pointer",padding:"6px 16px",minWidth:64,WebkitTapHighlightColor:"transparent",transition:"all .15s"}}>
              <div style={{width:active?42:36,height:active?42:36,borderRadius:active?14:12,position:"relative",
                background:active?`${T.acc}18`:"transparent",display:"flex",alignItems:"center",justifyContent:"center",
                transition:"all .2s ease"}}>
                {tab.icon({size:active?22:20,color:active?T.acc:Tdyn.t3,strokeWidth:active?2.2:1.6})}
                {tab.badge&&!active&&<div className="nav-badge"/>}
              </div>
              <span style={{fontSize:10,fontWeight:active?700:500,color:active?T.acc:Tdyn.t3,letterSpacing:".01em"}}>{tab.label}</span>
            </button>);
        })}
      </nav>

      <ToastBar/>
      <ConfirmDlg/>
      {celebrating&&celebRank&&<LevelUp rank={celebRank} onDismiss={dismiss}/>}
      {showCoach&&<CoachModal s={s} onClose={()=>setShowCoach(false)}/>}
      {showInstall&&<InstallModal onClose={()=>setShowInstall(false)}/>}
    </div>);
}


function __mountApp() {
  if (window.__reactMounted) return;
  window.__reactMounted = true;
  ReactDOM.createRoot(document.getElementById("react-root")).render(<ErrorBoundary><App/></ErrorBoundary>);
}

</script>

</body>
</html>
