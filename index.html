<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="FinanceLog"/>
<meta name="theme-color" content="#08080d"/>
<title>FinanceLog</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"/>

<style>

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;width:100%;background:#08080d;margin:0;padding:0;overflow:hidden;position:fixed;top:0;left:0;right:0;bottom:0}
@supports(-webkit-touch-callout:none){html,body{height:-webkit-fill-available}}
body{font-family:'Outfit',sans-serif;color:#e8e8ec;overscroll-behavior-y:contain;-webkit-overflow-scrolling:touch}
input,select,button{font-family:inherit}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
input[type=number]{-moz-appearance:textfield}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:3px}
select{background:rgba(255,255,255,0.04);color:#e8e8ec}
select option{background:#1a1a28;color:#e8e8ec}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUpSheet{from{transform:translateY(100%)}to{transform:translateY(0)}}
@media(prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important}}
@media(orientation:landscape) and (max-height:500px){
  #app-shell{display:none!important}
  #ll{display:flex!important}
}

/* ── Auth styles ── */
#auth-root{
  height:100%;overflow-y:auto;-webkit-overflow-scrolling:touch;
  display:flex;flex-direction:column;
}
.auth-inner{
  flex:1;display:flex;flex-direction:column;
  max-width:430px;margin:0 auto;width:100%;
  padding:max(20px,env(safe-area-inset-top,20px)) 24px max(32px,env(safe-area-inset-bottom,32px));
  box-sizing:border-box;
}
.field-wrap{margin-bottom:12px}
.field-lbl{font-size:11px;color:#4a4a5c;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;font-weight:600}
.ipt{width:100%;padding:12px 14px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);border-radius:12px;color:#e8e8ec;font-size:16px;outline:none;box-sizing:border-box;-webkit-appearance:none;min-height:44px;font-family:'Outfit',sans-serif}
.ipt:focus{border-color:rgba(0,245,160,0.4)}
.btn-primary{display:flex;align-items:center;justify-content:center;width:100%;min-height:48px;border-radius:12px;border:none;background:linear-gradient(135deg,#00f5a0,#00d9f5);color:#08080d;font-size:15px;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif;margin-bottom:0}

/* ── App shell ── */
#app-shell{
  display:none;flex-direction:column;
  height:100%;overflow:hidden;
}
#react-root{flex:1;min-height:0;display:flex;flex-direction:column;overflow:hidden}

/* ── Landscape lock ── */
#ll{
  display:none;position:fixed;inset:0;background:#08080d;z-index:99999;
  flex-direction:column;align-items:center;justify-content:center;gap:16px;
  font-family:'Outfit',sans-serif;color:#8b8b9e;font-size:14px;font-weight:600;
}

</style>
</head>
<body>
<!-- Auth Screen -->
<div id="auth-root">
<div class="auth-inner">
  <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:16px;padding:40px 0">
    <div style="width:36px;height:36px;border:3px solid rgba(0,245,160,0.15);border-top-color:#00f5a0;border-radius:50%;animation:spin .8s linear infinite"></div>
    <div style="font-size:13px;color:#8b8b9e;font-family:'Outfit',sans-serif;animation:pulse 1.5s infinite">Loading…</div>
  </div>
</div>
</div>

<!-- Landscape Lock -->
<div id="ll">
  <div style="font-size:40px">📱</div>
  <div style="font-size:16px;font-weight:700;color:#e8e8ec">Rotate to Portrait</div>
  <div style="font-size:12px;color:#71717a">FinanceLog works best in portrait mode</div>
</div>

<!-- App Screen -->
<div id="app-shell">
  <div id="react-root" style="flex:1;min-height:0;display:flex;flex-direction:column;overflow:hidden">
    <div style="display:flex;align-items:center;justify-content:center;height:100%;flex-direction:column;gap:16px">
      <div style="width:36px;height:36px;border:3px solid rgba(0,245,160,0.15);border-top-color:#00f5a0;border-radius:50%;animation:spin .8s linear infinite"></div>
      <div style="font-size:13px;color:#8b8b9e;font-family:'Outfit',sans-serif">Starting app…</div>
    </div>
  </div>
</div>

<!-- Auth Logic (runs immediately) -->
<script>

// ─── Config ───────────────────────────────────────────────────────────────────
const API_URL = "https://api.ironlog.space";

// ─── Utils ────────────────────────────────────────────────────────────────────
const LS = {
  get: (k) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : null; } catch { return null; } },
  set: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} },
};
const Cookie = {
  get: (name) => { const m = document.cookie.match(new RegExp("(^| )" + name + "=([^;]+)")); return m ? decodeURIComponent(m[2]) : null; },
  set: (name, value, days = 30) => {
    const exp = new Date(Date.now() + days * 864e5).toUTCString();
    const isIronlog = window.location.hostname.endsWith('ironlog.space');
    document.cookie = `${name}=${encodeURIComponent(value)};expires=${exp};${isIronlog ? 'domain=.ironlog.space;' : ''}path=/;${isIronlog ? 'secure;' : ''}samesite=lax`;
  },
  clear: (name) => {
    const isIL = window.location.hostname.endsWith('ironlog.space');
    document.cookie = `${name}=;expires=Thu, 01 Jan 1970 00:00:00 GMT;${isIL ? 'domain=.ironlog.space;' : ''}path=/;${isIL ? 'secure' : ''}`;
  },
};
const uid = () => Math.random().toString(36).slice(2) + Date.now().toString(36);
const today = () => new Date().toISOString().split("T")[0];
const isValidEmail = (e) => /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(e);

// ─── Design Tokens (matches IronLog) ─────────────────────────────────────────
const V = {
  bg: "#08080d",
  card: "rgba(255,255,255,0.035)",
  cardBorder: "rgba(255,255,255,0.06)",
  accent: "#00f5a0",
  accent2: "#00d9f5",
  danger: "#ff6b6b",
  warn: "#ff9f43",
  text: "#e8e8ec",
  text2: "#8b8b9e",
  text3: "#4a4a5c",
  font: "'Outfit', sans-serif",
  mono: "'JetBrains Mono', monospace",
};

// ─── SSO Detection ────────────────────────────────────────────────────────────
const detectSSO = () => {
  const cookie = Cookie.get("ironlog_session");
  const storedToken = LS.get("ft-session-token");
  const storedEmail = LS.get("ft-session-email");
  const financeToken = LS.get("fl-session-token");
  const financeEmail = LS.get("fl-session-email");
  if (financeToken && financeEmail) return { type: "fl_session", email: financeEmail, token: financeToken };
  if (cookie) return { type: "ironlog_cookie", token: cookie };
  if (storedToken && storedEmail) return { type: "ironlog_local", email: storedEmail, token: storedToken };
  return null;
};

// ─── Session Manager ──────────────────────────────────────────────────────────
const SessionManager = {
  create: async (email, pin, deviceId) => {
    try {
      const res = await fetch(`${API_URL}/api/auth/session`, {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ action: "create", email: email.toLowerCase(), pin, deviceId }),
      });
      if (!res.ok) return false;
      const json = await res.json();
      LS.set("fl-session-token", json.token);
      LS.set("fl-session-email", email.toLowerCase());
      LS.set("fl-session-expires", json.expires_at);
      Cookie.set("ironlog_session", json.token, 30);
      return true;
    } catch { return false; }
  },
  validateSSO: async (token) => {
    try {
      const res = await fetch(`${API_URL}/api/auth/session`, {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ action: "validate", token }),
      });
      if (!res.ok) return null;
      return await res.json();
    } catch { return null; }
  },
  sendVerifyCode: async (email) => {
    try {
      await fetch(`${API_URL}/api/auth/session`, {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ action: "send_verify_code", email: email.toLowerCase() }),
      });
    } catch {}
  },
  confirmVerify: async (email, code) => {
    try {
      const res = await fetch(`${API_URL}/api/auth/session`, {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ action: "confirm_verify_code", email: email.toLowerCase(), code }),
      });
      return res.ok;
    } catch { return false; }
  },
  sendResetCode: async (email) => {
    try {
      const res = await fetch(`${API_URL}/api/auth/session`, {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ action: "send_reset_code", email: email.toLowerCase() }),
      });
      return res.ok;
    } catch { return false; }
  },
  verifyResetCode: async (email, code) => {
    try {
      const res = await fetch(`${API_URL}/api/auth/session`, {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ action: "verify_reset_code", email: email.toLowerCase(), code }),
      });
      return res.ok;
    } catch { return false; }
  },
  setNewPin: async (email, code, newPin) => {
    try {
      const res = await fetch(`${API_URL}/api/auth/session`, {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ action: "set_new_pin", email: email.toLowerCase(), code, newPin }),
      });
      return res.ok;
    } catch { return false; }
  },
};

// ─── Registration ─────────────────────────────────────────────────────────────
async function registerUser(profile, goals, pin) {
  const deviceId = LS.get("fl-device-id") || uid();
  LS.set("fl-device-id", deviceId);
  try {
    const res = await fetch(`${API_URL}/api/users`, {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        ...profile, ...goals,
        appSource: "financelog",
        accountPin: pin,
        units: "usd", split: null,
        consentedAt: new Date().toISOString(),
        consentVersion: "1.0",
        deviceId, createdAt: new Date().toISOString(),
      }),
    });
    return res.ok;
  } catch { return false; }
}

// ─── Sign-in / Restore ────────────────────────────────────────────────────────
async function signInPull(email, pin) {
  const deviceId = LS.get("fl-device-id") || uid();
  LS.set("fl-device-id", deviceId);
  try {
    const res = await fetch(`${API_URL}/api/sync/pull`, {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email: email.toLowerCase(), deviceId, pin }),
    });
    if (!res.ok) return null;
    return await res.json();
  } catch { return null; }
}

function applyRestore(data, email) {
  if (data?.transactions) LS.set("fl-tx", data.transactions);
  if (data?.accounts) LS.set("fl-accounts", data.accounts);
  if (data?.budgets) LS.set("fl-budgets", data.budgets);
  LS.set("fl-session-email", email.toLowerCase());
  LS.set("fl-session-token", data?.token || uid());
  LS.set("fl-onboarded", true);
}

// ─── Vanilla UI Helpers ───────────────────────────────────────────────────────
let _state = {};
let _currentView = null;

function setState(updates) { _state = { ..._state, ...updates }; render(); }
function render() {
  const root = document.getElementById("auth-root");
  if (root && _currentView) { root.innerHTML = ""; _currentView(root, _state); }
}

function Ipt(container, { label, type = "text", value, placeholder, inputMode, maxLength, unit, mono } = {}) {
  const wrap = document.createElement("div");
  wrap.style.cssText = "margin-bottom:12px";
  if (label) {
    const lbl = document.createElement("div");
    lbl.style.cssText = `font-size:11px;color:${V.text3};text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;font-weight:600`;
    lbl.textContent = label;
    wrap.appendChild(lbl);
  }
  const rel = document.createElement("div");
  rel.style.cssText = "position:relative";
  const inp = document.createElement("input");
  inp.type = type; inp.value = value || ""; inp.placeholder = placeholder || "";
  if (inputMode) inp.setAttribute("inputmode", inputMode);
  if (maxLength) inp.maxLength = maxLength;
  inp.style.cssText = `width:100%;padding:12px 14px;padding-right:${unit ? 44 : 14}px;background:rgba(255,255,255,0.04);border:1px solid ${V.cardBorder};border-radius:12px;color:${V.text};font-size:${mono ? 24 : 16}px;font-family:${mono ? V.mono : V.font};outline:none;box-sizing:border-box;-webkit-appearance:none;min-height:44px${mono ? ";text-align:center;letter-spacing:12px" : ""}`;
  rel.appendChild(inp);
  if (unit) {
    const u = document.createElement("span");
    u.style.cssText = `position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:11px;color:${V.text3}`;
    u.textContent = unit;
    rel.appendChild(u);
  }
  wrap.appendChild(rel);
  container.appendChild(wrap);
  return inp;
}

function Btn(container, { label, variant = "primary", full, onClick } = {}) {
  const btn = document.createElement("button");
  const base = `display:flex;align-items:center;justify-content:center;gap:6px;border-radius:12px;border:none;font-size:14px;font-weight:600;font-family:${V.font};cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all .15s;min-height:44px;${full ? "width:100%;" : ""}`;
  const variants = {
    primary: `${base}background:linear-gradient(135deg,${V.accent},${V.accent2});color:${V.bg};padding:12px 20px`,
    secondary: `${base}background:rgba(255,255,255,0.06);color:${V.text2};padding:12px 20px;border:1px solid ${V.cardBorder}`,
    danger: `${base}background:rgba(255,107,107,0.12);color:${V.danger};padding:12px 20px`,
    ghost: `${base}background:transparent;color:${V.text3};padding:8px 12px;font-size:13px`,
  };
  btn.style.cssText = variants[variant] || variants.primary;
  btn.textContent = label;
  if (onClick) btn.addEventListener("click", onClick);
  container.appendChild(btn);
  return btn;
}

function Card(container, styles = "") {
  const div = document.createElement("div");
  div.style.cssText = `padding:16px;border-radius:14px;background:${V.card};border:1px solid ${V.cardBorder};margin-bottom:12px;${styles}`;
  container.appendChild(div);
  return div;
}

function PinDots(container, pin) {
  const row = document.createElement("div");
  row.style.cssText = "display:flex;justify-content:center;gap:6px;margin-top:8px";
  for (let i = 0; i < 6; i++) {
    const dot = document.createElement("div");
    dot.style.cssText = `width:10px;height:10px;border-radius:5px;background:${i < pin.length ? V.accent : "rgba(255,255,255,0.1)"};transition:all .15s`;
    row.appendChild(dot);
  }
  container.appendChild(row);
  return row;
}

// ─── Views ────────────────────────────────────────────────────────────────────

function viewWelcome(root, state) {
  const sso = state.detectedSSO;
  root.innerHTML = `
    <div style="text-align:center;padding:40px 0 20px">
      <div style="width:64px;height:64px;border-radius:18px;background:linear-gradient(135deg,${V.accent},${V.accent2});display:inline-flex;align-items:center;justify-content:center;margin-bottom:20px;font-size:30px">💎</div>
      <div style="font-size:28px;font-weight:800;margin-bottom:8px;color:${V.text}">Finance<span style="color:${V.accent}">Log</span></div>
      <div style="font-size:14px;color:${V.text3};margin-bottom:32px;line-height:1.6">Track spending, build budgets,<br/>and grow your wealth.</div>
    </div>
    ${sso && sso.valid ? `
    <div style="padding:14px 16px;border-radius:14px;background:${V.card};border:1px solid rgba(0,245,160,0.2);margin-bottom:16px;display:flex;align-items:center;gap:12px">
      <div style="width:36px;height:36px;border-radius:11px;background:rgba(0,245,160,0.12);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">🔗</div>
      <div>
        <div style="font-size:12px;font-weight:700;color:${V.accent}">IronLog Account Detected</div>
        <div style="font-size:10px;color:${V.text3};margin-top:2px">${sso.email || ""} · Tap to link</div>
      </div>
      <button id="btn-sso" style="margin-left:auto;background:linear-gradient(135deg,${V.accent},${V.accent2});color:${V.bg};border:none;border-radius:8px;padding:6px 12px;font-size:11px;font-weight:700;cursor:pointer;font-family:${V.font}">Link</button>
    </div>` : ""}
    <button id="btn-create" style="display:flex;align-items:center;justify-content:center;width:100%;min-height:48px;border-radius:12px;border:none;background:linear-gradient(135deg,${V.accent},${V.accent2});color:${V.bg};font-size:15px;font-weight:700;cursor:pointer;font-family:${V.font};margin-bottom:10px">Get Started</button>
    <button id="btn-signin" style="display:flex;align-items:center;justify-content:center;width:100%;min-height:44px;border-radius:12px;border:1px solid ${V.cardBorder};background:rgba(255,255,255,0.04);color:${V.text2};font-size:14px;font-weight:600;cursor:pointer;font-family:${V.font}">Sign In — Restore My Data</button>
  `;
  root.querySelector("#btn-create").addEventListener("click", () => {
    setState({ signupStep: 1, signupData: {}, signupError: "" });
    _currentView = viewSignup; render();
  });
  root.querySelector("#btn-signin").addEventListener("click", () => {
    setState({ signInStep: "email", signInEmail: "", signInPin: "", signInError: "" });
    _currentView = viewSignIn; render();
  });
  if (sso?.valid) {
    root.querySelector("#btn-sso")?.addEventListener("click", () => {
      LS.set("fl-session-token", sso.token);
      LS.set("fl-session-email", sso.email || "");
      LS.set("fl-sso-linked", true);
      LS.set("fl-sso-source", sso.type);
      setState({ signupStep: 1, signupData: { email: sso.email || "" }, signupError: "", ssoLinked: true });
      _currentView = viewSignup; render();
    });
  }
}

// ─── SIGNUP ───────────────────────────────────────────────────────────────────

const SIGNUP_STEPS = 4; // profile, goals, pin, verify

function viewSignup(root, state) {
  const step = state.signupStep || 1;
  const data = state.signupData || {};

  // Progress bar
  root.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <button id="btn-back" style="background:none;border:none;display:flex;align-items:center;gap:5px;padding:8px 0;cursor:pointer;-webkit-tap-highlight-color:transparent">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="${V.accent}" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
        <span style="font-size:14px;color:${V.accent};font-weight:600;font-family:${V.font}">Back</span>
      </button>
      <span style="font-size:12px;color:${V.text3};font-weight:600;font-family:${V.font}">Step ${step} of ${SIGNUP_STEPS}</span>
      <div style="width:60px"></div>
    </div>
    <div style="height:3px;border-radius:2px;background:rgba(255,255,255,0.06);margin-bottom:24px">
      <div style="height:3px;border-radius:2px;width:${(step / SIGNUP_STEPS) * 100}%;background:linear-gradient(90deg,${V.accent},${V.accent2});transition:width .3s"></div>
    </div>
    <div id="step-content"></div>
  `;

  root.querySelector("#btn-back").addEventListener("click", () => {
    if (step <= 1) { _currentView = viewWelcome; render(); }
    else { setState({ signupStep: step - 1, signupError: "" }); _currentView = viewSignup; render(); }
  });

  const content = root.querySelector("#step-content");

  if (step === 1) renderSignupProfile(content, data, state);
  else if (step === 2) renderSignupGoals(content, data, state);
  else if (step === 3) renderSignupPin(content, data, state);
  else if (step === 4) renderSignupVerify(content, data, state);
}

function renderSignupProfile(el, data, state) {
  el.innerHTML = `
    <div style="font-size:20px;font-weight:700;margin-bottom:4px;color:${V.text}">Your Profile</div>
    <div style="font-size:13px;color:${V.text3};margin-bottom:20px">A few details to personalize your experience</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:0">
      <div class="field-wrap"><div class="field-lbl">First Name *</div><input class="ipt" id="f-first" placeholder="Jane" value="${data.firstName||""}"/></div>
      <div class="field-wrap"><div class="field-lbl">Last Name *</div><input class="ipt" id="f-last" placeholder="Smith" value="${data.lastName||""}"/></div>
    </div>
    <div class="field-wrap"><div class="field-lbl">Email *</div><input class="ipt" id="f-email" type="email" placeholder="you@email.com" value="${data.email||""}"/></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div class="field-wrap"><div class="field-lbl">Date of Birth *</div><input class="ipt" id="f-dob" type="date" value="${data.dob||""}"/></div>
      <div class="field-wrap">
        <div class="field-lbl">State *</div>
        <select class="ipt" id="f-state" style="appearance:none;-webkit-appearance:none">
          <option value="">Select…</option>

// ─── SIGN IN ──────────────────────────────────────────────────────────────────

function viewSignIn(root, state) {
  const step = state.signInStep || "email";
  const email = state.signInEmail || "";
  const pin = state.signInPin || "";
  const err = state.signInError || "";
  const loading = state.signInLoading || false;

  root.innerHTML = `
    <div style="display:flex;align-items:center;gap:5px;margin-bottom:24px;padding-top:8px">
      <button id="btn-back" style="background:none;border:none;display:flex;align-items:center;gap:5px;padding:8px 0;cursor:pointer;-webkit-tap-highlight-color:transparent">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="${V.accent}" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
        <span style="font-size:14px;color:${V.accent};font-weight:600;font-family:${V.font}">Back</span>
      </button>
    </div>
    <div style="font-size:22px;font-weight:700;margin-bottom:4px;color:${V.text}">Welcome Back</div>
    <div style="font-size:13px;color:${V.text3};margin-bottom:24px">Sign in to restore your data</div>
    <div id="step-content"></div>
  `;

  root.querySelector("#btn-back").addEventListener("click", () => {
    if (step === "email") { _currentView = viewWelcome; render(); }
    else setState({ signInStep: "email", signInError: "" }); _currentView = viewSignIn; render();
  });

  const c = root.querySelector("#step-content");

  if (step === "email") {
    c.innerHTML = `
      <div class="field-wrap"><div class="field-lbl">Email</div><input id="inp-email" class="ipt" type="email" placeholder="you@email.com" value="${email}" autocomplete="email"/></div>
      ${err ? `<div style="font-size:12px;color:${V.danger};margin-bottom:8px">${err}</div>` : ""}
      <button id="btn-next" class="btn-primary">Continue</button>
    `;
    const inp = c.querySelector("#inp-email");
    inp.addEventListener("keydown", e => { if (e.key === "Enter") c.querySelector("#btn-next").click(); });
    c.querySelector("#btn-next").addEventListener("click", () => {
      const v = inp.value.trim();
      if (!isValidEmail(v)) { setState({ signInError: "Enter a valid email" }); _currentView = viewSignIn; render(); return; }
      setState({ signInStep: "pin", signInEmail: v, signInError: "" }); _currentView = viewSignIn; render();
    });
  } else if (step === "pin") {
    c.innerHTML = `
      <div style="font-size:13px;color:${V.text3};margin-bottom:16px">Signing in as <strong style="color:${V.text}">${email}</strong></div>
      <div class="field-wrap">
        <div class="field-lbl">6-digit PIN</div>
        <input id="inp-pin" type="password" inputmode="numeric" maxlength="6" placeholder="• • • • • •"
          style="width:100%;padding:14px;background:rgba(255,255,255,0.04);border:1px solid ${V.cardBorder};border-radius:12px;color:${V.text};font-size:24px;text-align:center;font-family:${V.mono};letter-spacing:12px;outline:none;box-sizing:border-box;margin-bottom:6px"/>
        <div style="display:flex;justify-content:center;gap:6px;margin-bottom:12px">
          ${[0,1,2,3,4,5].map(i=>`<div style="width:8px;height:8px;border-radius:4px;background:${i<pin.length?V.accent:"rgba(255,255,255,0.1)"};transition:all .15s"></div>`).join("")}
        </div>
      </div>
      ${err ? `<div style="font-size:12px;color:${V.danger};text-align:center;margin-bottom:8px">${err}</div>` : ""}
      <button id="btn-signin" class="btn-primary" style="margin-bottom:10px">${loading ? "Signing in…" : "Sign In"}</button>
      <button id="btn-forgot" style="display:block;width:100%;background:none;border:none;cursor:pointer;font-size:12px;color:${V.accent};font-family:${V.font};padding:8px;text-align:center">Forgot PIN?</button>
    `;
    const pinInp = c.querySelector("#inp-pin");
    pinInp.value = pin;
    pinInp.addEventListener("input", () => {
      const v = pinInp.value.replace(/\D/g, "").slice(0, 6);
      pinInp.value = v;
      setState({ signInPin: v }); _currentView = viewSignIn; render();
    });
    c.querySelector("#btn-signin").addEventListener("click", async () => {
      const p = pinInp.value.replace(/\D/g, "");
      if (p.length !== 6) return;
      setState({ signInLoading: true, signInError: "" }); _currentView = viewSignIn; render();
      const result = await signInPull(email, p);
      if (result) {
        applyRestore(result, email);
        await SessionManager.create(email, p, LS.get("fl-device-id") || uid());
        mountApp();
      } else {
        setState({ signInLoading: false, signInError: "Incorrect email or PIN" }); _currentView = viewSignIn; render();
      }
    });
    c.querySelector("#btn-forgot").addEventListener("click", () => {
      setState({ signInStep: "forgot", forgotEmail: email, forgotError: "" }); _currentView = viewSignIn; render();
    });
  } else if (step === "forgot") {
    const forgotEmail = state.forgotEmail || "";
    c.innerHTML = `
      <div style="font-size:16px;font-weight:700;margin-bottom:4px;color:${V.text}">Reset PIN</div>
      <div style="font-size:12px;color:${V.text3};margin-bottom:16px">We'll send a reset code to your email</div>
      <div class="field-wrap"><div class="field-lbl">Email</div><input id="inp-email" class="ipt" type="email" placeholder="you@email.com" value="${forgotEmail}"/></div>
      ${err ? `<div style="font-size:12px;color:${V.danger};margin-bottom:8px">${err}</div>` : ""}
      <button id="btn-send" class="btn-primary">Send Reset Code</button>
    `;
    c.querySelector("#btn-send").addEventListener("click", async () => {
      const e2 = c.querySelector("#inp-email").value.trim();
      if (!isValidEmail(e2)) { setState({ forgotError: "Invalid email", signInError: "Invalid email" }); _currentView = viewSignIn; render(); return; }
      const ok = await SessionManager.sendResetCode(e2);
      if (ok) { setState({ signInStep: "forgot_code", forgotEmail: e2, signInError: "" }); _currentView = viewSignIn; render(); }
      else { setState({ signInError: "Email not found" }); _currentView = viewSignIn; render(); }
    });
  } else if (step === "forgot_code") {
    const forgotEmail = state.forgotEmail || "";
    c.innerHTML = `
      <div style="font-size:16px;font-weight:700;margin-bottom:4px;color:${V.text}">Enter Reset Code</div>
      <div style="font-size:12px;color:${V.text3};margin-bottom:16px">Check your email at <strong style="color:${V.text}">${forgotEmail}</strong></div>
      <div class="field-wrap"><div class="field-lbl">6-Digit Code</div><input id="inp-code" class="ipt" type="text" inputmode="numeric" maxlength="6" placeholder="000000" autocomplete="one-time-code"/></div>
      ${err ? `<div style="font-size:12px;color:${V.danger};margin-bottom:8px">${err}</div>` : ""}
      <button id="btn-verify" class="btn-primary">Verify Code</button>
    `;
    c.querySelector("#btn-verify").addEventListener("click", async () => {
      const code = c.querySelector("#inp-code").value.trim();
      if (code.length !== 6) return;
      const ok = await SessionManager.verifyResetCode(forgotEmail, code);
      if (ok) { setState({ signInStep: "new_pin", forgotCode: code, signInError: "" }); _currentView = viewSignIn; render(); }
      else { setState({ signInError: "Invalid or expired code" }); _currentView = viewSignIn; render(); }
    });
  } else if (step === "new_pin") {
    let np = ""; let cp = "";
    c.innerHTML = `
      <div style="font-size:16px;font-weight:700;margin-bottom:4px;color:${V.text}">New PIN</div>
      <div style="font-size:12px;color:${V.text3};margin-bottom:16px">Choose a new 6-digit PIN</div>
      <div class="field-wrap"><div class="field-lbl">New PIN</div><input id="inp-np" type="password" inputmode="numeric" maxlength="6" placeholder="• • • • • •" style="width:100%;padding:14px;background:rgba(255,255,255,0.04);border:1px solid ${V.cardBorder};border-radius:12px;color:${V.text};font-size:24px;text-align:center;font-family:${V.mono};letter-spacing:12px;outline:none;box-sizing:border-box"/></div>
      <div class="field-wrap"><div class="field-lbl">Confirm PIN</div><input id="inp-cp" type="password" inputmode="numeric" maxlength="6" placeholder="• • • • • •" style="width:100%;padding:14px;background:rgba(255,255,255,0.04);border:1px solid ${V.cardBorder};border-radius:12px;color:${V.text};font-size:24px;text-align:center;font-family:${V.mono};letter-spacing:12px;outline:none;box-sizing:border-box"/></div>
      ${err ? `<div style="font-size:12px;color:${V.danger};margin-bottom:8px">${err}</div>` : ""}
      <button id="btn-set" class="btn-primary">Set New PIN</button>
    `;
    c.querySelector("#btn-set").addEventListener("click", async () => {
      const npi = c.querySelector("#inp-np").value.replace(/\D/g,"");
      const cpi = c.querySelector("#inp-cp").value.replace(/\D/g,"");
      if (npi.length !== 6 || npi !== cpi) { setState({ signInError: npi.length!==6?"PIN must be 6 digits":"PINs don't match" }); _currentView = viewSignIn; render(); return; }
      const ok = await SessionManager.setNewPin(state.forgotEmail, state.forgotCode, npi);
      if (ok) {
        await SessionManager.create(state.forgotEmail, npi, LS.get("fl-device-id") || uid());
        LS.set("fl-onboarded", true);
        mountApp();
      } else { setState({ signInError: "Failed to set PIN" }); _currentView = viewSignIn; render(); }
    });
  }
}

// ─── Mount App ────────────────────────────────────────────────────────────────
function mountApp() {
  document.getElementById("auth-root").style.display = "none";
  document.getElementById("app-shell").style.display = "flex";
  if (window.__reactReady && window.__mountApp) {
    window.__mountApp();
  } else {
    window.__pendingMount = function() { window.__mountApp(); };
  }
}

(function() {
  function startAuth(sso) {
    _state = { detectedSSO: sso || null };
    _currentView = viewWelcome;
    render();
  }

  const onboarded = LS.get("fl-onboarded");
  const sessionToken = LS.get("fl-session-token");

  if (onboarded && sessionToken) { mountApp(); return; }

  const sso = detectSSO();
  if (sso && sso.type !== "fl_session") {
    const t = setTimeout(() => startAuth(null), 3000);
    SessionManager.validateSSO(sso.token)
      .then(r => { clearTimeout(t); startAuth(r?.valid ? { ...sso, email: r.email || sso.email, valid: true } : null); })
      .catch(() => { clearTimeout(t); startAuth(null); });
    return;
  }
  startAuth(sso);
})();

<script>


function ld(url,name){return new Promise(function(res,rej){var s=document.createElement('script');s.src=url;s.crossOrigin='anonymous';s.onload=res;s.onerror=function(){rej(new Error(name+' failed'));};document.head.appendChild(s);})}
function showReactError(msg){
  var el = document.getElementById('react-root');
  if(el) el.innerHTML='<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:24px;text-align:center;gap:12px"><div style="font-size:28px">⚠️</div><div style="color:#ff5757;font-family:monospace;font-size:12px;line-height:1.7;max-width:300px">'+msg+'</div></div>';
}
window.__reactReady = false;

(function(){
  ld('https://cdn.jsdelivr.net/npm/react@18.3.1/umd/react.production.min.js','React')
  .catch(function(){return ld('https://unpkg.com/react@18/umd/react.production.min.js','React');})
  .then(function(){return ld('https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.production.min.js','ReactDOM').catch(function(){return ld('https://unpkg.com/react-dom@18/umd/react-dom.production.min.js','ReactDOM');});})
  .then(function(){return ld('https://cdn.jsdelivr.net/npm/@babel/standalone@7.26.0/babel.min.js','Babel').catch(function(){return ld('https://unpkg.com/@babel/standalone@7.24.0/babel.min.js','Babel');});})
  .then(function(){
    if(typeof React==='undefined') throw new Error('React failed to load');
    if(typeof Babel==='undefined') throw new Error('Babel failed to load');
    var src = document.getElementById('app-src');
    var code;
    try{ code = Babel.transform(src.textContent,{presets:[['react',{runtime:'classic'}]],filename:'app.jsx'}).code; }
    catch(e){ throw new Error('Compile error: '+e.message.slice(0,120)); }
    try{ new Function(code)(); }
    catch(e){ throw new Error('Runtime error: '+e.message.slice(0,120)); }
    // React app compiled and __mountApp is now defined
    window.__reactReady = true;
    // If auth already completed and is waiting for React, mount now
    if(window.__pendingMount){ window.__pendingMount(); window.__pendingMount = null; }
  })
  .catch(function(e){ showReactError(e.message); });
})();


</script>

function calcScore(s){
  let xp=0;const txs=s.transactions||[];
  xp+=txs.length*5;xp+=(s.accounts||[]).length*20;
  xp+=Object.keys(s.budgets||{}).filter(k=>parseFloat(s.budgets[k])>0).length*8;
  const mm={};
  txs.forEach(tx=>{const m=tx.date.slice(0,7);if(!mm[m])mm[m]={i:0,e:0};if(tx.type==="income")mm[m].i+=tx.amount;else mm[m].e+=tx.amount;});
  Object.values(mm).forEach(m=>{if(m.i-m.e>0)xp+=50;if(m.i>0&&(m.i-m.e)/m.i>=0.2)xp+=75;});
  const rank=[...IRON_RANKS].reverse().find(r=>xp>=r.xpNeeded)||IRON_RANKS[0];
  const next=IRON_RANKS.find(r=>r.level===rank.level+1);
  const into=xp-rank.xpNeeded,forNext=next?(next.xpNeeded-rank.xpNeeded):null;
  const pct=forNext?Math.min(100,Math.round(into/forNext*100)):100;
  return{xp,rank,nextRank:next,xpIntoRank:into,xpForNext:forNext,pct};
}

function getMissions(s){
  const td=today(),m=td.slice(0,7);
  const todayTx=(s.transactions||[]).some(tx=>tx.date===td);
  const hasInc=(s.transactions||[]).some(tx=>tx.date.startsWith(m)&&tx.type==="income");
  const hasAcc=(s.accounts||[]).length>0;
  const budCount=Object.keys(s.budgets||{}).filter(k=>parseFloat(s.budgets[k])>0).length;
  const mTx=(s.transactions||[]).filter(tx=>tx.date.startsWith(m));
  const inc=mTx.filter(t=>t.type==="income").reduce((a,t)=>a+t.amount,0);
  const exp=mTx.filter(t=>t.type==="expense").reduce((a,t)=>a+t.amount,0);
  const nw=(s.accounts||[]).reduce((a,ac)=>ac.type==="debt"?a-parseFloat(ac.balance||0):a+parseFloat(ac.balance||0),0);
  return[
    {icon:"💳",title:"Log a Transaction",desc:"Add income or expense today",xp:15,done:todayTx},
    {icon:"💼",title:"Log Income",desc:"Record income this month",xp:20,done:hasInc},
    {icon:"🏦",title:"Track Accounts",desc:"Add at least one account",xp:25,done:hasAcc},
    {icon:"🎯",title:"Set 3 Budgets",desc:"Define budgets for 3+ categories",xp:30,done:budCount>=3},
    {icon:"📈",title:"Positive Month",desc:"Income exceeds expenses",xp:40,done:inc-exp>0},
    {icon:"💰",title:"Positive Net Worth",desc:"Assets exceed liabilities",xp:30,done:nw>0},
  ];
}

function getInsights(s){
  const m=thisMonth(),pm=monthAgo(1);
  const mTx=s.transactions.filter(tx=>tx.date.startsWith(m));
  const pmTx=s.transactions.filter(tx=>tx.date.startsWith(pm));
  const mInc=mTx.filter(t=>t.type==="income").reduce((a,t)=>a+t.amount,0);
  const mExp=mTx.filter(t=>t.type==="expense").reduce((a,t)=>a+t.amount,0);
  const pmExp=pmTx.filter(t=>t.type==="expense").reduce((a,t)=>a+t.amount,0);
  const ins=[];
  if(mInc>0){const r=Math.round((mInc-mExp)/mInc*100);
    if(r>=30)ins.push({icon:"🔥",label:"Great savings",text:`${r}% savings rate`,color:T.acc});
    else if(r>0)ins.push({icon:"📊",label:"Savings rate",text:`Saving ${r}% of income`,color:T.warn});
    else ins.push({icon:"⚠️",label:"Overspending",text:"Expenses exceed income",color:T.danger});
  }
  if(pmExp>0&&mExp>0){const diff=Math.round((mExp-pmExp)/pmExp*100);
    if(diff>15)ins.push({icon:"📈",label:"Spending up",text:`${diff}% more than last month`,color:T.danger});
    else if(diff<-10)ins.push({icon:"📉",label:"Spending down",text:`${Math.abs(diff)}% less`,color:T.acc});
  }
  const cm={};mTx.filter(t=>t.type==="expense").forEach(t=>{cm[t.catId]=(cm[t.catId]||0)+t.amount;});
  const top=Object.entries(cm).sort((a,b)=>b[1]-a[1])[0];
  if(top){const c=getCat(top[0]);ins.push({icon:c.icon,label:"Top spend",text:`${c.label}: $${fmtMoney(top[1],0)}`,color:c.color});}
  return ins.slice(0,3);
}

  const[fMonth,setFMonth]=useState(thisMonth());
  const months=useMemo(()=>{const ms=new Set(s.transactions.map(tx=>tx.date.slice(0,7)));return[thisMonth(),...[...ms].filter(m=>m!==thisMonth())].sort().reverse().slice(0,8);},[s.transactions.length]);
  const filtered=s.transactions.filter(tx=>{const mOk=!fMonth||tx.date.startsWith(fMonth);const tOk=fType==="all"||tx.type===fType;return mOk&&tOk;});
  const totals={i:filtered.filter(t=>t.type==="income").reduce((a,t)=>a+t.amount,0),e:filtered.filter(t=>t.type==="expense").reduce((a,t)=>a+t.amount,0)};
  const grouped=useMemo(()=>{const g={};filtered.forEach(tx=>{const l=fmtDate(tx.date);if(!g[l])g[l]=[];g[l].push(tx);});return Object.entries(g);},[filtered.length,fType,fMonth]);
  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{fontSize:23,fontWeight:800,color:T.t1}}>Transactions</div>
        <Btn v="sm" onClick={()=>setShowAdd(true)}>+ Add</Btn>
      </div>
      <div className="sx">
        {months.map(m=>(
          <button key={m} onClick={()=>setFMonth(fMonth===m?"":m)} className="pr"
            style={{padding:"8px 16px",borderRadius:20,border:"none",fontSize:12,fontWeight:600,fontFamily:T.font,cursor:"pointer",whiteSpace:"nowrap",flexShrink:0,
              background:fMonth===m?"rgba(0,245,160,0.12)":"rgba(255,255,255,.05)",color:fMonth===m?T.acc:T.t3}}>
            {fMonth===m?"✓ ":""}{mShort(m)} {m.slice(0,4)}
          </button>))}
      </div>
      <div style={{display:"flex",background:"rgba(255,255,255,.04)",borderRadius:14,padding:3,border:`1px solid ${T.brd}`}}>
        {["all","income","expense"].map(t=>(
          <button key={t} onClick={()=>setFType(t)} className="pr"
            style={{flex:1,padding:9,borderRadius:11,border:"none",fontSize:12,fontWeight:700,fontFamily:T.font,cursor:"pointer",transition:"all .2s",
              background:fType===t?(t==="income"?"rgba(0,212,160,.15)":t==="expense"?"rgba(255,87,87,.15)":"rgba(255,255,255,.07)"):"transparent",
              color:fType===t?(t==="income"?T.acc:t==="expense"?T.danger:T.t1):T.t3}}>
            {t==="all"?"All":t==="income"?"Income":"Expenses"}
          </button>))}
      </div>
      {filtered.length>0&&(
        <div style={{display:"grid",gridTemplateColumns:"1fr 1px 1fr 1px 1fr",borderRadius:16,background:T.card,border:`1px solid ${T.brd}`,overflow:"hidden"}}>
          {[{l:"IN",v:totals.i,c:T.acc,s:"+"},{l:"OUT",v:totals.e,c:T.danger,s:"-"},{l:"NET",v:totals.i-totals.e,c:(totals.i-totals.e)>=0?T.acc:T.danger,s:(totals.i-totals.e)>=0?"+":"-"}].map((x,i)=>[
            i>0&&<div key={"d"+i} style={{background:T.brd}}/>,
            <div key={x.l} style={{textAlign:"center",padding:"14px 8px"}}>
              <div style={{fontSize:9,color:T.t3,fontWeight:700,letterSpacing:".08em",marginBottom:4}}>{x.l}</div>
              <div style={{fontSize:14,fontWeight:800,color:x.c,fontFamily:T.mono}}>{x.s}${fmtShort(Math.abs(x.v))}</div>
            </div>])}
        </div>)}
      {grouped.map(([label,txs],gi)=>(
        <div key={gi}>
          <div style={{fontSize:10,color:T.t3,fontWeight:700,letterSpacing:".06em",paddingLeft:4,marginBottom:8}}>{label.toUpperCase()}</div>
          <div style={{borderRadius:16,background:T.card,border:`1px solid ${T.brd}`,padding:"0 14px"}}>
            {txs.map(tx=><TxRow key={tx.id} tx={tx} onDelete={()=>Confirm.show("Delete?","",()=>d({type:"DEL_TX",id:tx.id}))}/>)}
          </div>
        </div>))}
      {filtered.length===0&&<div style={{textAlign:"center",padding:"48px 20px"}}><div style={{fontSize:36,marginBottom:12}}>🔍</div><div style={{fontSize:14,color:T.t2,marginBottom:4}}>No transactions</div><div style={{fontSize:12,color:T.t3}}>Try a different filter</div></div>}
      {showAdd&&<AddTx onClose={()=>setShowAdd(false)} onSave={tx=>{d({type:"ADD_TX",tx});Toast.show(tx.type==="income"?"Income added":"Expense logged",tx.type==="income"?T.acc:T.danger);Haptic.med();}}/>}
    </div>);
}

function BudgetTab({s,d}){
  const[showEdit,setShowEdit]=useState(false);
  const[editB,setEditB]=useState({});
  const m=thisMonth();
  const mTx=s.transactions.filter(tx=>tx.date.startsWith(m)&&tx.type==="expense");
  const spent=useMemo(()=>{const map={};mTx.forEach(tx=>{map[tx.catId]=(map[tx.catId]||0)+tx.amount;});return map;},[mTx.length]);
  const totalBud=Object.values(s.budgets).reduce((a,b)=>a+(parseFloat(b)||0),0);
  const totalSp=Object.values(spent).reduce((a,b)=>a+b,0);
  const overCats=EXP_CATS.filter(c=>parseFloat(s.budgets[c.id])>0&&(spent[c.id]||0)>parseFloat(s.budgets[c.id]));
  const health=totalBud>0?Math.max(0,Math.round(100-(Math.max(0,totalSp-totalBud)/totalBud*100)-(overCats.length*8))):null;
  const hColor=health===null?T.t3:health>=80?T.acc:health>=50?T.warn:T.danger;
  const catRows=EXP_CATS.filter(cat=>s.budgets[cat.id]||spent[cat.id]);
  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{fontSize:23,fontWeight:800,color:T.t1}}>Budget</div>
        <Btn v="sm" onClick={()=>{setEditB({...s.budgets});setShowEdit(true);}}>Edit</Btn>
      </div>
      {health!==null?(
        <div style={{borderRadius:20,background:T.card,border:`1px solid ${T.brd}`,padding:"18px 20px"}}>
          <div style={{display:"flex",alignItems:"center",gap:16}}>
            <div style={{position:"relative",flexShrink:0}}>
              <Ring value={health} max={100} size={72} sw={8} color={hColor}/>
              <div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",textAlign:"center"}}>
                <div style={{fontSize:17,fontWeight:800,fontFamily:T.mono,color:hColor}}>{health}</div>
              </div>
            </div>
            <div style={{flex:1}}>
              <div style={{fontSize:10,color:T.t3,fontWeight:600,textTransform:"uppercase",letterSpacing:".06em",marginBottom:4}}>Budget Health</div>
              <div style={{fontSize:16,fontWeight:700,color:hColor}}>{health>=80?"On Track 🎯":health>=50?"Watch Spending ⚠️":"Over Budget 🚨"}</div>
              <div style={{fontSize:11,color:T.t3,marginTop:3}}>${fmtMoney(totalSp,0)} of ${fmtMoney(totalBud,0)} used</div>
            </div>
          </div>
          {totalBud>0&&<div style={{marginTop:14}}>
            <div style={{height:6,borderRadius:3,background:"rgba(255,255,255,.06)"}}>
              <div style={{height:"100%",borderRadius:3,width:`${Math.min(100,totalSp/totalBud*100)}%`,background:`linear-gradient(90deg,${T.acc},${totalSp>totalBud?T.danger:T.acc2})`,transition:"width .5s"}}/>
            </div>
          </div>}
        </div>
      ):(
        <div style={{borderRadius:20,background:T.card,border:`1px solid ${T.brd}`,padding:22,textAlign:"center"}}>
          <div style={{fontSize:40,marginBottom:10}}>🎯</div>
          <div style={{fontSize:15,fontWeight:700,color:T.t1,marginBottom:6}}>No budgets set</div>
          <div style={{fontSize:12,color:T.t3,marginBottom:18}}>Set monthly limits per category to track your spending</div>
          <Btn onClick={()=>{setEditB({...s.budgets});setShowEdit(true);}}>Set Budgets</Btn>
        </div>)}
      {overCats.length>0&&(
        <div style={{borderRadius:16,background:"rgba(255,107,107,0.12)",border:"1px solid rgba(255,87,87,.2)",padding:"12px 16px",display:"flex",gap:10,alignItems:"center"}}>
          <span style={{fontSize:20}}>⚠️</span>
          <div>
            <div style={{fontSize:13,fontWeight:700,color:T.danger}}>{overCats.length} {overCats.length===1?"category":"categories"} over budget</div>
            <div style={{fontSize:11,color:T.danger,opacity:.7}}>{overCats.map(c=>c.label).join(", ")}</div>
          </div>
        </div>)}
      {catRows.map((cat)=>{
        const bud=parseFloat(s.budgets[cat.id])||0,sp=spent[cat.id]||0;
        const pct=bud>0?Math.min(110,Math.round(sp/bud*100)):0,over=sp>bud&&bud>0;
        return(
          <div key={cat.id} style={{borderRadius:18,background:T.card,border:`1px solid ${over?"rgba(255,87,87,.2)":T.brd}`,padding:"14px 16px"}}>
            <div style={{display:"flex",alignItems:"center",gap:12}}>
              <div style={{position:"relative",flexShrink:0}}>
                <Ring value={sp} max={bud||sp+1} size={52} sw={6} color={cat.color}/>
                <div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",fontSize:18}}>{cat.icon}</div>
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:4}}>
                  <div style={{fontSize:13,fontWeight:700,color:T.t1}}>{cat.label}</div>
                  {bud>0&&<div style={{fontSize:12,fontWeight:800,fontFamily:T.mono,color:over?T.danger:pct>80?T.warn:T.acc}}>{pct}%</div>}
                </div>
                <div style={{fontSize:11,color:T.t3}}>
                  <span style={{color:over?T.danger:T.t2,fontFamily:T.mono,fontWeight:600}}>${fmtMoney(sp,0)}</span>
                  {bud>0&&<span> of ${fmtMoney(bud,0)}</span>}
                  {!bud&&<span> (no limit)</span>}
                  {over&&<span style={{color:T.danger,fontWeight:700}}> · ${fmtMoney(sp-bud,0)} over</span>}
                </div>
              </div>
            </div>
          </div>);})}
      {showEdit&&(
        <Sheet title="Monthly Budgets" onClose={()=>setShowEdit(false)} footer={<Btn full onClick={()=>{d({type:"SET_BUD",b:editB});Toast.show("Budgets saved ✓",T.acc);setShowEdit(false);}}>Save Budgets</Btn>}>
          <div style={{fontSize:12,color:T.t3,marginBottom:18,lineHeight:1.6}}>Set a monthly limit per category. Leave blank for no limit.</div>
          {EXP_CATS.map(cat=>(
            <div key={cat.id} style={{marginBottom:12}}>
              <div style={{fontSize:11,color:T.t3,fontWeight:600,marginBottom:6,display:"flex",alignItems:"center",gap:7}}>
                <span>{cat.icon}</span><span>{cat.label}</span>
                {editB[cat.id]&&parseFloat(editB[cat.id])>0&&<span style={{marginLeft:"auto",color:T.acc,fontFamily:T.mono,fontSize:11}}>${parseFloat(editB[cat.id]).toLocaleString()}</span>}
              </div>
              <div style={{position:"relative"}}>
                <span style={{position:"absolute",left:14,top:"50%",transform:"translateY(-50%)",fontSize:14,color:T.t3,fontFamily:T.mono}}>$</span>
                <input type="number" value={editB[cat.id]||""} onChange={e=>setEditB(b=>({...b,[cat.id]:e.target.value}))} placeholder="No limit" step="50"
                  style={{width:"100%",padding:"12px 14px 12px 30px",background:"rgba(255,255,255,.04)",border:`1px solid ${T.brd}`,borderRadius:12,color:T.t1,fontSize:15,fontFamily:T.mono,outline:"none",boxSizing:"border-box"}}/>
              </div>
            </div>))}
        </Sheet>)}
    </div>);
}

function WealthTab({s,d}){
  const[showAdd,setShowAdd]=useState(false);
  const[form,setForm]=useState({name:"",balance:"",type:"checking"});
  const[editId,setEditId]=useState(null);
  const ACC=[
    {id:"checking",label:"Checking",icon:"🏦",color:"#00d9f5"},
    {id:"savings",label:"Savings",icon:"💰",color:T.acc},
    {id:"investment",label:"Investment",icon:"📈",color:T.warn},
    {id:"crypto",label:"Crypto",icon:"🪙",color:"#f7931a"},
    {id:"property",label:"Property",icon:"🏠",color:"#fb923c"},
    {id:"debt",label:"Debt / Loan",icon:"💳",color:T.danger},
  ];
  const assets=s.accounts.filter(a=>a.type!=="debt").reduce((a,ac)=>a+parseFloat(ac.balance||0),0);
  const debts=s.accounts.filter(a=>a.type==="debt").reduce((a,ac)=>a+parseFloat(ac.balance||0),0);
  const nw=assets-debts,nwC=nw>=0?T.acc:T.danger,ar=assets>0?assets/(assets+debts):0;
  const open=(ac=null)=>{
    if(ac){setEditId(ac.id);setForm({name:ac.name,balance:ac.balance.toString(),type:ac.type});}
    else{setEditId(null);setForm({name:"",balance:"",type:"checking"});}
    setShowAdd(true);
  };
  const save=()=>{
    if(!form.name.trim()||!form.balance)return;
    const acc={...form,balance:parseFloat(form.balance)};
    if(editId){d({type:"UPD_ACC",acc:{id:editId,...acc}});}
    else{d({type:"ADD_ACC",acc:{id:uid(),...acc,createdAt:today()}});}
    Toast.show("Account saved",T.acc);setShowAdd(false);setEditId(null);
  };
  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{fontSize:23,fontWeight:800,color:T.t1}}>Net Worth</div>
        <Btn v="sm" onClick={()=>open()}>+ Account</Btn>
      </div>
      <div style={{borderRadius:24,padding:"24px 20px",background:`linear-gradient(135deg,${nwC}0e,${nwC}04)`,border:`1px solid ${nwC}20`,boxShadow:"0 8px 40px rgba(0,0,0,.3)"}}>
        <div style={{fontSize:10,color:T.t3,fontWeight:600,letterSpacing:".1em",textTransform:"uppercase",marginBottom:8}}>Net Worth</div>
        <div style={{fontSize:44,fontWeight:800,fontFamily:T.mono,color:nwC,lineHeight:1,marginBottom:20}}>{nw<0&&"-"}$<AnimCount value={Math.abs(nw)}/></div>
        {(assets>0||debts>0)&&<>
          <div style={{height:8,borderRadius:4,background:"rgba(255,255,255,.07)",marginBottom:10,overflow:"hidden"}}>
            <div style={{height:"100%",borderRadius:4,width:`${ar*100}%`,background:`linear-gradient(90deg,${T.acc},${T.acc2})`,transition:"width .6s"}}/>
          </div>
          <div style={{display:"flex",justifyContent:"space-between"}}>
            <div style={{display:"flex",alignItems:"center",gap:6}}><div style={{width:8,height:8,borderRadius:4,background:T.acc}}/><div style={{fontSize:11,color:T.t3}}>Assets <span style={{color:T.acc,fontFamily:T.mono,fontWeight:600}}>${fmtShort(assets)}</span></div></div>
            <div style={{display:"flex",alignItems:"center",gap:6}}><div style={{width:8,height:8,borderRadius:4,background:T.danger}}/><div style={{fontSize:11,color:T.t3}}>Debt <span style={{color:T.danger,fontFamily:T.mono,fontWeight:600}}>${fmtShort(debts)}</span></div></div>
          </div>
        </>}
      </div>
      {s.accounts.length===0&&(
        <div style={{textAlign:"center",padding:"40px 20px",borderRadius:20,background:T.card,border:`1px solid ${T.brd}`}}>
          <div style={{fontSize:40,marginBottom:12}}>🏦</div>
          <div style={{fontSize:15,fontWeight:700,color:T.t1,marginBottom:6}}>No accounts yet</div>
          <div style={{fontSize:12,color:T.t3,marginBottom:16}}>Add your checking, savings, investments, and loans.</div>
          <Btn onClick={()=>open()}>Add Account</Btn>
        </div>)}
      {ACC.filter(at=>at.id!=="debt").map(at=>s.accounts.filter(a=>a.type===at.id).map(ac=>(
        <button key={ac.id} onClick={()=>open(ac)} className="pr" style={{display:"flex",alignItems:"center",gap:14,padding:"14px 16px",borderRadius:18,background:T.card,border:`1px solid ${T.brd}`,cursor:"pointer",width:"100%",textAlign:"left",WebkitTapHighlightColor:"transparent"}}>
          <div style={{width:44,height:44,borderRadius:14,background:`${at.color}18`,border:`1px solid ${at.color}22`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>{at.icon}</div>
          <div style={{flex:1,minWidth:0}}><div style={{fontSize:14,fontWeight:700,color:T.t1}}>{ac.name}</div><div style={{fontSize:11,color:T.t3,marginTop:2}}>{at.label}</div></div>
          <div style={{display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
            <div style={{fontSize:17,fontWeight:800,fontFamily:T.mono,color:T.acc}}>${fmtMoney(parseFloat(ac.balance))}</div>
            <button onClick={e=>{e.stopPropagation();Confirm.show(`Delete ${ac.name}?`,"",()=>d({type:"DEL_ACC",id:ac.id}));}} className="pr" style={{background:"none",border:"none",padding:6,cursor:"pointer",opacity:.36,borderRadius:8}}>
              <svg width={13} height={13} viewBox="0 0 24 24" fill="none" stroke={T.t3} strokeWidth="2" strokeLinecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg>
            </button>
          </div>
        </button>)))}
      {s.accounts.filter(a=>a.type==="debt").map(ac=>(
        <button key={ac.id} onClick={()=>open(ac)} className="pr" style={{display:"flex",alignItems:"center",gap:14,padding:"14px 16px",borderRadius:18,background:"rgba(255,87,87,.05)",border:"1px solid rgba(255,87,87,.14)",cursor:"pointer",width:"100%",textAlign:"left",WebkitTapHighlightColor:"transparent"}}>
          <div style={{width:44,height:44,borderRadius:14,background:"rgba(255,107,107,0.12)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>💳</div>
          <div style={{flex:1,minWidth:0}}><div style={{fontSize:14,fontWeight:700,color:T.t1}}>{ac.name}</div><div style={{fontSize:11,color:T.danger,marginTop:2}}>Liability</div></div>
          <div style={{display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
            <div style={{fontSize:17,fontWeight:800,fontFamily:T.mono,color:T.danger}}>-${fmtMoney(parseFloat(ac.balance))}</div>
            <button onClick={e=>{e.stopPropagation();Confirm.show(`Delete ${ac.name}?`,"",()=>d({type:"DEL_ACC",id:ac.id}));}} className="pr" style={{background:"none",border:"none",padding:6,cursor:"pointer",opacity:.36,borderRadius:8}}>
              <svg width={13} height={13} viewBox="0 0 24 24" fill="none" stroke={T.t3} strokeWidth="2" strokeLinecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg>
            </button>
          </div>
        </button>))}
      {showAdd&&(
        <Sheet title={editId?"Edit Account":"New Account"} onClose={()=>{setShowAdd(false);setEditId(null);}} footer={<Btn full onClick={save}>Save Account</Btn>}>
          <Field label="Account Name" value={form.name} onChange={v=>setForm(f=>({...f,name:v}))} placeholder="e.g. Chase Checking" autoFocus/>
          <Field label="Current Balance" type="number" value={form.balance} onChange={v=>setForm(f=>({...f,balance:v}))} unit="$" step="0.01" placeholder="0.00"/>
          <div style={{marginBottom:14}}>
            <div style={{fontSize:11,color:T.t3,fontWeight:600,textTransform:"uppercase",letterSpacing:".08em",marginBottom:10}}>Account Type</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              {ACC.map(t=>(
                <button key={t.id} onClick={()=>setForm(f=>({...f,type:t.id}))} className="pr"
                  style={{padding:"12px",borderRadius:14,border:`1px solid ${form.type===t.id?t.color+"50":T.brd}`,background:form.type===t.id?`${t.color}12`:"transparent",
                    color:form.type===t.id?t.color:T.t3,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:T.font,display:"flex",alignItems:"center",gap:8}}>
                  <span style={{fontSize:18}}>{t.icon}</span><span>{t.label}</span>
                </button>))}
            </div>
          </div>
        </Sheet>)}
    </div>);
}

        <Btn v="ghost" full onClick={()=>{
          const rows=["Date,Type,Category,Amount,Note",...s.transactions.map(tx=>`${tx.date},${tx.type},${getCat(tx.catId||tx.cat).label},${tx.amount},"${(tx.note||"").replace(/"/g,'""')}"`)] .join("\n");
          const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([rows],{type:"text/csv"}));a.download=`financelog-${today()}.csv`;a.click();
          Toast.show("CSV exported ✓",T.acc);}}>
          <svg width={15} height={15} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Export as CSV
        </Btn>
      </Acc>
      <Acc id="privacy" icon="🔒" label="Privacy & Data">
        <div style={{fontSize:12,color:T.t2,marginBottom:16,lineHeight:1.7,padding:"12px 14px",borderRadius:12,background:"rgba(0,212,160,.06)",border:"1px solid rgba(0,212,160,.14)"}}>
          🔐 All data is stored <strong style={{color:T.t1}}>only on this device</strong> using localStorage. Nothing is sent to any server.
        </div>
        <Btn v="danger" full onClick={()=>Confirm.show("Delete all data?","All transactions, budgets, and accounts will be permanently deleted.",()=>{["fl-tx","fl-accounts","fl-budgets","fl-last-level","fl-onboarded","fl-session-token","fl-session-email","fl-session-expires","fl-profile","fl-goals","fl-device-id","fl-email-verified","fl-sso-linked","fl-sso-source"].forEach(k=>localStorage.removeItem(k));window.location.reload();})}>
          <svg width={15} height={15} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg>
          Clear All Data
        </Btn>
      </Acc>
      <div style={{marginTop:16,textAlign:"center"}}>
        <div style={{fontSize:12,color:T.t3,fontWeight:600,letterSpacing:".04em"}}>FinanceLog</div>
        <div style={{fontSize:10,color:T.t3,opacity:.4,marginTop:2}}>by IRONLOG · v2.0 · Local storage only</div>
      </div>
    </div>);
}

function App(){
  const[s,d]=useReducer(reducer,INIT);
  const score=useMemo(()=>calcScore(s),[s.transactions.length,s.accounts.length,JSON.stringify(s.budgets)]);
  const missions=useMemo(()=>getMissions(s),[s.transactions.length,s.accounts.length,JSON.stringify(s.budgets)]);
  const{celebrating,celebRank,dismiss}=useLevelUp(score,"fl-last-level");
  const[showAdd,setShowAdd]=useState(false);

  useEffect(()=>{
    d({type:"INIT",p:{transactions:LS.get("fl-tx")||[],accounts:LS.get("fl-accounts")||[],budgets:LS.get("fl-budgets")||{}}});
  },[]);

  useEffect(()=>{
    if(!s.loaded)return;
    LS.set("fl-tx",s.transactions);
    LS.set("fl-accounts",s.accounts);
    LS.set("fl-budgets",s.budgets);
  },[s.transactions,s.accounts,s.budgets,s.loaded]);

  if(!s.loaded)return(
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100%",background:T.bg,flexDirection:"column",gap:16}}>
      <div style={{width:36,height:36,border:`3px solid rgba(0,245,160,0.15)`,borderTopColor:T.acc,borderRadius:"50%",animation:"spin .8s linear infinite"}}></div>
      <div style={{fontSize:13,color:T.t2,fontFamily:T.font}}>Loading FinanceLog...</div>
    </div>);

  const TABS=[
    {id:"home",label:"Home",icon:({size=20,color=T.t3,strokeWidth=1.6})=>(
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth={strokeWidth} strokeLinecap="round">
        <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V9.5z"/><polyline points="9 21 9 12 15 12 15 21"/>
      </svg>)},
    {id:"transactions",label:"Activity",icon:({size=20,color=T.t3,strokeWidth=1.6})=>(
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth={strokeWidth} strokeLinecap="round">
        <rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/>
        <line x1="7" y1="15" x2="9" y2="15"/><line x1="12" y1="15" x2="17" y2="15"/>
      </svg>)},
    {id:"budget",label:"Budget",icon:({size=20,color=T.t3,strokeWidth=1.6})=>(
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth={strokeWidth} strokeLinecap="round">
        <circle cx="12" cy="12" r="10"/><path d="M12 6v2M12 16v2M8.5 9a3.5 3.5 0 0 1 7 0c0 2-3.5 3-3.5 3s-3.5 1-3.5 3a3.5 3.5 0 0 0 7 0"/>
      </svg>)},
    {id:"wealth",label:"Wealth",icon:({size=20,color=T.t3,strokeWidth=1.6})=>(
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth={strokeWidth} strokeLinecap="round">
        <polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/>
      </svg>)},
    {id:"settings",label:"More",icon:({size=20,color=T.t3,strokeWidth=1.6})=>(
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth={strokeWidth} strokeLinecap="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>)},
  ];

  return(
    <div style={{height:"100%",display:"flex",flexDirection:"column",background:T.bg,color:T.t1,fontFamily:T.font,position:"relative"}}>
      {/* safe-area top */}
      <div style={{height:"env(safe-area-inset-top,0px)",background:T.bg,flexShrink:0}}/>

      {/* Header */}
      <div style={{padding:"12px 20px 10px",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0,borderBottom:`1px solid ${T.brd}`}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{width:28,height:28,borderRadius:8,background:`linear-gradient(135deg,${T.acc},${T.acc2})`,display:"flex",alignItems:"center",justifyContent:"center"}}>
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke={T.bg} strokeWidth="2.5" strokeLinecap="round">
              <line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
            </svg>
          </div>
          <span style={{fontSize:17,fontWeight:800,letterSpacing:"-0.03em",color:T.t1}}>Finance<span style={{color:T.acc}}>Log</span></span>
        </div>
        <button onClick={()=>setShowAdd(true)} style={{width:34,height:34,borderRadius:10,background:`${T.acc}15`,border:`1px solid ${T.acc}30`,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",border:"none"}}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={T.acc} strokeWidth="2.5" strokeLinecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
      </div>

      {/* Content */}
      <div style={{flex:1,overflowY:"auto",WebkitOverflowScrolling:"touch",minHeight:0}}>
        {s.tab==="home"&&<HomeTab s={s} d={d} score={score} missions={missions} showAdd={showAdd} setShowAdd={setShowAdd}/>}
        {s.tab==="transactions"&&<TxTab s={s} d={d}/>}
        {s.tab==="budget"&&<BudgetTab s={s} d={d}/>}
        {s.tab==="wealth"&&<WealthTab s={s} d={d}/>}
        {s.tab==="settings"&&<SettingsTab s={s} d={d}/>}
      </div>

      {/* Bottom Nav — IronLog style */}
      <nav style={{flexShrink:0,background:"rgba(8,8,13,0.95)",backdropFilter:"blur(24px) saturate(180%)",
        borderTop:`1px solid rgba(255,255,255,0.06)`,paddingBottom:"env(safe-area-inset-bottom,8px)",
        display:"flex",justifyContent:"space-around",alignItems:"center",paddingTop:8,position:"relative",zIndex:50}}>
        {TABS.map(tab=>{
          const active=s.tab===tab.id;
          return(
            <button key={tab.id} onClick={()=>{Haptic.light();d({type:"TAB",tab:tab.id});}}
              style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3,background:"none",border:"none",
                cursor:"pointer",padding:"6px 16px",minWidth:64,WebkitTapHighlightColor:"transparent",transition:"all .15s"}}>
              <div style={{width:active?42:36,height:active?42:36,borderRadius:active?14:12,position:"relative",
                background:active?`${T.acc}18`:"transparent",display:"flex",alignItems:"center",justifyContent:"center",
                transition:"all .2s ease"}}>
                {tab.icon({size:active?22:20,color:active?T.acc:T.t3,strokeWidth:active?2.2:1.6})}
              </div>
              <span style={{fontSize:10,fontWeight:active?700:500,color:active?T.acc:T.t3,letterSpacing:".01em"}}>{tab.label}</span>
            </button>);
        })}
      </nav>

      <ToastBar/>
      <ConfirmDlg/>
      {celebrating&&celebRank&&<LevelUp rank={celebRank} onDismiss={dismiss}/>}
    </div>);
}


function __mountApp() { ReactDOM.createRoot(document.getElementById("react-root")).render(<App/>); }

</script>
</body>
</html>
