<script>
var loadStatus={};
function loadScript(url,name){
  return new Promise(function(resolve,reject){
    var s=document.createElement('script');s.src=url;s.crossOrigin='anonymous';
    s.onload=function(){loadStatus[name]='ok';resolve();};
    s.onerror=function(){loadStatus[name]='FAILED';reject(new Error(name+' failed from '+url));};
    document.head.appendChild(s);
  });
}
function showError(msg){
  document.getElementById('root').innerHTML='<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;padding:24px;text-align:center;gap:12px;background:#030b07"><div style="font-size:28px">🚫</div><div style="color:#f87171;font-family:monospace;font-size:13px;line-height:1.6;max-width:320px">'+msg+'</div><div style="color:#64748b;font-size:11px">Check your internet connection and reload</div></div>';
}
(function(){
  loadScript('https://cdn.jsdelivr.net/npm/react@18.3.1/umd/react.production.min.js','React')
  .catch(function(){return loadScript('https://unpkg.com/react@18/umd/react.production.min.js','React');})
  .then(function(){
    return loadScript('https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.production.min.js','ReactDOM')
    .catch(function(){return loadScript('https://unpkg.com/react-dom@18/umd/react-dom.production.min.js','ReactDOM');});
  })
  .then(function(){
    return loadScript('https://cdn.jsdelivr.net/npm/recharts@2.12.7/umd/Recharts.js','Recharts')
    .catch(function(){return loadScript('https://unpkg.com/recharts@2.5.0/umd/Recharts.js','Recharts');});
  })
  .then(function(){
    return loadScript('https://cdn.jsdelivr.net/npm/@babel/standalone@7.26.0/babel.min.js','Babel')
    .catch(function(){return loadScript('https://unpkg.com/@babel/standalone@7.24.0/babel.min.js','Babel');});
  })
  .then(function(){
    if(typeof React==='undefined')throw new Error('React not available');
    if(typeof Babel==='undefined')throw new Error('Babel not available');
    var src=document.getElementById('app-src');
    if(!src)throw new Error('App source not found');
    var compiled;
    try{compiled=Babel.transform(src.textContent,{presets:[['react',{runtime:'classic'}]],filename:'app.jsx'}).code;}
    catch(e){throw new Error('Compile error: '+e.message.slice(0,120));}
    try{new Function(compiled)();}
    catch(e){throw new Error('Runtime error: '+e.message.slice(0,120));}
  })
  .catch(function(e){showError(e.message);});
})();
</script>

// ─── FinanceLog XP Calculation ───
function calcScore(s){
  let xp=0;
  const txs=s.transactions||[];
  // Each transaction: 5 XP
  xp+=txs.length*5;
  // Each account: 20 XP
  xp+=(s.accounts||[]).length*20;
  // Each budget category set: 8 XP
  xp+=Object.keys(s.budgets||{}).filter(k=>parseFloat(s.budgets[k])>0).length*8;
  // Months with positive savings
  const monthMap={};
  txs.forEach(tx=>{const m=tx.date.slice(0,7);if(!monthMap[m])monthMap[m]={inc:0,exp:0};if(tx.type==="income")monthMap[m].inc+=tx.amount;else monthMap[m].exp+=tx.amount;});
  Object.values(monthMap).forEach(m=>{if(m.inc-m.exp>0)xp+=50;if(m.inc>0&&(m.inc-m.exp)/m.inc>=0.2)xp+=75;});
  const rank=[...IRON_RANKS].reverse().find(r=>xp>=r.xpNeeded)||IRON_RANKS[0];
  const nextRank=IRON_RANKS.find(r=>r.level===rank.level+1);
  const xpIntoRank=xp-rank.xpNeeded;
  const xpForNext=nextRank?(nextRank.xpNeeded-rank.xpNeeded):null;
  const pct=xpForNext?Math.min(100,Math.round(xpIntoRank/xpForNext*100)):100;
  return{xp,rank,nextRank,xpIntoRank,xpForNext,pct,streak:0};
}

// ─── FinanceLog Daily Missions ───
function getDailyMissions(s){
  const td=today();
  const m=td.slice(0,7);
  const todayTx=(s.transactions||[]).some(tx=>tx.date===td);
  const hasIncome=(s.transactions||[]).some(tx=>tx.date.startsWith(m)&&tx.type==="income");
  const hasAccounts=(s.accounts||[]).length>0;
  const budgetCount=Object.keys(s.budgets||{}).filter(k=>parseFloat(s.budgets[k])>0).length;
  const monthTx=(s.transactions||[]).filter(tx=>tx.date.startsWith(m));
  const inc=monthTx.filter(t=>t.type==="income").reduce((a,t)=>a+t.amount,0);
  const exp=monthTx.filter(t=>t.type==="expense").reduce((a,t)=>a+t.amount,0);
  const savingsPositive=inc-exp>0;
  const netWorth=(s.accounts||[]).reduce((a,ac)=>ac.type==="debt"?a-parseFloat(ac.balance||0):a+parseFloat(ac.balance||0),0);
  return[
    {icon:"💳",title:"Log a Transaction",desc:"Add an income or expense today",xp:15,done:todayTx},
    {icon:"💼",title:"Log Income",desc:"Record income this month",xp:20,done:hasIncome},
    {icon:"🏦",title:"Track Net Worth",desc:"Add at least one account",xp:25,done:hasAccounts},
    {icon:"🎯",title:"Set Budgets",desc:"Define budgets for 3+ categories",xp:30,done:budgetCount>=3},
    {icon:"📈",title:"Positive Month",desc:"Monthly income exceeds expenses",xp:40,done:savingsPositive},
    {icon:"💰",title:"Positive Net Worth",desc:"Total assets exceed liabilities",xp:30,done:netWorth>0},
  ];
}

// ─── Level-Up Detection Hook ───
function useLevelUp(score,lsKey){
  const {rank}=score;
  const [celebrating,setCelebrating]=useState(false);
  const [celebRank,setCelebRank]=useState(null);
  useEffect(()=>{
    const saved=parseInt(LS.get(lsKey)||"1");
    if(rank.level>saved){
      LS.set(lsKey,rank.level);
      setCelebRank(rank);
      setTimeout(()=>setCelebrating(true),400);
    } else if(!LS.get(lsKey)){LS.set(lsKey,rank.level);}
  },[rank.level]);
  return{celebrating,celebRank,dismiss:()=>setCelebrating(false)};
}

const UndoMgr={_fn:null,_timer:null,show:(msg,onUndo,accent)=>{if(UndoMgr._timer)clearTimeout(UndoMgr._timer);if(UndoMgr._fn)UndoMgr._fn({msg,onUndo,accent:accent||V.accent,ts:Date.now()});UndoMgr._timer=setTimeout(()=>{if(UndoMgr._fn)UndoMgr._fn(null);},5000);},clear:()=>{if(UndoMgr._timer)clearTimeout(UndoMgr._timer);if(UndoMgr._fn)UndoMgr._fn(null);}};
function UndoToastBar(){
  const [item,setItem]=useState(null);
  UndoMgr._fn=setItem;
  useEffect(()=>()=>{UndoMgr._fn=null;},[]);
  if(!item)return null;
  const age=(Date.now()-item.ts)/5000;

    <div style={{position:"fixed",bottom:"calc(env(safe-area-inset-bottom,0px) + 88px)",left:16,right:16,zIndex:9997,display:"flex",alignItems:"center",gap:10,padding:"12px 16px",borderRadius:14,background:"rgba(20,20,32,0.97)",border:`1px solid ${item.accent}30`,backdropFilter:"blur(12px)",boxShadow:"0 4px 24px rgba(0,0,0,0.4)",animation:"fadeUp .25s ease"}}>

    </div>,
    document.body
  );
}

const init={tab:"dashboard",transactions:[],accounts:[],budgets:{},loaded:false};
function reducer(s,a){
  switch(a.type){
    case "INIT":return{...s,...a.p,loaded:true};
    case "TAB":return{...s,tab:a.tab};
    case "ADD_TX":return{...s,transactions:[a.tx,...s.transactions]};
    case "DEL_TX":return{...s,transactions:s.transactions.filter(t=>t.id!==a.id)};
    case "ADD_ACCOUNT":return{...s,accounts:[...s.accounts,a.account]};
    case "DEL_ACCOUNT":return{...s,accounts:s.accounts.filter(a2=>a2.id!==a.id)};
    case "UPDATE_ACCOUNT":return{...s,accounts:s.accounts.map(ac=>ac.id===a.account.id?a.account:ac)};
    case "SET_BUDGET":return{...s,budgets:{...s.budgets,...a.b}};
    default:return s;
  }
}

function AddTxSheet({onClose,onSave}){
  const [type,setType]=useState("expense");
  const [amount,setAmount]=useState("");

  const [note,setNote]=useState("");
  const [date,setDate]=useState(today());
  const cats=type==="expense"?EXP_CATS:INC_CATS;

    if(!amount||parseFloat(amount)<=0)return;

    <Sheet title="Add Transaction" onClose={onClose} footer={<Btn full onClick={save} disabled={!amount||parseFloat(amount)<=0}>Save Transaction</Btn>}>
      <div style={{display:"flex",gap:8,marginBottom:20}}>

        <Btn full v={type==="income"?"income":"secondary"} onClick={()=>{setType("income");setCat("salary");}}>+ Income</Btn>

function DashboardTab({s,d,score,missions}){

  const monthIncome=monthTx.filter(tx=>tx.type==="income").reduce((a,tx)=>a+tx.amount,0);
  const monthExpense=monthTx.filter(tx=>tx.type==="expense").reduce((a,tx)=>a+tx.amount,0);
  const monthSavings=monthIncome-monthExpense;
  const savingsRate=monthIncome>0?Math.round(monthSavings/monthIncome*100):0;
  const totalAssets=s.accounts.filter(a=>a.type!=="debt").reduce((a,ac)=>a+parseFloat(ac.balance||0),0);
  const totalDebt=s.accounts.filter(a=>a.type==="debt").reduce((a,ac)=>a+parseFloat(ac.balance||0),0);

                </div>

        <div style={{textAlign:"center",padding:"40px 20px",color:V.text3}}>
          <div style={{fontSize:40,marginBottom:12}}>💰</div>
          <div style={{fontSize:15,fontWeight:600,color:V.text2,marginBottom:6}}>No transactions yet</div>

}

// ─── TRANSACTIONS TAB ───
function TransactionsTab({s,d}){
  const [showAdd,setShowAdd]=useState(false);
  const [filterType,setFilterType]=useState("all");
  const [filterMonth,setFilterMonth]=useState(thisMonth());
  const months=useMemo(()=>{const ms=new Set(s.transactions.map(tx=>tx.date.slice(0,7)));return[...ms].sort().reverse().slice(0,6);},[s.transactions]);
  const filtered=s.transactions.filter(tx=>{const mOk=!filterMonth||tx.date.startsWith(filterMonth);const tOk=filterType==="all"||tx.type===filterType;return mOk&&tOk;});
  const totalFiltered={income:filtered.filter(t=>t.type==="income").reduce((a,t)=>a+t.amount,0),expense:filtered.filter(t=>t.type==="expense").reduce((a,t)=>a+t.amount,0)};

  return(
    <div className="fade-up" style={{display:"flex",flexDirection:"column",gap:12}}>
      <Btn full onClick={()=>setShowAdd(true)}>+ Add Transaction</Btn>

      {/* Filters */}
      <div style={{display:"flex",gap:6,overflowX:"auto",WebkitOverflowScrolling:"touch",paddingBottom:2}}>
        {["all","income","expense"].map(t=>(
          <button key={t} onClick={()=>setFilterType(t)} style={{padding:"7px 14px",borderRadius:20,border:"none",fontSize:12,fontWeight:600,fontFamily:V.font,cursor:"pointer",WebkitTapHighlightColor:"transparent",whiteSpace:"nowrap",background:filterType===t?`${V.accent}18`:"rgba(255,255,255,0.04)",color:filterType===t?V.accent:V.text3}}>
            {t.charAt(0).toUpperCase()+t.slice(1)}
          </button>
        ))}
        {months.map(m=>(
          <button key={m} onClick={()=>setFilterMonth(filterMonth===m?"":m)} style={{padding:"7px 14px",borderRadius:20,border:"none",fontSize:12,fontWeight:600,fontFamily:V.font,cursor:"pointer",WebkitTapHighlightColor:"transparent",whiteSpace:"nowrap",background:filterMonth===m?`${V.warn}18`:"rgba(255,255,255,0.04)",color:filterMonth===m?V.warn:V.text3}}>
            {new Date(m+"-15").toLocaleDateString("en-US",{month:"short"})}
          </button>
        ))}
      </div>

      {/* Summary strip */}
      {filtered.length>0&&(
        <div style={{display:"flex",gap:10,padding:"10px 14px",borderRadius:12,background:"rgba(255,255,255,0.02)",border:`1px solid ${V.cardBorder}`}}>
          <div style={{flex:1,textAlign:"center"}}>
            <div style={{fontSize:9,color:V.text3,fontWeight:600}}>INCOME</div>
            <div style={{fontSize:14,fontWeight:800,color:V.accent,fontFamily:V.mono}}>+{fmtMoney(totalFiltered.income)}</div>
          </div>
          <div style={{width:1,background:V.cardBorder}}/>
          <div style={{flex:1,textAlign:"center"}}>
            <div style={{fontSize:9,color:V.text3,fontWeight:600}}>SPENT</div>
            <div style={{fontSize:14,fontWeight:800,color:V.danger,fontFamily:V.mono}}>-{fmtMoney(totalFiltered.expense)}</div>
          </div>
          <div style={{width:1,background:V.cardBorder}}/>
          <div style={{flex:1,textAlign:"center"}}>
            <div style={{fontSize:9,color:V.text3,fontWeight:600}}>NET</div>
            <div style={{fontSize:14,fontWeight:800,fontFamily:V.mono,color:(totalFiltered.income-totalFiltered.expense)>=0?V.accent:V.danger}}>{fmtMoney(totalFiltered.income-totalFiltered.expense)}</div>
          </div>
        </div>
      )}

      {filtered.map(tx=>{
        const catObj=getCat(tx.catId||tx.cat);
        return(
          <div key={tx.id} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 0",borderBottom:`1px solid rgba(52,211,153,0.04)`}}>
            <div style={{width:38,height:38,borderRadius:10,background:`${catObj.color||V.accent}15`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:19}}>
              {catObj.icon}
            </div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:13,color:V.text,fontWeight:600,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{tx.note||catObj.label}</div>
              <div style={{fontSize:10,color:V.text3}}>{fmtFull(tx.date)} · {catObj.label}</div>
            </div>
            <div style={{display:"flex",gap:8,alignItems:"center",flexShrink:0}}>
              <span style={{fontSize:15,fontWeight:800,fontFamily:V.mono,color:tx.type==="income"?V.accent:V.danger}}>
                {tx.type==="income"?"+":"-"}{fmtMoney(tx.amount)}
              </span>
              <button onClick={()=>Confirm.show("Delete?","",()=>d({type:"DEL_TX",id:tx.id}))} style={{background:"none",border:"none",padding:4,cursor:"pointer",opacity:.5}}>
                <svg width={13} height={13} viewBox="0 0 24 24" fill="none" stroke={V.text3} strokeWidth="2" strokeLinecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg>
              </button>

          </div>
        );
      })}
      {filtered.length===0&&<div style={{textAlign:"center",padding:"40px 20px",color:V.text3,fontSize:13}}>No transactions for this filter</div>}
      {showAdd&&<AddTxSheet onClose={()=>setShowAdd(false)} onSave={(tx)=>{d({type:"ADD_TX",tx});Toast.show(tx.type==="income"?"Income added":"Expense logged",tx.type==="income"?V.accent:V.danger);Haptic.success();}}/>}
    </div>
  );
}

// ─── BUDGET TAB ───
function BudgetTab({s,d}){
  const [showEdit,setShowEdit]=useState(false);
  const [editBudgets,setEditBudgets]=useState({});
  const m=thisMonth();
  const monthTx=s.transactions.filter(tx=>tx.date.startsWith(m)&&tx.type==="expense");
  const spendByCat=useMemo(()=>{const map={};monthTx.forEach(tx=>{map[tx.catId]=(map[tx.catId]||0)+tx.amount;});return map;},[monthTx]);
  const monthLabel=new Date().toLocaleDateString("en-US",{month:"long",year:"numeric"});
  const totalBudget=Object.values(s.budgets).reduce((a,b)=>a+(parseFloat(b)||0),0);
  const totalSpent=Object.values(spendByCat).reduce((a,b)=>a+b,0);
  const openEdit=()=>{setEditBudgets({...s.budgets});setShowEdit(true);};

  return(
    <div className="fade-up" style={{display:"flex",flexDirection:"column",gap:12}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div>
          <div style={{fontSize:13,fontWeight:700,color:V.text}}>{monthLabel} Budget</div>
          <div style={{fontSize:11,color:V.text3}}>{fmtMoney(totalSpent)} of {fmtMoney(totalBudget)} used</div>
        </div>
        <Btn v="small" onClick={openEdit}>Edit Budgets</Btn>
      </div>

      {totalBudget>0&&<Progress val={totalSpent} max={totalBudget} color={totalSpent>totalBudget?V.danger:V.accent} h={8}/>}

      {EXP_CATS.filter(cat=>s.budgets[cat.id]||spendByCat[cat.id]).map(cat=>{
        const budget=parseFloat(s.budgets[cat.id])||0;
        const spent=spendByCat[cat.id]||0;
        const pct=budget>0?Math.round(spent/budget*100):0;
        const over=spent>budget&&budget>0;
        return(
          <Card key={cat.id} style={{padding:14}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:20}}>{cat.icon}</span>
                <div>
                  <div style={{fontSize:13,fontWeight:600,color:V.text}}>{cat.label}</div>
                  <div style={{fontSize:10,color:V.text3}}>
                    {fmtMoney(spent)} {budget>0?`/ ${fmtMoney(budget)}`:"(no budget)"}
                  </div>
                </div>
              </div>
              <div style={{textAlign:"right"}}>
                {budget>0&&<div style={{fontSize:13,fontWeight:800,fontFamily:V.mono,color:over?V.danger:pct>80?V.warn:V.accent}}>{pct}%</div>}
                {over&&<div style={{fontSize:9,color:V.danger,fontWeight:700}}>OVER {fmtMoney(spent-budget)}</div>}
              </div>
            </div>
            {budget>0&&<Progress val={spent} max={budget} color={over?V.danger:cat.color||V.accent} h={6}/>}
          </Card>
        );
      })}

      {Object.keys(s.budgets).length===0&&!Object.keys(spendByCat).length&&(
        <div style={{textAlign:"center",padding:"40px 20px",color:V.text3}}>
          <div style={{fontSize:40,marginBottom:12}}>🎯</div>
          <div style={{fontSize:15,fontWeight:600,color:V.text2,marginBottom:6}}>No budgets set</div>
          <div style={{fontSize:13,marginBottom:16}}>Set monthly limits for each category</div>
          <Btn onClick={openEdit}>Set Budgets</Btn>
        </div>
      )}

      {showEdit&&(
        <Sheet title="Monthly Budgets" onClose={()=>setShowEdit(false)} footer={<Btn full onClick={()=>{d({type:"SET_BUDGET",b:editBudgets});Toast.show("Budgets saved",V.accent);setShowEdit(false);}}>Save Budgets</Btn>}>
          <div style={{fontSize:12,color:V.text3,marginBottom:16}}>Set $0 or leave blank to remove a budget.</div>
          {EXP_CATS.map(cat=>(
            <div key={cat.id} style={{marginBottom:10}}>
              <div style={{fontSize:11,color:V.text3,fontWeight:600,marginBottom:4,display:"flex",alignItems:"center",gap:6}}><span>{cat.icon}</span>{cat.label}</div>
              <div style={{position:"relative"}}>
                <span style={{position:"absolute",left:14,top:"50%",transform:"translateY(-50%)",fontSize:14,color:V.text3,fontFamily:V.mono}}>$</span>
                <input type="number" value={editBudgets[cat.id]||""} onChange={e=>setEditBudgets(b=>({...b,[cat.id]:e.target.value}))} placeholder="0" step="50"
                  style={{width:"100%",padding:"10px 14px 10px 30px",background:"rgba(255,255,255,0.04)",border:`1px solid ${V.cardBorder}`,borderRadius:10,color:V.text,fontSize:15,fontFamily:V.mono,outline:"none",boxSizing:"border-box"}}/>
              </div>
            </div>
          ))}
        </Sheet>
      )}
    </div>
  );
}

// ─── NET WORTH TAB ───
function NetWorthTab({s,d}){
  const [showAdd,setShowAdd]=useState(false);
  const [form,setForm]=useState({name:"",balance:"",type:"checking"});
  const [editId,setEditId]=useState(null);
  const TYPES=[{id:"checking",label:"Checking",icon:"🏦"},{id:"savings",label:"Savings",icon:"💰"},{id:"investment",label:"Investment",icon:"📈"},{id:"crypto",label:"Crypto",icon:"🪙"},{id:"property",label:"Property",icon:"🏠"},{id:"debt",label:"Debt/Loan",icon:"💳"}];
  const totalAssets=s.accounts.filter(a=>a.type!=="debt").reduce((a,ac)=>a+parseFloat(ac.balance||0),0);
  const totalDebt=s.accounts.filter(a=>a.type==="debt").reduce((a,ac)=>a+parseFloat(ac.balance||0),0);
  const netWorth=totalAssets-totalDebt;

  const saveAccount=()=>{
    if(!form.name.trim()||!form.balance)return;
    if(editId){d({type:"UPDATE_ACCOUNT",account:{id:editId,...form,balance:parseFloat(form.balance)}});}
    else{d({type:"ADD_ACCOUNT",account:{id:uid(),...form,balance:parseFloat(form.balance),createdAt:today()}});}
    Toast.show("Account saved",V.accent);Haptic.success();setShowAdd(false);setEditId(null);setForm({name:"",balance:"",type:"checking"});
  };

  return(
    <div className="fade-up" style={{display:"flex",flexDirection:"column",gap:12}}>
      {/* Net worth hero */}
      <Card style={{padding:18,textAlign:"center",background:`linear-gradient(135deg,${V.accent}06,${V.accent2}03)`}}>
        <div style={{fontSize:11,color:V.text3,fontWeight:600,marginBottom:4}}>NET WORTH</div>
        <div style={{fontSize:40,fontWeight:900,fontFamily:V.mono,color:netWorth>=0?V.accent:V.danger,marginBottom:8}}>
          {netWorth>=0?"+":"-"}{fmtMoney(netWorth)}
        </div>
        <div style={{display:"flex",justifyContent:"center",gap:24}}>
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:10,color:V.text3}}>Assets</div>
            <div style={{fontSize:15,fontWeight:700,color:V.accent2,fontFamily:V.mono}}>+{fmtMoney(totalAssets)}</div>
          </div>
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:10,color:V.text3}}>Liabilities</div>
            <div style={{fontSize:15,fontWeight:700,color:V.danger,fontFamily:V.mono}}>-{fmtMoney(totalDebt)}</div>
          </div>
        </div>
      </Card>

      <Btn full onClick={()=>{setEditId(null);setForm({name:"",balance:"",type:"checking"});setShowAdd(true);}}>+ Add Account</Btn>

      {s.accounts.length>0&&(
        <div>
          {["checking","savings","investment","crypto","property"].map(type=>{
            const accs=s.accounts.filter(a=>a.type===type);
            if(accs.length===0)return null;
            const typeObj=TYPES.find(t=>t.id===type);
            return accs.map(ac=>(
              <Card key={ac.id} style={{padding:14,marginBottom:8}} onClick={()=>{setEditId(ac.id);setForm({name:ac.name,balance:ac.balance.toString(),type:ac.type});setShowAdd(true);}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <div style={{width:36,height:36,borderRadius:10,background:`${V.accent}12`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>{typeObj?.icon||"💰"}</div>
                    <div>
                      <div style={{fontSize:13,fontWeight:600,color:V.text}}>{ac.name}</div>
                      <div style={{fontSize:10,color:V.text3}}>{typeObj?.label}</div>
                    </div>
                  </div>
                  <div style={{display:"flex",gap:10,alignItems:"center"}}>
                    <span style={{fontSize:16,fontWeight:800,fontFamily:V.mono,color:V.accent}}>{fmtMoney(parseFloat(ac.balance))}</span>
                    <button onClick={e=>{e.stopPropagation();Confirm.show(`Delete ${ac.name}?`,"",()=>d({type:"DEL_ACCOUNT",id:ac.id}));}} style={{background:"none",border:"none",padding:4,cursor:"pointer",opacity:.5}}>
                      <svg width={13} height={13} viewBox="0 0 24 24" fill="none" stroke={V.text3} strokeWidth="2" strokeLinecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg>
                    </button>
                  </div>
                </div>
              </Card>
            ));
          })}
          {s.accounts.filter(a=>a.type==="debt").map(ac=>(
            <Card key={ac.id} style={{padding:14,marginBottom:8,border:`1px solid ${V.danger}20`}} onClick={()=>{setEditId(ac.id);setForm({name:ac.name,balance:ac.balance.toString(),type:ac.type});setShowAdd(true);}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <div style={{width:36,height:36,borderRadius:10,background:"rgba(248,113,113,0.12)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>💳</div>
                  <div>
                    <div style={{fontSize:13,fontWeight:600,color:V.text}}>{ac.name}</div>
                    <div style={{fontSize:10,color:V.danger}}>Liability</div>
                  </div>
                </div>
                <div style={{display:"flex",gap:10,alignItems:"center"}}>
                  <span style={{fontSize:16,fontWeight:800,fontFamily:V.mono,color:V.danger}}>-{fmtMoney(parseFloat(ac.balance))}</span>
                  <button onClick={e=>{e.stopPropagation();Confirm.show(`Delete ${ac.name}?`,"",()=>d({type:"DEL_ACCOUNT",id:ac.id}));}} style={{background:"none",border:"none",padding:4,cursor:"pointer",opacity:.5}}>
                    <svg width={13} height={13} viewBox="0 0 24 24" fill="none" stroke={V.text3} strokeWidth="2" strokeLinecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg>
                  </button>
                </div>
              </div>
            </Card>
          ))}
        </div>
      )}

      {s.accounts.length===0&&<div style={{textAlign:"center",padding:"40px 20px",color:V.text3}}><div style={{fontSize:40,marginBottom:12}}>🏦</div><div style={{fontSize:15,fontWeight:600,color:V.text2,marginBottom:6}}>No accounts added</div><div style={{fontSize:13}}>Add your checking, savings, and investments</div></div>}

      {showAdd&&(
        <Sheet title={editId?"Edit Account":"Add Account"} onClose={()=>{setShowAdd(false);setEditId(null);}} footer={<Btn full onClick={saveAccount}>Save Account</Btn>}>
          <Field label="Account Name" value={form.name} onChange={v=>setForm(f=>({...f,name:v}))} placeholder="e.g. Chase Checking"/>
          <Field label="Current Balance ($)" type="number" value={form.balance} onChange={v=>setForm(f=>({...f,balance:v}))} unit="$" step="0.01"/>
          <div style={{marginBottom:12}}>
            <div style={{fontSize:11,color:V.text3,fontWeight:600,textTransform:"uppercase",letterSpacing:".06em",marginBottom:8}}>Account Type</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
              {TYPES.map(t=>(
                <button key={t.id} onClick={()=>setForm(f=>({...f,type:t.id}))} style={{padding:"7px 12px",borderRadius:12,border:`1px solid ${form.type===t.id?V.accent:V.cardBorder}`,background:form.type===t.id?`${V.accent}12`:"transparent",color:form.type===t.id?V.accent:V.text3,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:V.font,display:"flex",gap:4,alignItems:"center"}}>
                  <span>{t.icon}</span><span>{t.label}</span>
                </button>
              ))}
            </div>
          </div>
        </Sheet>
      )}
    </div>
  );
}

  );
}

// ─── APP ───
function App(){
  const [s,d]=useReducer(reducer,init);

  const score=useMemo(()=>calcScore(s),[s.transactions,s.accounts,s.budgets]);
  const missions=useMemo(()=>getDailyMissions(s),[s.transactions,s.accounts,s.budgets]);
  const {celebrating,celebRank,dismiss:dismissLevel}=useLevelUp(score,"fl-last-level");
  useEffect(()=>{
    d({type:"INIT",p:{transactions:LS.get("fl-tx")||[],accounts:LS.get("fl-accounts")||[],budgets:LS.get("fl-budgets")||{}}});
  },[]);
  useEffect(()=>{
    if(!s.loaded)return;
    LS.set("fl-tx",s.transactions);LS.set("fl-accounts",s.accounts);LS.set("fl-budgets",s.budgets);
  },[s.transactions,s.accounts,s.budgets,s.loaded]);

  if(!s.loaded)return<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:V.bg,flexDirection:"column",gap:12}}><div style={{fontSize:36}}>💰</div><div style={{fontSize:11,color:V.text3,fontFamily:V.mono,animation:"pulse 1.5s infinite"}}>Loading...</div></div>;

  const tabs=[{id:"dashboard",label:"Home",icon:"🏠"},{id:"transactions",label:"Transactions",icon:"💳"},{id:"budget",label:"Budget",icon:"🎯"},{id:"networth",label:"Net Worth",icon:"📊"},{id:"settings",label:"Settings",icon:"⚙️"}];
  const m=thisMonth();
  const monthExpense=s.transactions.filter(tx=>tx.date.startsWith(m)&&tx.type==="expense").reduce((a,tx)=>a+tx.amount,0);

  return(
    <div style={{height:"100%",display:"flex",flexDirection:"column",background:V.bg}}>
      <div style={{paddingTop:`max(16px,env(safe-area-inset-top,0px))`,paddingLeft:16,paddingRight:16,paddingBottom:10,background:V.navBg,borderBottom:`1px solid ${V.cardBorder}`,flexShrink:0,backdropFilter:"blur(12px)"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:22}}>💰</span>
            <div>
              <div style={{fontSize:16,fontWeight:800,color:V.text,lineHeight:1}}>FinanceLog</div>
              <div style={{fontSize:9,color:V.text3,fontWeight:600,letterSpacing:".1em"}}>by IRONLOG</div>
            </div>
          </div>
          {monthExpense>0&&<div style={{textAlign:"right"}}><div style={{fontSize:13,fontWeight:800,color:V.danger,fontFamily:V.mono}}>{fmtMoneyShort(monthExpense)}</div><div style={{fontSize:9,color:V.text3}}>spent this month</div></div>}
        </div>
      </div>
      <div style={{flex:1,overflowY:"auto",WebkitOverflowScrolling:"touch",overscrollBehavior:"contain"}}>
        <div className="main-scroll" style={{paddingTop:16}}>
          {s.tab==="dashboard"&&<DashboardTab s={s} d={d} score={score} missions={missions}/>}
          {s.tab==="transactions"&&<TransactionsTab s={s} d={d}/>}
          {s.tab==="budget"&&<BudgetTab s={s} d={d}/>}
          {s.tab==="networth"&&<NetWorthTab s={s} d={d}/>}
          {s.tab==="settings"&&<SettingsTab s={s} d={d}/>}
        </div>
      </div>
      <div className="tab-bar" style={{background:V.navBg,borderTop:`1px solid ${V.cardBorder}`,display:"flex",backdropFilter:"blur(12px)",flexShrink:0,paddingTop:8}}>
        {tabs.map(tab=>{
          const active=s.tab===tab.id;
          return(
            <button key={tab.id} onClick={()=>{Haptic.light();d({type:"TAB",tab:tab.id});}} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2,background:"none",border:"none",cursor:"pointer",padding:"4px 0",WebkitTapHighlightColor:"transparent"}}>
              <span style={{fontSize:18,opacity:active?1:.5}}>{tab.icon}</span>
              <span style={{fontSize:9,fontWeight:active?700:500,color:active?V.accent:V.text3}}>{tab.label}</span>
              {active&&<div style={{width:4,height:4,borderRadius:2,background:V.accent,marginTop:-2}}/>}
            </button>
          );
        })}
      </div>
      <ToastDisplay/><GlobalConfirm/><UndoToastBar/>{celebrating&&celebRank&&<LevelUpCelebration rank={celebRank} onDismiss={dismissLevel}/>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
